def('Hydraulics',{
  id:'bithyd', name:'Bit Hydraulics (nozzles / HHP / impact)', icon:'💥',
  desc:'Nozzle pressure drop, jet velocity, HSI, impact force and optimization flag.',
  inputs:[
    {k:'q',label:'Flow Rate',unit:'gpm',def:500},
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'bit',label:'Bit Size',unit:'in',def:8.5},
    {k:'spp',label:'Standpipe (system) Pressure',unit:'psi',def:3000},
    {k:'n1',label:'Nozzle 1',unit:'1/32 in',def:12},
    {k:'n2',label:'Nozzle 2',unit:'1/32 in',def:12},
    {k:'n3',label:'Nozzle 3',unit:'1/32 in',def:12},
    {k:'n4',label:'Nozzle 4 (0 if none)',unit:'1/32 in',def:0},
    {k:'n5',label:'Nozzle 5 (0 if none)',unit:'1/32 in',def:0},
    {k:'n6',label:'Nozzle 6 (0 if none)',unit:'1/32 in',def:0}
  ],
  calc(v){
    const sumSq=v.n1**2+v.n2**2+v.n3**2+v.n4**2+v.n5**2+v.n6**2;
    if(sumSq<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Enter at least one nozzle size.'};
    const tfa=Math.PI/4*((v.n1/32)**2+(v.n2/32)**2+(v.n3/32)**2+(v.n4/32)**2+(v.n5/32)**2+(v.n6/32)**2);
    const pbit=156*v.q*v.q*v.mw/(sumSq*sumSq);
    const vn=417.2*v.q/sumSq;
    const hhpb=v.q*pbit/1740;
    const hsi=1.27*hhpb/(v.bit*v.bit);
    const impact=vn*v.q*v.mw/1930;
    const pctBit=v.spp>0?pbit/v.spp*100:0;
    return {main:{n:'Bit Pressure Drop',v:round(pbit,0),u:'psi'},
      rows:[
        {k:'Total Flow Area (TFA)',v:round(tfa,4)+' in²'},
        {k:'Jet (nozzle) velocity',v:round(vn,0)+' ft/s'+(vn>450?'  ⚠ >450':'')},
        {k:'Bit hydraulic HP',v:round(hhpb,0)+' hhp'},
        {k:'HSI (hp/in²)',v:round(hsi,2)+(hsi<2.5?'  (low)':hsi>5?'  (high)':'  ✓')},
        {k:'Jet impact force',v:round(impact,0)+' lb'},
        {k:'% pressure at bit',v:round(pctBit,0)+'%'}
      ],
      formula:'Pbit = 156·ρ·Q² ÷ (ΣDn²)²\nVn = 417.2·Q ÷ ΣDn²\nHHPb = Q·Pbit ÷ 1740     HSI = 1.27·HHPb ÷ bit²\nImpact = Vn·Q·ρ ÷ 1930',
      steps:`ΣDn² = ${round(sumSq,0)}\nPbit = 156×${round(v.mw)}×${round(v.q,0)}² ÷ ${round(sumSq,0)}² = <b>${round(pbit,0)} psi</b>`,
      note: pctBit<50?'Below 50% at bit — consider smaller nozzles to shift more energy to the bit.':pctBit>65?'Above 65% at bit — optimized for hydraulic horsepower (hard formation).':'50–65% at bit is the optimized window (≈50% for impact force, ≈65% for HHP). Target HSI 2.5–5, jet velocity 250–450 ft/s.'};
  }
});
def('Hydraulics',{
  id:'presloss', name:'Pressure Loss & Flow Regime', icon:'🌀',
  desc:'Velocity, Reynolds number, laminar/turbulent regime and friction pressure loss for one interval.',
  inputs:[
    {k:'where',label:'Section',unit:'',def:'ann',opts:[['pipe','Inside pipe'],['ann','Annulus']]},
    {k:'q',label:'Flow Rate',unit:'gpm',def:500},
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'d1',label:'Hole/Casing ID (annulus) — or Pipe ID (pipe)',unit:'in',def:8.5},
    {k:'d2',label:'Pipe OD (annulus only)',unit:'in',def:5},
    {k:'len',label:'Interval Length',unit:'ft',def:5000},
    {k:'r600',label:'θ600',unit:'°',def:60},
    {k:'r300',label:'θ300',unit:'°',def:40},
    {k:'r100',label:'θ100',unit:'°',def:18},
    {k:'r3',label:'θ3',unit:'°',def:6}
  ],
  calc(v){
    const pipe=v.where==='pipe';
    const n = pipe? 3.32*Math.log10(v.r600/v.r300) : 0.657*Math.log10(v.r100/v.r3);
    const Kc= pipe? 5.11*v.r600/Math.pow(1022,n) : 5.11*v.r100/Math.pow(170.2,n);
    const dcap= pipe? v.d1 : (v.d1-v.d2);
    const vel= pipe? 24.48*v.q/(v.d1*v.d1) : 24.48*v.q/(v.d1*v.d1-v.d2*v.d2);
    const geom= pipe? 1.6/v.d1 : 2.4/(v.d1-v.d2);
    const shapef= pipe? (3*n+1)/(4*n) : (2*n+1)/(3*n);
    const mue=100*Kc*Math.pow(geom*vel,n-1)*Math.pow(shapef,n);
    const nre=15.467*vel*dcap*v.mw/mue;
    const turb=nre>2100;
    let f;
    if(!turb) f= pipe? 16/nre : 24/nre;
    else { const a=(Math.log10(n)+3.93)/50; const b=(1.75-Math.log10(n))/7; f=a/Math.pow(nre,b); }
    const dp=f*vel*vel*v.mw/(92916*dcap)*v.len;
    return {main:{n:'Interval Pressure Loss',v:round(dp,0),u:'psi'},
      rows:[
        {k:'Bulk velocity',v:round(vel,0)+' ft/min'},
        {k:'Effective viscosity',v:round(mue,0)+' cP'},
        {k:'Reynolds number',v:round(nre,0)},
        {k:'Flow regime',v: turb?'Turbulent (>2100)':'Laminar (≤2100)'},
        {k:'n / K',v:round(n,3)+' / '+round(Kc,3)}
      ],
      formula:'V = 24.48·Q ÷ D²  (pipe)  or  ÷(D₂²−D₁²) (annulus)\nNRe = 15.467·V·D·ρ ÷ μe\nΔP = f·V²·ρ ÷ (92916·D) × L',
      steps:`V = <b>${round(vel,0)} ft/min</b>\nNRe = <b>${round(nre,0)}</b> → ${turb?'turbulent':'laminar'}\nΔP = <b>${round(dp,0)} psi</b>`,
      note:'Sum ΔP over every drillstring & annular section to get standpipe pressure. Annular losses feed ECD. Keep the annulus laminar to limit hole erosion.'};
  }
});
def('Hydraulics',{
  id:'critvel', name:'Critical Velocity & Flow Rate', icon:'🎚️',
  desc:'The annular flow rate at which flow turns turbulent (erosion / high-ECD threshold).',
  inputs:[
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'dh',label:'Hole / Casing ID',unit:'in',def:8.5},
    {k:'dp',label:'Pipe OD',unit:'in',def:5},
    {k:'r100',label:'θ100',unit:'°',def:18},
    {k:'r3',label:'θ3',unit:'°',def:6}
  ],
  calc(v){
    const n=0.657*Math.log10(v.r100/v.r3);
    const Ka=5.11*v.r100/Math.pow(170.2,n);
    const dcap=v.dh-v.dp;
    const base=25818*Ka/v.mw;
    const vca=Math.pow(base,1/(2-n))*Math.pow((2.4/dcap)*((2*n+1)/(3*n)),n/(2-n));
    const qca=vca*(v.dh*v.dh-v.dp*v.dp)/24.51;
    return {main:{n:'Critical Annular Flow Rate',v:round(qca,0),u:'gpm'},
      rows:[
        {k:'Critical annular velocity',v:round(vca,0)+' ft/min'},
        {k:'Annular n / K',v:round(n,3)+' / '+round(Ka,3)}
      ],
      formula:'Vca = (25818·Ka ÷ ρ)^(1/(2−n)) × [2.4/(Dh−Dp)·(2n+1)/(3n)]^(n/(2−n))\nQca = Vca·(Dh²−Dp²) ÷ 24.51',
      steps:`n=${round(n,3)}, Ka=${round(Ka,3)}\nQca = <b>${round(qca,0)} gpm</b>`,
      note:'Above this rate the annulus is turbulent. In washout-prone/soft formations keep circulating rate below it; for cleaning hard beds some turbulence is acceptable.'};
  }
});
def('Hydraulics',{
  id:'surge', name:'Surge & Swab (trip)', icon:'↕️',
  desc:'Approximate surge/swab annular velocity from trip speed for pressure checks.',
  inputs:[
    {k:'stand',label:'Stand Length',unit:'ft',def:93},
    {k:'sec',label:'Seconds per Stand',unit:'s',def:60},
    {k:'disp',label:'Drillstring displacement',unit:'bbl/ft',def:0.0075},
    {k:'anncap',label:'Annular capacity',unit:'bbl/ft',def:0.0459}
  ],
  calc(v){
    const vmax=1.5*v.stand/v.sec*60;
    const av=vmax*v.disp/v.anncap;
    return {main:{n:'Surge/Swab Annular Velocity',v:round(av,0),u:'ft/min'},
      rows:[
        {k:'Max drillstring velocity',v:round(vmax,0)+' ft/min'},
        {k:'Avg drillstring velocity',v:round(vmax/1.5,0)+' ft/min'}
      ],
      formula:'V_max = 1.5 × stand length ÷ sec-per-stand × 60\nAV_surge = V_max × (displacement ÷ annular capacity)',
      steps:`V_max = 1.5×${round(v.stand,0)}÷${round(v.sec,0)}×60 = <b>${round(vmax,0)} ft/min</b>\nAV = <b>${round(av,0)} ft/min</b>`,
      note:'Feed this AV into the annular pressure-loss calc: surge (running in) ADDS to hydrostatic → risk fracture; swab (pulling out) SUBTRACTS → risk kick. Slow down (more sec/stand) if outside the pore–fracture window.'};
  }
});

/* ===== PRESSURE PREDICTION & WELL CONTROL (grouped with Kill) ===== */
def('Well Control',{
  id:'porepred', name:'Formation Pressure & EMW', icon:'📉',
  desc:'Overburden, pore pressure and equivalent mud weight from gradient or pressure.',
  inputs:[
    {k:'tvd',label:'True Vertical Depth',unit:'ft',def:10000},
    {k:'mode',label:'Known input',unit:'',def:'grad',opts:[['grad','Pore gradient (psi/ft)'],['psi','Pore pressure (psi)'],['emw','Pore EMW (ppg)']]},
    {k:'grad',label:'Pore gradient',unit:'psi/ft',def:0.465},
    {k:'psi',label:'Pore pressure',unit:'psi',def:4650},
    {k:'emw',label:'Pore EMW',unit:'ppg',def:8.94},
    {k:'obg',label:'Overburden gradient',unit:'psi/ft',def:1.0}
  ],
  calc(v){
    let pp;
    if(v.mode==='grad') pp=v.grad*v.tvd;
    else if(v.mode==='psi') pp=v.psi;
    else pp=0.052*v.emw*v.tvd;
    const emw=pp/(0.052*v.tvd);
    const grad=pp/v.tvd;
    const ob=v.obg*v.tvd;
    return {main:{n:'Equivalent Mud Weight',v:round(emw,2),u:'ppg'},
      rows:[
        {k:'Pore pressure',v:round(pp,0)+' psi'},
        {k:'Pore gradient',v:round(grad,3)+' psi/ft'},
        {k:'Overburden pressure',v:round(ob,0)+' psi ('+round(v.obg,2)+' psi/ft)'},
        {k:'Pressure regime',v: grad>0.5?'Abnormal (overpressured)':grad<0.44?'Subnormal':'Normal'}
      ],
      formula:'EMW = Ppore ÷ (0.052 × TVD)\nPpore = gradient × TVD\nOverburden = OBG × TVD',
      steps:`Ppore = <b>${round(pp,0)} psi</b>\nEMW = ${round(pp,0)} ÷ (0.052×${round(v.tvd,0)}) = <b>${round(emw,2)} ppg</b>`,
      note:'Normal gradient ≈0.465 psi/ft (9.0 ppg) marine. Fracture gradient lies between pore and overburden (~1.0 psi/ft).'};
  }
});
def('Well Control',{
  id:'dexp', name:'d-Exponent (pore-pressure detection)', icon:'📐',
  desc:'Normalized drilling rate; a falling dc-exponent trend flags rising pore pressure.',
  inputs:[
    {k:'rop',label:'ROP',unit:'ft/hr',def:30},
    {k:'rpm',label:'Rotary Speed',unit:'rpm',def:120},
    {k:'wob',label:'Weight on Bit',unit:'lb',def:25000},
    {k:'bit',label:'Bit Size',unit:'in',def:8.5},
    {k:'mwn',label:'Normal MW (gradient)',unit:'ppg',def:9.0},
    {k:'ecd',label:'Actual ECD / MW',unit:'ppg',def:9.5}
  ],
  calc(v){
    const d=Math.log10(v.rop/(60*v.rpm))/Math.log10(12*v.wob/(1e6*v.bit));
    const dc=d*(v.mwn/v.ecd);
    return {main:{n:'Corrected d-exponent (dc)',v:round(dc,2),u:''},
      rows:[{k:'d-exponent',v:round(d,2)},{k:'Guidance',v:'Plot dc vs depth; break below trend = overpressure'}],
      formula:'d = log(ROP ÷ (60·RPM)) ÷ log(12·WOB ÷ (10⁶·bit))\ndc = d × (normal MW ÷ ECD)',
      steps:`d = <b>${round(d,2)}</b>\ndc = ${round(d,2)}×(${round(v.mwn)}/${round(v.ecd)}) = <b>${round(dc,2)}</b>`,
      note:'Establish the normal-compaction trend in clean shale. A departure where dc falls below the trend line indicates increasing pore pressure.'};
  }
});
def('Well Control',{
  id:'fracgrad', name:'Fracture Gradient (Eaton)', icon:'🧨',
  desc:'Fracture gradient from pore pressure, overburden and Poisson\'s ratio.',
  inputs:[
    {k:'ppg',label:'Pore-pressure gradient',unit:'psi/ft',def:0.465},
    {k:'obg',label:'Overburden gradient',unit:'psi/ft',def:1.0},
    {k:'pois',label:"Poisson's ratio",unit:'',def:0.45},
    {k:'tvd',label:'TVD',unit:'ft',def:10000}
  ],
  calc(v){
    const kc=v.pois/(1-v.pois);
    const fg=v.ppg+kc*(v.obg-v.ppg);
    const hw=(v.obg+2*v.ppg)/3;
    return {main:{n:'Fracture Gradient (Eaton)',v:round(fg,3),u:'psi/ft'},
      rows:[
        {k:'Fracture EMW',v:round(fg/0.052,2)+' ppg'},
        {k:'Fracture pressure',v:round(fg*v.tvd,0)+' psi'},
        {k:'Stress ratio Kc',v:round(kc,3)},
        {k:'Hubbert-Willis minimum',v:round(hw,3)+' psi/ft ('+round(hw/0.052,2)+' ppg)'}
      ],
      formula:'FG = PPG + Kc·(OBG − PPG),  Kc = ν/(1−ν)\nHubbert-Willis min = (OBG + 2·PPG)/3',
      steps:`Kc = ${round(v.pois,2)}/(1−${round(v.pois,2)}) = ${round(kc,3)}\nFG = ${round(v.ppg,3)}+${round(kc,3)}×(${round(v.obg,2)}−${round(v.ppg,3)}) = <b>${round(fg,3)} psi/ft</b>`,
      note:'Fracture gradient rises with depth & pore pressure and is ~0.8 ppg lower per 1000 ft of water offshore. Confirm with a leak-off test.'};
  }
});
def('Well Control',{
  id:'lot', name:'LOT / FIT → EMW & MAASP', icon:'🧪',
  desc:'Convert a leak-off/formation-integrity test to an equivalent mud weight and the max allowable surface pressure.',
  inputs:[
    {k:'mw',label:'Test Mud Weight',unit:'ppg',def:10},
    {k:'lotpsi',label:'Leak-off / test Pressure',unit:'psi',def:1500},
    {k:'shoe',label:'Casing Shoe TVD',unit:'ft',def:5000},
    {k:'curmw',label:'Current Mud Weight (for MAASP)',unit:'ppg',def:10}
  ],
  calc(v){
    const eqAdd=v.lotpsi/(0.052*v.shoe);
    const fmw=v.mw+eqAdd;
    const maasp=(fmw-v.curmw)*0.052*v.shoe;
    return {main:{n:'Formation Strength (EMW)',v:round(fmw,2),u:'ppg'},
      rows:[
        {k:'LOT equivalent added',v:'+'+round(eqAdd,2)+' ppg'},
        {k:'Fracture pressure @ shoe',v:round(fmw*0.052*v.shoe,0)+' psi'},
        {k:'MAASP (current MW)',v:round(maasp,0)+' psi'}
      ],
      formula:'EMW_frac = MW + LOT ÷ (0.052·TVDshoe)\nMAASP = (EMW_frac − MW_current)·0.052·TVDshoe',
      steps:`EMW = ${round(v.mw)}+${round(v.lotpsi,0)}/(0.052×${round(v.shoe,0)}) = <b>${round(fmw,2)} ppg</b>\nMAASP = <b>${round(maasp,0)} psi</b>`,
      note:'MAASP is the max allowable shut-in casing pressure before breaking down the shoe. Recompute it every time mud weight changes — it shrinks as MW rises.'};
  }
});
def('Well Control',{
  id:'kick', name:'Kick Analysis (influx)', icon:'⚠️',
  desc:'Formation pressure, influx height and influx type from shut-in pressures and pit gain.',
  inputs:[
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'tvd',label:'TVD',unit:'ft',def:12000},
    {k:'sidpp',label:'SIDPP',unit:'psi',def:400},
    {k:'sicp',label:'SICP',unit:'psi',def:550},
    {k:'gain',label:'Pit Gain',unit:'bbl',def:20},
    {k:'anncap',label:'Annular capacity',unit:'bbl/ft',def:0.0459}
  ],
  calc(v){
    const pform=0.052*v.mw*v.tvd+v.sidpp;
    const kmw=v.mw+v.sidpp/(0.052*v.tvd);
    const h=v.gain/v.anncap;
    const fw=v.mw-(v.sicp-v.sidpp)/(0.052*h);
    const type= fw<4?'Gas':fw<7?'Oil / mixed':'Saltwater';
    return {main:{n:'Formation Pressure',v:round(pform,0),u:'psi'},
      rows:[
        {k:'Kill Mud Weight',v:round(kmw,2)+' ppg'},
        {k:'Influx height',v:round(h,0)+' ft'},
        {k:'Influx density',v:round(fw,1)+' ppg'},
        {k:'Probable influx type',v:type}
      ],
      formula:'Pform = 0.052·MW·TVD + SIDPP\nInflux height = pit gain ÷ annular capacity\nInflux density = MW − (SICP−SIDPP) ÷ (0.052·height)',
      steps:`Pform = <b>${round(pform,0)} psi</b>\nInflux ρ = ${round(v.mw)}−(${round(v.sicp,0)}−${round(v.sidpp,0)})/(0.052×${round(h,0)}) = <b>${round(fw,1)} ppg</b> → ${type}`,
      warn: v.sicp<v.sidpp?'SICP should normally be ≥ SIDPP — verify readings.':'',
      note:'Treat every kick as gas until proven otherwise. Use the Well-Control calculators together with the rig program & IWCF/IADC procedures.'};
  }
});
def('Well Control',{
  id:'tripmargin', name:'Trip Margin', icon:'🧗',
  desc:'Mud-weight increase to offset swab pressure when pulling out of hole.',
  inputs:[
    {k:'yp',label:'Yield Point',unit:'lb/100ft²',def:17},
    {k:'dh',label:'Hole ID',unit:'in',def:8.5},
    {k:'dp',label:'Pipe OD',unit:'in',def:4.5}
  ],
  calc(v){
    const tm=v.yp/(11.7*(v.dh-v.dp));
    return {main:{n:'Trip Margin',v:round(tm,2),u:'ppg'},
      rows:[{k:'Equivalent',v:round(tm/8.345,3)+' SG'}],
      formula:'Trip margin = YP ÷ [11.7 × (Dh − Dp)]',
      steps:`TM = ${round(v.yp,0)} ÷ [11.7×(${round(v.dh)}−${round(v.dp)})] = <b>${round(tm,2)} ppg</b>`,
      note:'Add to static MW (or keep as a safety cushion) so swab while tripping does not pull the well below balance.'};
  }
});
def('Well Control',{
  id:'gascut', name:'Gas-Cut Mud — BHP Reduction', icon:'🫧',
  desc:'Shows how little surface gas-cutting actually reduces bottom-hole pressure.',
  inputs:[
    {k:'uncut',label:'Uncut Mud Weight',unit:'ppg',def:12},
    {k:'cut',label:'Gas-Cut Mud Weight',unit:'ppg',def:9}
  ],
  calc(v){
    const dp=100*((v.uncut/v.cut)-1);
    return {main:{n:'Approx. BHP Reduction',v:round(dp,0),u:'psi'},
      rows:[{k:'Weight reduction',v:round(v.uncut-v.cut,1)+' ppg'}],
      formula:'ΔBHP ≈ 100 × [(uncut MW ÷ gas-cut MW) − 1]',
      steps:`ΔBHP = 100×[(${round(v.uncut)}/${round(v.cut)})−1] = <b>${round(dp,0)} psi</b>`,
      note:'Even severe surface gas-cutting lowers BHP only ~tens–100 psi (gas expands near surface). Do NOT weight up for gas-cut mud alone — investigate the source instead.'};
  }
});

/* ===== DENSITY EXTRAS ===== */
def('Density',{
  id:'buoy', name:'Buoyancy Factor & String Weight', icon:'🪝',
  desc:'Buoyancy factor and effective (buoyed) string weight in mud.',
  inputs:[
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'air',label:'String weight in air',unit:'lb',def:250000}
  ],
  calc(v){
    const bf=1-v.mw/K.STEEL_PPG;
    return {main:{n:'Buoyancy Factor',v:round(bf,4),u:''},
      rows:[
        {k:'Buoyed string weight',v:round(v.air*bf,0)+' lb'},
        {k:'Buoyancy loss',v:round(v.air*(1-bf),0)+' lb'}
      ],
      formula:'BF = 1 − MW ÷ 65.5\nBuoyed weight = air weight × BF',
      steps:`BF = 1 − ${round(v.mw)}/65.5 = <b>${round(bf,4)}</b>\nBuoyed = ${round(v.air,0)}×${round(bf,4)} = <b>${round(v.air*bf,0)} lb</b>`,
      note:'65.5 ppg is the density of steel. Buoyancy reduces hook load and affects neutral point / WOB.'};
  }
});
def('Density',{
  id:'mudbuild', name:'Build Mud from Water (bentonite + barite)', icon:'🏗️',
  desc:'Water, bentonite and barite to build a target volume at a target weight.',
  inputs:[
    {k:'vol',label:'Target Volume',unit:'bbl',def:100},
    {k:'mw',label:'Target Mud Weight',unit:'ppg',def:10},
    {k:'gel',label:'Bentonite',unit:'lb/bbl',def:20}
  ],
  calc(v){
    const dm=ppg(K.BARITE_SG);
    const bentSG=2.5;
    const bariteLbPerBbl=dm*42*(v.mw-K.WATER_PPG)/(dm-v.mw);
    const totBarite=bariteLbPerBbl*v.vol;
    const totGel=v.gel*v.vol;
    const waterBbl=v.vol*(1-(bariteLbPerBbl/(dm*42))-(v.gel/(bentSG*350)));
    return {main:{n:'Barite Required',v:round(totBarite,0),u:'lb'},
      rows:[
        {k:'Barite',v:round(totBarite/100,0)+' sacks (100 lb)'},
        {k:'Bentonite',v:round(totGel,0)+' lb  ('+round(totGel/100,0)+' sacks)'},
        {k:'Water',v:round(waterBbl,1)+' bbl'},
        {k:'Barite concentration',v:round(bariteLbPerBbl,1)+' lb/bbl'}
      ],
      formula:'Barite lb/bbl = 35·42·(MW−8.33) ÷ (35 − MW)\nWater = Vol × [1 − barite vol frac − bentonite vol frac]',
      steps:`Barite = ${round(bariteLbPerBbl,1)} lb/bbl × ${round(v.vol,0)} = <b>${round(totBarite,0)} lb</b>\nWater ≈ <b>${round(waterBbl,1)} bbl</b>`,
      note:'Add bentonite to fresh water first and let it yield/shear before adding barite. Pre-treat hard water with soda ash so the clay hydrates.'};
  }
});
def('Density',{
  id:'yield', name:'Yield of Clay (bentonite)', icon:'🧱',
  desc:'Barrels of 15-cP mud one ton of clay will make.',
  inputs:[
    {k:'yieldbbl',label:'Field yield (from mud-up)',unit:'bbl/ton',def:91}

      ],
      formula:'Yield (bbl/ton) = bbl of 15-cP mud produced per 2000 lb clay\nlb/bbl = 2000 ÷ yield',
      steps:`${round(v.yieldbbl,0)} bbl/ton → ${round(2000/v.yieldbbl,1)} lb/bbl for a 1-bbl batch`,

/* ===== VOLUME EXTRAS ===== */
def('Volumes',{
  id:'slug', name:'Slug for Dry Pipe (tripping)', icon:'🩸',
  desc:'Slug volume or the resulting dry-pipe length before pulling out.',
  inputs:[
    {k:'mode',label:'Solve for',unit:'',def:'len',opts:[['len','Dry length from slug volume'],['vol','Slug volume for target dry length']]},
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'slugwt',label:'Slug Weight',unit:'ppg',def:15},
    {k:'pipecap',label:'Pipe capacity',unit:'bbl/ft',def:0.0178},
    {k:'slugvol',label:'Slug Volume',unit:'bbl',def:25},
    {k:'drylen',label:'Target Dry Length',unit:'ft',def:600}
  ],
  calc(v){
    if(v.slugwt<=v.mw) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Slug weight must exceed mud weight.'};
    if(v.mode==='len'){
      const lenSlug=v.slugvol/v.pipecap;
      const len=v.slugvol*(v.slugwt-v.mw)/(v.pipecap*v.mw);
      return {main:{n:'Dry Pipe Length',v:round(len,0),u:'ft'},
        rows:[
          {k:'Slug length in pipe',v:round(lenSlug,0)+' ft'},
          {k:'Hydrostatic gain from slug',v:round(0.052*(v.slugwt-v.mw)*lenSlug,0)+' psi'}
        ],
        formula:'Dry length = slug vol × (slug wt − MW) ÷ (pipecap × MW)\n   = (slug wt − MW)/MW × slug length in pipe',
        steps:`L = ${round(v.slugvol,0)}×(${round(v.slugwt)}−${round(v.mw)}) ÷ (${round(v.pipecap,4)}×${round(v.mw)}) = <b>${round(len,0)} ft</b>`,
        note:'A heavier slug U-tubes down the string, leaving the top dry so pipe pulls without spilling mud on the floor.'};
    } else {
      const vol=v.drylen*v.pipecap*v.mw/(v.slugwt-v.mw);
      return {main:{n:'Slug Volume Required',v:round(vol,1),u:'bbl'},
        rows:[{k:'Slug over-weight',v:'+'+round(v.slugwt-v.mw,1)+' ppg above mud'}],
        formula:'Slug vol = dry length × pipecap × MW ÷ (slug wt − MW)',
        steps:`V = ${round(v.drylen,0)}×${round(v.pipecap,4)}×${round(v.mw)} ÷ (${round(v.slugwt)}−${round(v.mw)}) = <b>${round(vol,1)} bbl</b>`,
        note:'Pump the slug, then pull ~10 stands and monitor the trip tank to confirm the pipe is dry.'};
    }
  }
});
def('Volumes',{
  id:'tank', name:'Pit / Tank Volume', icon:'🛢️',
  desc:'Volume of rectangular or cylindrical pits/tanks and bbl per inch/foot of height.',
  inputs:[
    {k:'shape',label:'Shape',unit:'',def:'rect',opts:[['rect','Rectangular'],['cyl','Cylindrical (vertical)']]},
    {k:'l',label:'Length (rect)',unit:'ft',def:20},
    {k:'w',label:'Width (rect)',unit:'ft',def:8},
    {k:'dia',label:'Diameter (cyl)',unit:'ft',def:10},
    {k:'h',label:'Fluid Height',unit:'ft',def:6}
  ],
  calc(v){
    let ft3, perFt;
    if(v.shape==='rect'){ ft3=v.l*v.w*v.h; perFt=v.l*v.w; }
    else { const a=Math.PI/4*v.dia*v.dia; ft3=a*v.h; perFt=a; }
    const bbl=ft3/K.BBL_PER_FT3;
    return {main:{n:'Volume',v:round(bbl,1),u:'bbl'},
      rows:[
        {k:'Volume',v:round(ft3,0)+' ft³  ('+round(bbl*0.158987,1)+' m³)'},
        {k:'Per foot of height',v:round(perFt/K.BBL_PER_FT3,2)+' bbl/ft'},
        {k:'Per inch of height',v:round(perFt/K.BBL_PER_FT3/12,3)+' bbl/in'}
      ],
      formula:'Rectangular: bbl = L×W×H ÷ 5.6146\nCylindrical: bbl = (π/4·D²)×H ÷ 5.6146',
      steps:`Volume = <b>${round(bbl,1)} bbl</b>  (${round(perFt/K.BBL_PER_FT3,2)} bbl/ft)`,
      note:'"bbl per inch" lets you convert a pit-level change straight into a gain/loss in barrels for kick/loss detection.'};
  }
});

/* ===== SOLIDS EXTRAS ===== */
def('Solids',{
  id:'diln', name:'Dilution to Control Solids (LGS)', icon:'🚰',
  desc:'Dilution volume (or displacement) needed to lower low-gravity-solids %.',
  inputs:[
    {k:'vol',label:'System Volume',unit:'bbl',def:1000},
    {k:'lgs1',label:'Present LGS',unit:'vol %',def:8},
    {k:'lgs2',label:'Target LGS',unit:'vol %',def:5}
  ],
  calc(v){
    if(v.lgs2>=v.lgs1) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Target LGS must be lower than present.'};
    const dilAddOnly=v.vol*(v.lgs1-v.lgs2)/v.lgs2;
    const dilWithDiscard=v.vol*(v.lgs1-v.lgs2)/v.lgs1;
    return {main:{n:'Dilution (build volume)',v:round(dilAddOnly,0),u:'bbl'},
      rows:[
        {k:'Dilute + discard (keep volume)',v:round(dilWithDiscard,0)+' bbl clean fluid'},
        {k:'  → volume to discard first',v:round(dilWithDiscard,0)+' bbl old mud'},
        {k:'New volume (add-only)',v:round(v.vol+dilAddOnly,0)+' bbl'}
      ],
      formula:'Add only:  V_dil = V × (LGS₁ − LGS₂) ÷ LGS₂\nDilute+discard: V_dil = V × (LGS₁ − LGS₂) ÷ LGS₁',
      steps:`Add-only dilution = ${round(v.vol,0)}×(${round(v.lgs1)}−${round(v.lgs2)})/${round(v.lgs2)} = <b>${round(dilAddOnly,0)} bbl</b>`,
      note:'Removal at the shakers/centrifuge is far cheaper than dilution. Use dilution only after maximizing mechanical solids removal.'};
  }
});
def('Solids',{
  id:'sag', name:'Barite Sag — LSRYP & Sag Index', icon:'⬇️',
  desc:'Low-shear-rate yield point and a weighted sag index for directional wells.',
  inputs:[
    {k:'r6',label:'θ6 (6 rpm)',unit:'°',def:8},
    {k:'r3',label:'θ3 (3 rpm)',unit:'°',def:6},
    {k:'dmw',label:'ΔMW from VST (bottoms-up variation)',unit:'ppg',def:0.5},
    {k:'ang',label:'Hole angle',unit:'deg',def:45},
    {k:'dia',label:'Hole diameter',unit:'in',def:8.5}
  ],
  calc(v){
    const lsryp=2*v.r3-v.r6;

    const kd=v.dia<8.5?0.2:v.dia<12.25?0.5:v.dia<17.5?0.8:1.0;
    const si=v.dmw*ka*kd*1.0*1.0;
    return {main:{n:'LSRYP',v:round(lsryp,0),u:'lb/100ft²'},
      rows:[
        {k:'LSRYP target',v:'7–15 (adequate suspension)'},
        {k:'Status',v: lsryp<7?'⚠ Low — sag risk':lsryp>15?'High':'✓ In range'},
        {k:'Sag Index (weighted)',v:round(si,2)},
        {k:'Angle factor / dia factor',v:round(ka,1)+' / '+round(kd,1)}
      ],
      formula:'LSRYP = 2·θ3 − θ6\nSag Index = ΔMW × Ka × Kd × Kf × Kh',
      steps:`LSRYP = 2×${round(v.r3)}−${round(v.r6)} = <b>${round(lsryp,0)} lb/100ft²</b>\nSag Index = <b>${round(si,2)}</b>`,
      note:'Sag is worst dynamically in 45–60° holes with MW>12. Control with LSRYP 7–15, pipe rotation >75 rpm, higher AV, and circulating bottoms-up every 1000–2000 ft.'};
  }
});

def('Brine',{
  id:'brine', name:'Brine Density (single salt)', icon:'🧂',
  desc:'Salt concentration, weighting and crystallization point to build a solids-free brine — with commercial-salt purity.',
  inputs:[
    {k:'salt',label:'Salt',unit:'',def:'CACL2',opts:[['NACL','Sodium Chloride (NaCl) → 10.0 ppg'],['KCL','Potassium Chloride (KCl) → 9.7 ppg'],['CACL2','Calcium Chloride (CaCl₂) → 11.6 ppg']]},
    {k:'ppgt',label:'Target Brine Weight',unit:'ppg',def:10},
    {k:'vol',label:'Brine Volume to build',unit:'bbl',def:100},
    {k:'purity',label:'Commercial salt purity',unit:'%',def:94}
  ],
  calc(v){
    const t=BRINE[v.salt]; const last=t[t.length-1];
    if(v.ppgt<t[0][2]) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Target below fresh-water base ('+round(t[0][2],2)+' ppg). Use ≥ that.'};
    if(v.ppgt>last[2]) return {main:{n:'—',v:'—',u:''},rows:[],warn:v.salt+' maxes at '+round(last[2],1)+' ppg ('+last[0]+'% wt). Use a heavier brine (CaBr₂/ZnBr₂) above that.'};
    let pct,salt,chlor,cryst;
    for(let i=0;i<t.length-1;i++){const a=t[i],b=t[i+1];
      if(v.ppgt>=a[2]&&v.ppgt<=b[2]){const f=(v.ppgt-a[2])/(b[2]-a[2]);
        pct=a[0]+f*(b[0]-a[0]); salt=a[3]+f*(b[3]-a[3]); chlor=a[4]+f*(b[4]-a[4]); cryst=a[6]+f*(b[6]-a[6]); break;}}
    const totSalt=salt*v.vol;                                    // pure salt needed
    const pf=(v.purity>0&&v.purity<=100)? v.purity/100 : 1;       // purity fraction
    const grossLbBbl=salt/pf, grossTot=totSalt/pf;               // commercial (gross) salt to weigh out
    const pure = pf<1;
    return {main:{n:'Salt Concentration',v:round(pct,1),u:'% by wt'},
      rows:[
        {k:'Pure salt required',v:round(salt,1)+' lb/bbl  ('+round(totSalt,0)+' lb total)'},
        {k:'Commercial salt @ '+round(v.purity,0)+'% purity',v:round(grossLbBbl,1)+' lb/bbl  ('+round(grossTot,0)+' lb total)'},
        {k:'Commercial salt (sacks 100 lb)',v:round(grossTot/100,0)+' sacks'},
        {k:'Commercial salt (tonnes)',v:round(grossTot*0.000453592,2)+' t'},
        {k:'Chloride content',v:round(chlor,0)+' mg/L'},
        {k:'Crystallization point',v:round(cryst,0)+' °F ('+round((cryst-32)*5/9,0)+' °C)'},
        {k:'Brine SG',v:round(v.ppgt/8.345,3)}
      ],
      formula:'Interpolated from API brine tables (density ↔ % salt ↔ Cl⁻ ↔ TCT).\nCommercial salt = pure salt ÷ (purity ÷ 100)',
      steps:`${round(v.ppgt)} ppg ${v.salt} → <b>${round(pct,1)}% wt</b>, pure ${round(salt,1)} lb/bbl\nCommercial = ${round(salt,1)} ÷ ${round(pf,3)} = <b>${round(grossLbBbl,1)} lb/bbl</b>`,
      note:(pure?'Commercial CaCl₂ is typically 94–97% (NaCl ~98%); weigh out the GROSS (commercial) figure so the effective pure-salt concentration is met — the lower the purity the more product you must add and the harder the top-end density is to reach. ':'')+'TCT (True Crystallization Temperature) must stay below the lowest expected surface/seabed temperature. Practical field maximums: NaCl ~10.0 ppg, CaCl₂ ~11.6 ppg (lab saturation ≈11.7 ppg at 40 wt%, rarely reached with commercial salt); above that use a CaCl₂/CaBr₂ blend, CaBr₂ or formates.'};
  }
});
def('Brine',{
  id:'gyp', name:'Available Gypsum (gyp mud)', icon:'⚪',
  desc:'Soluble calcium-sulphate reserve in a gyp system from Versenate titrations.',
  inputs:[
    {k:'vt',label:'Versenate for 10 mL filtrate',unit:'mL',def:15},

def('Brine',{

def('Brine',{
  id:'corrate', name:'Corrosion Rate (coupon)', icon:'🧫',

      steps:`= 534×${round(mg,0)} ÷ (${round(v.area)}×${round(hr,0)}×${round(v.rho,2)}) = <b>${round(mpy,1)} mpy</b>`,

def('Chemistry',{
  id:'pilot', name:'Pilot Test Scale-Up', icon:'🧪',
  desc:'Convert a lab pilot-test addition (grams per sample) to field lb/bbl and total product for the system.',

def('Hydraulics',{
  id:'cuttings', name:'Cuttings Transport & Hole Cleaning', icon:'🪨',
  desc:'Transport ratio, annular cuttings concentration and cuttings-generation rate for hole cleaning.',
  inputs:[
    {k:'gpm',label:'Flow Rate',unit:'gpm',def:600},
    {k:'dh',label:'Hole Diameter',unit:'in',def:8.5},
    {k:'dp',label:'Pipe OD',unit:'in',def:5},
    {k:'rop',label:'Rate of Penetration',unit:'ft/hr',def:60},
    {k:'vs',label:'Cuttings Slip Velocity',unit:'ft/min',def:40}
  ],
  calc(v){
    const av=24.51*v.gpm/(v.dh*v.dh-v.dp*v.dp);          // ft/min
    const ctv=av-v.vs;                                   // net upward transport velocity
    const tr=av>0? ctv/av : 0;                           // transport ratio
    const ropMin=v.rop/60;
    const conc=ctv>0? 100*(v.dh*v.dh*ropMin)/((v.dh*v.dh-v.dp*v.dp)*ctv) : Infinity;
    const cutBblHr=(v.dh*v.dh)/K.CAP*v.rop;              // in-situ cuttings volume bbl/hr
    const cutLbHr=cutBblHr*350*2.6;                      // ~2.6 SG cuttings
    const ok=tr>=0.5 && conc<5;
    return {main:{n:'Transport Ratio',v:round(tr*100,0),u:'%'},
      rows:[
        {k:'Annular velocity',v:round(av,0)+' ft/min'},
        {k:'Net transport velocity',v:round(ctv,0)+' ft/min'},
        {k:'Cuttings concentration',v:(isFinite(conc)?round(conc,1):'—')+' % by vol'},
        {k:'Cuttings generated',v:round(cutBblHr,2)+' bbl/hr  ('+round(cutLbHr,0)+' lb/hr)'},
        {k:'Hole cleaning',v: ctv<=0?'⚠ Cuttings not rising — raise flow / rheology': ok?'Adequate':'Marginal — raise flow, YP or sweep'}
      ],
      formula:'AV = 24.51 × Q ÷ (Dh² − Dp²)\nNet transport Vt = AV − Vslip     Transport ratio = Vt ÷ AV\nConcentration % = 100 × Dh²·(ROP/60) ÷ ((Dh²−Dp²)·Vt)',
      steps:`AV = 24.51 × ${round(v.gpm,0)} ÷ (${round(v.dh)}²−${round(v.dp)}²) = <b>${round(av,0)} ft/min</b>\nVt = ${round(av,0)} − ${round(v.vs,0)} = <b>${round(ctv,0)} ft/min</b>\nTR = ${round(ctv,0)} ÷ ${round(av,0)} = <b>${round(tr*100,0)}%</b>`,
      note:'Aim for transport ratio ≥ 50 % and annular cuttings concentration < 5 %. Slip velocity rises with larger, denser cuttings and thin muds; deviated holes need higher flow and a good low-shear-rate YP. Typical slip velocity 30–60 ft/min.'};
  }
});
def('Well Control',{
  id:'tripfill', name:'Trip Sheet — Hole Fill & Displacement', icon:'🪣',
  desc:'Barrels the hole should take (pulling) or give back (running) — trip-tank monitoring for early kick/loss detection.',
  inputs:[
    {k:'mode',label:'Operation',unit:'',def:'pull',rerender:true,opts:[['pull','Pulling out (POOH)'],['run','Running in (RIH)']]},
    {k:'fill',label:'Pipe condition',unit:'',def:'dry',opts:[['dry','Dry (mud drains / open-ended)'],['wet','Wet / plugged (full of mud, closed)']]},
    {k:'od',label:'Pipe / collar OD',unit:'in',def:5},
    {k:'id',label:'Pipe ID',unit:'in',def:4.276},
    {k:'stand',label:'Stand length',unit:'ft',def:93},
    {k:'n',label:'Stands moved',unit:'',def:5},
    {k:'actual',label:'Actual trip-tank change',unit:'bbl',def:0}
  ],
  calc(v){
    const dispBbl=(v.od*v.od-v.id*v.id)/K.CAP;   // steel displacement bbl/ft
    const closedBbl=(v.od*v.od)/K.CAP;           // closed-end bbl/ft
    const perFt=v.fill==='wet'? closedBbl : dispBbl;
    const len=v.stand*v.n;
    const expected=perFt*len;
    const perStand=perFt*v.stand;
    const diff=v.actual? v.actual-expected : 0;
    let flag='Enter the actual trip-tank change to compare';
    if(v.actual){
      const tol=Math.max(expected*0.1,0.5);
      if(v.mode==='pull'){
        flag = v.actual<expected-tol ? '⚠ Hole took LESS than expected — possible swab / kick (flow-check the well)' :
               v.actual>expected+tol ? 'Hole took MORE than expected — check for losses' : 'Within tolerance — hole taking correct volume';
      } else {
        flag = v.actual>expected+tol ? '⚠ More returns than displaced — possible kick' :
               v.actual<expected-tol ? 'Fewer returns than displaced — possible losses' : 'Within tolerance';
      }
    }
    return {main:{n:v.mode==='pull'?'Hole should TAKE':'Returns should GIVE',v:round(expected,2),u:'bbl'},
      rows:[
        {k:'Per stand',v:round(perStand,3)+' bbl'},
        {k:'Per foot',v:round(perFt,4)+' bbl/ft'},
        {k:'Length moved',v:round(len,0)+' ft  ('+round(v.n,0)+' stands)'},
        ...(v.actual?[{k:'Difference (actual − expected)',v:round(diff,2)+' bbl'}]:[]),
        {k:'Status',v:flag}
      ],
      formula:(v.fill==='wet'
        ?'Closed-end (wet) fill/ft = OD² ÷ 1029.4'
        :'Dry (open) fill/ft = (OD² − ID²) ÷ 1029.4')+'\nExpected = fill/ft × stand length × number of stands',
      steps:`fill/ft = ${v.fill==='wet'?`${round(v.od)}²`:`(${round(v.od)}²−${round(v.id)}²)`} ÷ 1029.4 = <b>${round(perFt,4)} bbl/ft</b>\nExpected = ${round(perFt,4)} × ${round(v.stand,0)} × ${round(v.n,0)} = <b>${round(expected,2)} bbl</b>`,
      note:'Fill the hole every 3–5 stands and compare the trip tank against this figure. A dry (open-ended) string displaces only its steel; a wet/plugged string displaces its full closed volume. If the hole fails to take the calculated volume while pulling, stop and flow-check — the well may be swabbing in an influx.'};
  }
});
def('Volumes',{
  id:'circtime', name:'Circulation & Lag Time', icon:'⏱️',
  desc:'Active-system volume with surface-to-bit (lag down), bottoms-up and total circulation strokes & time.',
  inputs:[
    {k:'md',label:'Measured Depth',unit:'ft',def:10000},
    {k:'id',label:'Drill Pipe ID',unit:'in',def:4.276},
    {k:'dh',label:'Hole / Casing ID',unit:'in',def:8.5},
    {k:'od',label:'Pipe OD',unit:'in',def:5},
    {k:'po',label:'Pump Output',unit:'bbl/stk',def:0.117},
    {k:'spm',label:'Pump Speed',unit:'spm',def:60},
    {k:'surf',label:'Surface (pits) volume',unit:'bbl',def:400}
  ],
  calc(v){
    if(v.po<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Pump output must be greater than zero.'};
    const strVol=(v.id*v.id)/K.CAP*v.md;
    const annVol=(v.dh*v.dh-v.od*v.od)/K.CAP*v.md;
    const downVol=strVol+annVol;
    const totVol=downVol+v.surf;
    const spmDiv=v.spm>0? v.spm : 1;
    const mk=vol=>({stk:vol/v.po, min:(vol/v.po)/spmDiv});
    const down=mk(strVol), bu=mk(annVol), full=mk(downVol), tot=mk(totVol);
    return {main:{n:'Bottoms-Up',v:round(bu.stk,0),u:'stk'},
      rows:[
        {k:'Bottoms-up time',v:round(bu.min,1)+' min  ('+round(bu.min/60,2)+' hr)'},
        {k:'Surface → bit (lag down)',v:round(down.stk,0)+' stk  /  '+round(down.min,1)+' min'},
        {k:'Full circulation (bit + up)',v:round(full.stk,0)+' stk  /  '+round(full.min,1)+' min'},
        {k:'Total active (incl. pits)',v:round(tot.stk,0)+' stk  /  '+round(tot.min,1)+' min'},
        {k:'String volume',v:round(strVol,1)+' bbl'},
        {k:'Annulus volume',v:round(annVol,1)+' bbl'},
        {k:'Total system',v:round(totVol,1)+' bbl'}
      ],
      formula:'String = ID²÷1029.4 × MD     Annulus = (Dh²−OD²)÷1029.4 × MD\nStrokes = volume ÷ pump output     Time = strokes ÷ SPM',
      steps:`Annulus = (${round(v.dh)}²−${round(v.od)}²)÷1029.4 × ${round(v.md,0)} = <b>${round(annVol,1)} bbl</b>\nBottoms-up = ${round(annVol,1)} ÷ ${round(v.po,3)} = <b>${round(bu.stk,0)} stk</b> = ${round(bu.min,1)} min`,
      note:'Single-section approximation — for a tapered string or multi-diameter hole, add each section\'s capacity separately. "Lag" (bottoms-up) is how long a cuttings sample or gas from bottom takes to reach surface; full circulation moves fresh mud from the suction all the way around.'};
  }
});
def('Cementing',{

/* ===== ADDED CALCULATORS (v4.2) — WPS / oil-on-cuttings / recommended parameters ===== */
/* CaCl2 brine property tables (wt% → SG @68°F, water activity Aw) for WPS work */
const CACL2_BRINE=[[0,1.000,1.00],[5,1.040,0.97],[10,1.083,0.93],[15,1.129,0.87],[20,1.178,0.79],[25,1.228,0.70],[30,1.282,0.595],[35,1.339,0.47],[40,1.398,0.34]];
function cacl2Interp(wt){ const t=CACL2_BRINE; if(wt<=t[0][0])return{sg:t[0][1],aw:t[0][2]}; const last=t[t.length-1]; if(wt>=last[0])return{sg:last[1],aw:last[2]};
  for(let i=0;i<t.length-1;i++){const a=t[i],b=t[i+1]; if(wt>=a[0]&&wt<=b[0]){const f=(wt-a[0])/(b[0]-a[0]); return{sg:a[1]+f*(b[1]-a[1]),aw:a[2]+f*(b[2]-a[2])};}} return{sg:last[1],aw:last[2]}; }

def('Chemistry',{
  id:'wps', name:'Water Phase Salinity (WPS)', icon:'🧂',
  desc:'Water-phase salinity of an oil-based mud from whole-mud chloride + retort — as CaCl₂ wt%, ppm and mg/L, with brine SG & water activity.',
  inputs:[
    {k:'cl',label:'Chlorides — whole mud',unit:'mg/L',def:39000},
    {k:'vw',label:'Water — retort',unit:'% by vol',def:23},
    {k:'salt',label:'Water-phase salt',unit:'',def:'CACL2',opts:[['CACL2','Calcium Chloride (CaCl₂)'],['NACL','Sodium Chloride (NaCl)']]}
  ],
  calc(v){
    if(v.vw<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Retort water must be greater than zero.'};
    const f = v.salt==='NACL'? 1.6485 : 1.565;                  // salt/2Cl mass ratio (CaCl₂ 110.98/70.91=1.5652, field/API rounds to 1.565)
    const name = v.salt==='NACL'? 'NaCl' : 'CaCl₂';
    const saltWM = v.cl*f;                                       // mg/L whole mud
    const wt = 100*saltWM/(saltWM + v.vw*1e4);                   // wt% of the water (brine) phase
    const ppm = wt*1e4;                                          // WPS ppm
    const br = v.salt==='NACL'? {sg:1+0.0072*wt,aw:1-0.006*wt} : cacl2Interp(wt);
    const brinePpg = br.sg*8.345;
    const saltBrine = ppm*br.sg;                                 // mg/L of brine phase
    return {main:{n:'Water Phase Salinity',v:round(wt,1),u:'% '+name},
      rows:[
        {k:'WPS',v:round(ppm,0)+' ppm  (mg/kg)'},
        {k:name+' in whole mud',v:round(saltWM,0)+' mg/L'},
        {k:name+' in water phase',v:round(saltBrine,0)+' mg/L'},
        {k:'Chloride in water phase',v:round(v.cl/(v.vw/100),0)+' mg/L'},
        {k:'Brine density',v:round(br.sg,3)+' SG  ('+round(brinePpg,2)+' ppg)'},
        {k:'Water activity (Aw)',v:round(br.aw,3)}
      ],
      formula:name+' (mg/L) = Cl⁻ × '+f+'\nWPS (wt%) = 100 × '+name+'(mg/L) ÷ ['+name+'(mg/L) + Water%×10⁴]\nWPS (ppm) = wt% × 10⁴',
      steps:`${name} = ${round(v.cl,0)} × ${f} = <b>${round(saltWM,0)} mg/L</b>\nWPS = 100 × ${round(saltWM,0)} ÷ (${round(saltWM,0)} + ${round(v.vw)}×10⁴) = <b>${round(wt,1)}% = ${round(ppm,0)} ppm</b>`,
      note:'Method — the field two-value calc (whole-mud chloride + retort water): salt(mg/L) = Cl⁻ × '+f+' (CaCl₂ 110.98/70.91 = 1.5652, API/MUDPRO+ round to 1.565; NaCl 1.6485), then wt% is the salt mass over brine mass (salt + retort water), and ppm = wt%×10⁴ (mg/kg of brine). Matches CPVEN & SCOMI DMRs exactly (39000 mg/L, 23% → 21 %, 209,717 ppm). Uses the retort water directly — for salt-corrected solids & brine content use the full API RP 13B-2 iteration.\n\nWater Phase Salinity keeps the internal brine at the right activity to balance shale pore-water and stop clay swelling. Typical OBM/NAF targets: CaCl₂ 25–30 wt% (WPS 200–240k ppm); ES is the emulsion-stability partner. Use the WPS Adjust tool to raise/lower it.'};
  }
});
def('Chemistry',{
  id:'wpsadj', name:'WPS Adjust (raise / lower)', icon:'⚗️',
  desc:'CaCl₂ to RAISE, or fresh water to LOWER, the water-phase salinity of an OBM to a target — accounting for salt purity.',
  inputs:[
    {k:'mode',label:'Adjust',unit:'',def:'up',rerender:true,opts:[['up','Raise WPS  (add CaCl₂)'],['down','Lower WPS  (add fresh water)']]},
    {k:'w1',label:'Present WPS',unit:'% CaCl₂',def:20},
    {k:'w2',label:'Target WPS',unit:'% CaCl₂',def:25},
    {k:'vol',label:'Mud volume to treat',unit:'bbl',def:800},
    {k:'vw',label:'Water — retort',unit:'% by vol',def:23},
    {k:'purity',label:'CaCl₂ purity (raise only)',unit:'%',def:94,when:v=>v.mode==='up'}
  ],
  calc(v){
    if(v.w1<=0||v.w1>=100||v.w2<=0||v.w2>=100) return {main:{n:'—',v:'—',u:''},rows:[],warn:'WPS values must be between 0 and 100 %.'};
    const waterBbl=v.vol*v.vw/100;                              // water phase volume
    const waterLb=waterBbl*350;                                 // fresh water mass (350 lb/bbl)
    const r=w=> w/(100-w);                                      // CaCl2 : water mass ratio
    if(v.mode==='up'){
      if(v.w2<=v.w1) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Target must be higher than present to raise WPS.'};
      const pureLb=waterLb*(r(v.w2)-r(v.w1));                   // dry CaCl2 (pure) to add
      const pf=(v.purity>0&&v.purity<=100)?v.purity/100:1;
      const grossLb=pureLb/pf;
      return {main:{n:'CaCl₂ to Add',v:round(grossLb,0),u:'lb'},
        rows:[
          {k:'Pure CaCl₂ needed',v:round(pureLb,0)+' lb  ('+round(pureLb*0.000453592,2)+' t)'},
          {k:'Commercial @ '+round(v.purity,0)+'%',v:round(grossLb,0)+' lb  ('+round(grossLb*0.000453592,2)+' t)'},
          {k:'Sacks (25 kg / 55 lb)',v:round(grossLb/55,0)+' sacks'},
          {k:'Water phase volume',v:round(waterBbl,1)+' bbl'},
          {k:'Concentration',v:round(grossLb/v.vol,2)+' lb/bbl of mud'}
        ],
        formula:'CaCl₂ (lb) = Water(lb) × [w₂/(100−w₂) − w₁/(100−w₁)]\nWater(lb) = mud vol × water% × 350\nCommercial = pure ÷ purity',
        steps:`Water = ${round(v.vol,0)} × ${round(v.vw)}% × 350 = <b>${round(waterLb,0)} lb</b>\nCaCl₂ = ${round(waterLb,0)} × (${round(r(v.w2),3)}−${round(r(v.w1),3)}) = <b>${round(pureLb,0)} lb pure</b>`,
        note:'Add dry CaCl₂ slowly through the hopper into a well-emulsified system; let it dissolve in the water phase, then re-check ES and HTHP. Raising WPS increases inhibition but too high drops water activity below the shale and can dehydrate/embrittle it.'};
    }
    // lower — add fresh water
    if(v.w2>=v.w1) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Target must be lower than present to lower WPS.'};
    const saltLb=waterLb*r(v.w1);                              // CaCl2 mass (constant)
    const water2=saltLb/r(v.w2);                               // required water mass at target
    const addLb=water2-waterLb, addBbl=addLb/350;
    return {main:{n:'Fresh Water to Add',v:round(addBbl,1),u:'bbl'},
      rows:[
        {k:'Water to add',v:round(addLb,0)+' lb  ('+round(addBbl,1)+' bbl)'},
        {k:'CaCl₂ held constant',v:round(saltLb,0)+' lb'},
        {k:'New water-phase volume',v:round((waterLb+addLb)/350,1)+' bbl'},
        {k:'Note',v:'re-emulsify & add wetting agent'}
      ],
      formula:'Water to add (lb) = CaCl₂ ÷ [w₂/(100−w₂)] − present water(lb)\nCaCl₂ = present water × w₁/(100−w₁)',
      steps:`CaCl₂ = ${round(waterLb,0)} × ${round(r(v.w1),3)} = <b>${round(saltLb,0)} lb</b>\nWater needed = ${round(saltLb,0)} ÷ ${round(r(v.w2),3)} = ${round(water2,0)} lb → add <b>${round(addBbl,1)} bbl</b>`,
      note:'Adding water lowers WPS but also lowers OWR and ES — add primary emulsifier & wetting agent and likely weight material to hold MW. Prefer diluting with pre-mixed low-salinity brine over raw water when a big drop is needed.'};
  }
});
def('Solids',{
  id:'ooc', name:'Oil on Cuttings (retention & loss)', icon:'🛢️',
  desc:'Retort-of-cuttings oil retention (ROC % by weight) plus daily base-oil lost with cuttings and its cost.',
  inputs:[
    {k:'oilv',label:'Oil on cuttings — retort',unit:'% by vol',def:12},
    {k:'solv',label:'Solids on cuttings — retort',unit:'% by vol',def:80},
    {k:'oilsg',label:'Base-oil SG',unit:'',def:0.80},
    {k:'cutsg',label:'Cuttings SG',unit:'',def:2.60},
    {k:'dh',label:'Hole diameter',unit:'in',def:8.5},
    {k:'rop',label:'ROP (avg)',unit:'ft/hr',def:40},
    {k:'price',label:'Base-oil price',unit:'/bbl',def:110}
  ],
  calc(v){
    const oilMass=v.oilv*v.oilsg, solMass=v.solv*v.cutsg;
    const roc = (oilMass+solMass)>0? 100*oilMass/(oilMass+solMass) : 0;   // % oil by weight (retained-oil-on-cuttings)
    const cutBblDay=(v.dh*v.dh)/K.CAP*v.rop*24;                            // in-situ cuttings bbl/day
    const oilBblDay = v.solv>0? cutBblDay*(v.oilv/v.solv) : 0;             // base oil clinging, bbl/day
    const costDay=oilBblDay*v.price;
    const limit = roc<6.9?'Within 6.9% retort limit (OSPAR)':'Above 6.9% — improve cuttings dryer / drilling detergent';
    return {main:{n:'Oil Retention (ROC)',v:round(roc,1),u:'% by wt'},
      rows:[
        {k:'Base oil lost with cuttings',v:round(oilBblDay,2)+' bbl/day  ('+round(oilBblDay*42,0)+' gal/day)'},
        {k:'Cuttings generated',v:round(cutBblDay,1)+' bbl/day'},
        {k:'Base-oil cost lost',v:round(costDay,0)+' /day  ('+round(costDay*30,0)+' /month)'},
        {k:'Oil : solids (retort)',v:round(v.oilv,0)+' : '+round(v.solv,0)+' by vol'},
        {k:'Discharge check',v:limit}
      ],
      formula:'ROC (%wt) = 100 × (Oilᵥ×SGₒ) ÷ (Oilᵥ×SGₒ + Solidsᵥ×SGc)\nOil lost = cuttings vol × (Oil% ÷ Solids%)\nCuttings (bbl/day) = Dh²÷1029.4 × ROP × 24',
      steps:`ROC = 100 × (${round(v.oilv)}×${round(v.oilsg,2)}) ÷ (${round(v.oilv)}×${round(v.oilsg,2)} + ${round(v.solv)}×${round(v.cutsg,2)}) = <b>${round(roc,1)}%</b>\nOil lost = ${round(cutBblDay,1)} × ${round(v.oilv)}/${round(v.solv)} = <b>${round(oilBblDay,2)} bbl/day</b>`,
      note:'Retort a washed, dried cuttings sample to get oil/water/solids. ROC (oil retained per weight of cuttings) drives NAF discharge compliance where allowed (OSPAR ≤ 6.9% by wt on dry cuttings). In Kuwait land wells cuttings are skipped/hauled — here the value is tracking BASE-OIL LOSS & cost, and flagging poor cuttings-dryer / shaker performance or over-oily mud. Reduce with a cuttings dryer, finer screens, wetting-agent balance and lower OWR where possible.'};
  }
});

 {id:'m_functions', name:'Functions of Drilling Fluid', icon:'📘', html:`

  <h4>Primary Functions</h4>
  <ol>
   <li><b>Remove cuttings from the wellbore</b> — carry drilled solids up the annulus and release them at surface. Governed by annular velocity, mud rheology (YP & gels) and hole angle.</li>
   <li><b>Control formation pressures</b> — hydrostatic column (<code>P = 0.052 × MW × TVD</code>) balances pore pressure to keep the well from flowing (kick) while staying below fracture pressure (losses).</li>
   <li><b>Suspend & release cuttings</b> — gel structure holds cuttings and weight material when circulation stops, yet releases them across the shakers.</li>
   <li><b>Seal permeable formations</b> — deposit a thin, low-permeability filter cake to limit fluid invasion.</li>
   <li><b>Maintain wellbore stability</b> — chemical & mechanical support of the open hole (inhibition of reactive shales, adequate mud weight).</li>
   <li><b>Minimise formation damage</b> — protect potential producing zones.</li>
   <li><b>Cool, clean & lubricate the bit and drill string.</b></li>
   <li><b>Transmit hydraulic energy</b> to tools and bit (jet impact, MWD pulses).</li>
   <li><b>Ensure adequate formation evaluation</b> — support logging & coring.</li>
   <li><b>Control corrosion</b> of drill string and casing.</li>
   <li><b>Facilitate cementing & completion.</b></li>
   <li><b>Minimise impact on the environment.</b></li>
  </ol>
  <div class="box"><b>Balancing act:</b> increasing weight controls pressure but can fracture weak zones; increasing viscosity improves cleaning but raises ECD and pump pressure. The mud engineer continuously trades these off.</div>
  <h4>Density & Pressure — the core relationship</h4>
  <div class="fbox">Hydrostatic pressure (psi) = 0.052 × Mud Weight (ppg) × TVD (ft)
Pressure gradient (psi/ft) = 0.052 × Mud Weight (ppg)
Equivalent mud weight (ppg) = Pressure (psi) ÷ (0.052 × TVD)</div>
  <p>The window between pore-pressure gradient and fracture gradient is the <b>"mud-weight window"</b>. Managed-pressure and casing-seat design both revolve around staying inside it.</p>
 `},
 {id:'m_testing', name:'Mud Testing (API RP 13B)', icon:'🧪', html:`
  <h3>Mud Testing &amp; Properties <span class="pill">API RP 13B</span></h3>
  <p class="lead">Routine field tests and what each result tells the engineer. Test at a stated temperature (usually 120 °F / 49 °C) for consistency.</p>
  <h4>Density (Mud Weight)</h4>
  <p>Measured with a <b>mud balance</b>. Report in ppg, lb/ft³, psi/ft or SG. Calibrate with fresh water (8.33 ppg / 1.0 SG).</p>
  <h4>Rheology — 6-speed Viscometer</h4>
  <table><tr><th>Parameter</th><th>Formula</th><th>Meaning</th></tr>
   <tr><td>Plastic Viscosity (PV)</td><td>θ600 − θ300</td><td>Mechanical friction — mostly solids content/size</td></tr>
   <tr><td>Yield Point (YP)</td><td>2·θ300 − θ600</td><td>Electro-chemical attraction — carrying capacity</td></tr>
   <tr><td>Apparent Viscosity</td><td>θ600 ÷ 2</td><td>Single-point "effective" viscosity (cP)</td></tr>
   <tr><td>Gel Strength</td><td>θ3 @ 10 s / 10 min</td><td>Thixotropy — suspension when static</td></tr>
  </table>
  <h4>Funnel Viscosity (Marsh)</h4>
  <p>Seconds for 1 qt to drain — a quick relative check, not a true viscosity. Water ≈ 26 s/qt.</p>
  <h4>Filtration (Fluid Loss)</h4>
  <p><b>API (LPLT):</b> 100 psi, 30 min, ambient. <b>HPHT:</b> 500 psi differential at formation temperature. Report filtrate volume (mL/30 min) and cake thickness (1/32 in). Thin, tough cake is the goal.</p>
  <h4>Sand Content</h4>
  <p>% by volume retained on a 200-mesh screen. Keep < 1–2 % to protect pumps and bit.</p>
  <h4>Retort (Solids/Liquids)</h4>
  <p>Distills a known volume of mud → % oil, % water, % solids by volume. Feeds the solids analysis (LGS/HGS).</p>
  <h4>Chemical (Filtrate) Tests</h4>
  <ul>
   <li><b>pH</b> — meter or strip; most water muds run 9–10.5.</li>
   <li><b>Alkalinity Pf / Mf / Pm</b> — carbonate/bicarbonate & lime.</li>
   <li><b>Chlorides</b> — AgNO₃ titration.</li>
   <li><b>Total Hardness</b> — EDTA titration (Ca²⁺/Mg²⁺).</li>
   <li><b>MBT</b> — reactive-clay content (methylene blue).</li>
  </ul>
  <div class="box">Use the <b>Chemistry</b> and <b>Solids</b> calculators in this app to turn these titration volumes directly into ppm, lb/bbl and vol %.</div>
 `},
 {id:'m_rheology', name:'Rheology & Hydraulics', icon:'📊', html:`
  <h3>Rheology &amp; Hydraulics</h3>
  <p class="lead">Rheology describes how mud flows; hydraulics applies it to pressure losses, hole cleaning and ECD.</p>
  <h4>Flow Models</h4>
  <ul>
   <li><b>Bingham Plastic</b> — PV & YP. Simple, slightly over-predicts at low shear.</li>
   <li><b>Power Law</b> — n (flow index) & K (consistency). Better at low shear.</li>
   <li><b>Herschel–Bulkley (Yield-Power-Law)</b> — τ = τ₀ + K·γⁿ. Most accurate; used by modern hydraulics software.</li>
  </ul>
  <div class="fbox">n = 3.32 · log(θ600 / θ300)        (pipe)
K = 5.11 · θ300 / 511ⁿ
n_annulus = 0.657 · log(θ100 / θ3)
Lower n ⇒ more shear-thinning ⇒ better low-rate hole cleaning</div>
  <h4>Flow Regimes</h4>
  <p><b>Laminar</b> (smooth, layered) is preferred in the annulus for cleaning and to limit erosion. <b>Turbulent</b> flow (high Reynolds number) is used at the bit for cleaning the cutting structure. The transition is judged by Reynolds number / critical velocity.</p>
  <h4>Annular Velocity &amp; Hole Cleaning</h4>
  <div class="fbox">AV (ft/min) = 24.51 × Q (gpm) ÷ (Dh² − Dp²)</div>
  <p>Cuttings transport depends on AV vs. cutting <b>slip velocity</b>. In deviated wells (30–60°) cuttings beds form on the low side — raise flow rate, YP and low-shear-rate viscosity, and rotate the string.</p>
  <h4>Equivalent Circulating Density (ECD)</h4>
  <div class="fbox">ECD = MW + P_annular_loss ÷ (0.052 × TVD)</div>
  <p>ECD is the <i>dynamic</i> bottom-hole density. It rises with flow rate, viscosity, cuttings loading and depth. Excess ECD fractures the formation → losses. Surge/swab while tripping are the transient cousins of ECD.</p>
  <div class="box"><b>Optimisation:</b> maximise bit hydraulic horsepower or jet impact force while keeping annular flow laminar and ECD inside the window. The <b>Rheology</b> and <b>ECD</b> calculators cover the field math.</div>
 `},
 {id:'m_filtration', name:'Filtration Control', icon:'🚿', html:`
  <h3>Filtration Control</h3>
  <p class="lead">When mud pressure exceeds formation pressure across a permeable zone, filtrate invades and a filter cake builds. Controlling both protects the hole and the reservoir.</p>
  <h4>Why control it</h4>
  <ul>
   <li>Thick cake → tight hole, stuck pipe, swab/surge, poor cement bond.</li>
   <li>Deep filtrate invasion → formation damage, unstable shale, bad logs.</li>
  </ul>
  <h4>What makes a good cake</h4>
  <p>Thin, slick, tough, low-permeability. Achieved with a broad particle-size distribution that bridges pore throats (bentonite + fine sized bridging solids) plus polymers that plug the cake.</p>
  <h4>Additives</h4>
  <table><tr><th>Additive</th><th>Role</th></tr>
   <tr><td>Bentonite</td><td>Primary filtration control in water muds; builds cake</td></tr>
   <tr><td>PAC / CMC (cellulosics)</td><td>Fluid-loss polymers; also viscosify</td></tr>
   <tr><td>Starch</td><td>Fluid loss in salt/inhibitive muds (needs biocide or salt)</td></tr>
   <tr><td>Lignite / Lignosulfonate</td><td>HTHP fluid-loss & deflocculant</td></tr>
   <tr><td>Resins / latex</td><td>HPHT cake sealing</td></tr>
   <tr><td>Sized CaCO₃ / graphite</td><td>Bridging for drill-in fluids (acid-soluble)</td></tr>
  </table>
  <h4>API vs HPHT</h4>
  <p>API filtrate at 100 psi / ambient understates downhole loss. Always run HPHT (500 psi at BHT) on weighted/deep muds — cake quality and spurt loss change dramatically with temperature.</p>
  <div class="box"><b>Rule:</b> low, controlled fluid loss + thin cake beats a "zero" reading built with excess solids. Watch total solids and cake thickness together.</div>
 `},
 {id:'m_solids', name:'Solids Control', icon:'⚙️', html:`
  <h3>Solids Control</h3>
  <p class="lead">The single biggest lever on mud cost and drilling performance. "Dilution is expensive; removal is cheap."</p>
  <h4>Two kinds of solids</h4>
  <ul>
   <li><b>High-Gravity Solids (HGS)</b> — barite (SG 4.2), hematite (SG 5.0). <i>Desirable</i> — they carry weight.</li>
   <li><b>Low-Gravity Solids (LGS)</b> — drilled clays/sand + bentonite (SG ~2.6). <i>Mostly undesirable</i> — they thicken mud, raise ECD, cut ROP.</li>
  </ul>
  <h4>Targets</h4>
  <table><tr><th>Mud</th><th>Total solids</th><th>LGS</th></tr>
   <tr><td>Unweighted</td><td>&lt; 6 %</td><td>&lt; 6 %</td></tr>
   <tr><td>Weighted (12–14 ppg)</td><td>per weight</td><td>&lt; 5 %</td></tr>
   <tr><td>Heavy (16 ppg+)</td><td>per weight</td><td>&lt; 4 %</td></tr>
  </table>
  <h4>Removal equipment (coarse → fine)</h4>
  <ol>
   <li><b>Shale shakers</b> — first & most important line; fine screens (API 170–200) remove most drilled solids.</li>
   <li><b>Degasser</b> — removes entrained gas.</li>
   <li><b>Desander</b> (hydrocyclones) — down to ~74 µm (unweighted mud).</li>
   <li><b>Desilter</b> — down to ~15–40 µm (unweighted mud).</li>
   <li><b>Centrifuge</b> — finest cut; recovers barite / discards ultra-fines on weighted mud.</li>
  </ol>
  <div class="box"><b>Key idea:</b> hydrocyclones are bypassed on weighted mud (they'd throw away barite). There, the centrifuge splits barite (return) from fine LGS + liquid (discard), and dilution controls the rest. Use the <b>Solids Analysis</b> calculator to track LGS/HGS every tour.</div>
 `},
 {id:'m_wbm', name:'Water-Based Systems', icon:'💧', html:`
  <h3>Water-Based Mud (WBM) Systems</h3>
  <p class="lead">Water is the continuous phase. Cheapest and most environmentally acceptable; the default unless conditions demand oil/synthetic.</p>
  <h4>Categories</h4>
  <table><tr><th>System</th><th>Basis</th><th>Use</th></tr>
   <tr><td>Spud / Native</td><td>Water + native clays</td><td>Top hole</td></tr>
   <tr><td>Bentonite / Gel</td><td>Bentonite + thinners</td><td>Simple vertical wells</td></tr>
   <tr><td>Lignosulfonate (dispersed)</td><td>Deflocculant + lignite</td><td>Deeper/hotter, weighted</td></tr>
   <tr><td>Polymer (PHPA)</td><td>Encapsulating polymer</td><td>Shale encapsulation, high ROP</td></tr>
   <tr><td>KCl / Polymer</td><td>K⁺ + PHPA/glycol</td><td>Reactive shale inhibition</td></tr>
   <tr><td>Salt-saturated</td><td>NaCl / KCl brine</td><td>Salt sections</td></tr>
   <tr><td>Silicate / Cationic</td><td>Sodium silicate etc.</td><td>Highly reactive shale</td></tr>
  </table>
  <h4>Shale inhibition ladder</h4>
  <p>Fresh gel → KCl → KCl/glycol → silicate. K⁺ ions fix the clay lattice; glycols & amines provide cloud-point/membrane inhibition; encapsulators coat cuttings to stop dispersion.</p>
  <div class="box"><b>Watch:</b> hardness (Ca²⁺/Mg²⁺) and carbonates degrade clay and polymer muds — treat with soda ash / lime as the <b>Alkalinity</b> and <b>Hardness</b> calculators indicate.</div>
 `},
 {id:'m_obm', name:'Oil & Synthetic Systems (NAF)', icon:'🛢️', html:`
  <h3>Oil-Based &amp; Synthetic (Non-Aqueous) Fluids</h3>
  <p class="lead">Oil or synthetic is the continuous phase, with brine emulsified inside. Superior inhibition, lubricity and thermal stability — at higher cost and environmental burden.</p>
  <h4>Why use NAF</h4>
  <ul>
   <li>Excellent shale stability (water is emulsified, not free).</li>
   <li>High lubricity → deviated/ERD wells, less torque & drag & stuck pipe.</li>
   <li>Thermal stability to high BHT; wide density range.</li>
   <li>Low corrosion; reusable across wells.</li>
  </ul>
  <h4>Key properties</h4>
  <table><tr><th>Property</th><th>Notes</th></tr>
   <tr><td>Oil/Water Ratio (OWR)</td><td>Typically 70/30–90/10; controls stability & cost</td></tr>
   <tr><td>Electrical Stability (ES)</td><td>Emulsion tightness — volts; falling ES = weakening emulsion</td></tr>
   <tr><td>Water phase salinity</td><td>CaCl₂ brine activity balanced to shale to stop water transfer</td></tr>
   <tr><td>Excess lime</td><td>Alkalinity reserve for emulsifiers & CO₂/H₂S</td></tr>
  </table>
  <h4>Components</h4>
  <p>Base fluid (diesel / mineral oil / synthetic — ester, olefin, paraffin), primary & secondary emulsifiers, organophilic clay (viscosity), organophilic lignite (HPHT fluid loss), lime, CaCl₂ brine, weight material.</p>
  <div class="box"><b>Rising water % / falling ES</b> = water influx or emulsion breakdown → add emulsifier + oil and re-balance the <b>OWR</b> (see calculator). Synthetics (SBM) give OBM performance with better environmental discharge profiles.</div>
 `},
 {id:'m_lcm', name:'Lost Circulation', icon:'🕳️', html:`
  <h3>Lost Circulation</h3>
  <p class="lead">Partial or total loss of mud to the formation. Costly and a well-control risk (losses can induce a kick).</p>
  <h4>Types of loss zone</h4>
  <table><tr><th>Type</th><th>Severity</th></tr>
   <tr><td>Permeable / seepage</td><td>&lt; 10 bbl/hr — gradual</td></tr>
   <tr><td>Natural fractures</td><td>Moderate–severe</td></tr>
   <tr><td>Induced fractures (ECD/surge)</td><td>Severe; often preventable</td></tr>
   <tr><td>Cavernous / vugular</td><td>Total losses, no returns</td></tr>
  </table>
  <h4>LCM by particle type</h4>
  <ul>
   <li><b>Fibrous</b> — cedar fibre, cellulose (mat over pores).</li>
   <li><b>Flake</b> — mica, cellophane (overlap & seal).</li>
   <li><b>Granular</b> — CaCO₃, nut plug, graphite (bridge & wedge).</li>
   <li><b>Blends</b> — combined sizes for wider fracture bridging.</li>
  </ul>
  <h4>Escalation ladder</h4>
  <ol>
   <li>Reduce ECD: cut pump rate, thin the mud, lower MW to minimum safe.</li>
   <li>Add LCM sweeps (fine → medium → coarse).</li>
   <li>High-fluid-loss / hi-viscosity "gunk" or diesel-oil-bentonite pills.</li>
   <li>Cross-linked / cement / barite plugs for severe losses.</li>
   <li>Wellbore strengthening (stress cage) to prevent recurrence.</li>
  </ol>
  <div class="box"><b>Well-control link:</b> if the hole won't stay full, monitor for kicks — losses can drop hydrostatic below pore pressure. Keep the annulus full with base fluid.</div>
 `},
 {id:'m_stuck', name:'Stuck Pipe & Differential Sticking', icon:'📌', html:`
  <h3>Stuck Pipe</h3>
  <p class="lead">Two broad mechanisms — <b>differential sticking</b> and <b>mechanical (pack-off / wellbore geometry)</b>. Prevention is far cheaper than freeing.</p>
  <h4>Differential Sticking</h4>
  <p>String pressed against a thick filter cake across a permeable zone; overbalance holds it there. Signs: <i>no</i> loss of circulation, can't move pipe, but circulation is free.</p>
  <ul>
   <li><b>Prevent:</b> minimise overbalance, thin cake (good filtration & solids control), spiral/low-wall-contact BHA, keep pipe moving.</li>
   <li><b>Free:</b> reduce hydrostatic (spot a lubricant / diesel-oil pill), work pipe, back-off if needed.</li>
  </ul>
  <h4>Mechanical Sticking</h4>
  <table><tr><th>Cause</th><th>Clue</th></tr>
   <tr><td>Pack-off (cuttings/cavings)</td><td>Circulation restricted, tight while moving</td></tr>
   <tr><td>Reactive/sloughing shale</td><td>Cavings at shakers, over-pull</td></tr>
   <tr><td>Undergauge hole / key seat</td><td>Tight only at certain depths</td></tr>
   <tr><td>Ledges / doglegs</td><td>Tight pulling up through same spot</td></tr>
  </table>
  <div class="box"><b>Mud's role:</b> good hole cleaning (rheology + AV), shale inhibition, thin slick cake and adequate lubricity prevent most sticking. A spotting-pill volume comes straight from the annular-capacity calculator.</div>
 `},
 {id:'m_corrosion', name:'Corrosion & Contaminants', icon:'🧫', html:`
  <h3>Corrosion &amp; Contamination</h3>
  <p class="lead">Corrosion attacks the drill string and casing; contaminants degrade mud properties. Both are monitored chemically.</p>
  <h4>Corrosive agents</h4>
  <ul>
   <li><b>Oxygen</b> — pitting; from surface mixing/aeration. Treat with oxygen scavengers, minimise aeration.</li>
   <li><b>CO₂</b> — carbonic acid, carbonate build-up. Treat with lime.</li>
   <li><b>H₂S</b> — extremely toxic + rapid embrittlement. Treat with zinc scavengers, raise pH ≥ 11, follow HSE gas plan.</li>
   <li><b>Dissolved salts / low pH</b> — accelerate all of the above.</li>
  </ul>
  <h4>Common mud contaminants</h4>
  <table><tr><th>Contaminant</th><th>Effect</th><th>Treatment</th></tr>
   <tr><td>Cement / lime</td><td>High pH, flocculation, high YP</td><td>SAPP / bicarb, gyp</td></tr>
   <tr><td>Anhydrite / Gypsum (Ca²⁺)</td><td>Flocculation, fluid-loss up</td><td>Soda ash, deflocculant</td></tr>
   <tr><td>Salt / saltwater flow</td><td>Chlorides up, viscosity swings</td><td>Water, polymer, convert to salt mud</td></tr>
   <tr><td>CO₂ / HCO₃⁻</td><td>High rheology & fluid loss</td><td>Lime, gyp</td></tr>
   <tr><td>Drilled solids</td><td>Thick mud, high ECD</td><td>Solids control + dilution</td></tr>
  </table>
  <div class="box">Corrosion coupons (weight-loss rings) in the string quantify the rate (lb/ft²/yr) and pitting index. Combine with the <b>Alkalinity</b>, <b>Chlorides</b> and <b>Hardness</b> calculators to diagnose contamination early.</div>
 `},
 {id:'m_hse', name:'Health, Safety & Environment', icon:'🦺', html:`
  <h3>Health, Safety &amp; Environment</h3>
  <p class="lead">Mud engineering is chemical handling on an industrial site. Every product has an SDS; every discharge is regulated.</p>
  <h4>Personal safety</h4>
  <ul>
   <li>Read the <b>SDS</b> before handling any product; know PPE (goggles, gloves, respirator for dusty barite/cement/caustic).</li>
   <li><b>Caustic soda (NaOH), lime, acids</b> — corrosive; add slowly to water, never water to caustic.</li>
   <li><b>H₂S</b> — personal monitors, escape sets, wind-sock awareness, muster drills.</li>
   <li>Barite/silica dust — respirable-dust controls (silicosis risk).</li>
  </ul>
  <h4>Environmental</h4>
  <ul>
   <li>WBM is generally the most dischargeable; OBM cuttings usually require treatment (thermal desorption, cuttings re-injection) or skip-and-ship.</li>
   <li>Synthetics (SBM) were developed for OBM performance with a better discharge profile (biodegradation, low aromatics).</li>
   <li>Track base-oil retention on cuttings (e.g. discharge limits), and log all product usage.</li>
  </ul>
  <div class="box"><b>Golden rules:</b> know your SDS, contain spills, segregate & label waste, never discharge without authorisation, and keep an accurate product/mud report. Housekeeping around the pits and shakers prevents most incidents.</div>
 `},
 {id:'m_formulas', name:'Formula Quick-Reference', icon:'📐', html:`
  <h3>Field Formula Quick-Reference</h3>
  <p class="lead">Every working formula in this app, in one place. US oilfield units unless noted.</p>
  <h4>Pressure &amp; Density</h4>
  <div class="fbox">Hydrostatic P (psi)      = 0.052 × MW(ppg) × TVD(ft)
Gradient (psi/ft)        = 0.052 × MW(ppg)
MW required (ppg)        = (Pf + Overbalance) ÷ (0.052 × TVD)
ECD (ppg)                = MW + APL(psi) ÷ (0.052 × TVD)</div>
  <h4>Weight Control</h4>
  <div class="fbox">Barite (lb/bbl)          = 1470 × (W2−W1) ÷ (35 − W2)
  (general)  lb/bbl       = Dm×42 × (W2−W1) ÷ (Dm − W2)
Vol increase/bbl         = (W2−W1) ÷ (Dm − W2)
Water to dilute (bbl)    = V1 × (W1−W2) ÷ (W2 − Wdil)
Mix two muds (ppg)       = (V1·W1 + V2·W2) ÷ (V1+V2)</div>
  <h4>Volumes &amp; Pump</h4>
  <div class="fbox">Capacity (bbl/ft)        = (D1² − D2²) ÷ 1029.4      (pipe: ID² only)
Metric (L/m)             = ID(mm)² × 0.0007854
Triplex (bbl/stk)        = 0.000243 × D² × S × eff
Duplex  (bbl/stk)        = 0.000162 × S × (2D² − d²) × eff
Strokes                  = Volume(bbl) ÷ output(bbl/stk)
Annular Vel (ft/min)     = 24.51 × Q(gpm) ÷ (Dh² − Dp²)</div>
  <h4>Rheology</h4>
  <div class="fbox">PV = θ600 − θ300      YP = 2·θ300 − θ600      AV = θ600 ÷ 2
n  = 3.32 · log(θ600/θ300)        K = 5.11·θ300 ÷ 511ⁿ
n_ann = 0.657 · log(θ100/θ3)</div>
  <h4>Solids</h4>
  <div class="fbox">Vs = 100 − %oil − %water
ASG = [100·(MW/8.33) − SGw·Vw − SGo·Vo] ÷ Vs
%LGS = Vs·(4.2 − ASG)/(4.2 − 2.6)      %HGS = Vs − %LGS
lb/bbl of solids = vol_fraction × SG × 350
MBT (lb/bbl) = 5 × mL MB ÷ mL sample</div>
  <h4>Chemistry (API RP 13B)</h4>
  <div class="fbox">Cl⁻ (mg/L)  = mL AgNO₃ × 1000 ÷ mL sample   (0.0282 N)
NaCl (mg/L) = Cl⁻ × 1.65
Hardness (mg/L Ca) = mL EDTA × 400 ÷ mL sample
Excess Lime (lb/bbl) = 0.26 × (Pm − Fw·Pf)</div>
  <h4>Well Control</h4>
  <div class="fbox">KMW (ppg) = MW + SIDPP ÷ (0.052 × TVD)
ICP = SIDPP + Slow-Circ-Rate Pressure
FCP = SCRP × KMW ÷ MW</div>
  <h4>Handy constants</h4>
  <div class="fbox">1 bbl = 42 US gal = 5.6146 ft³ = 0.15899 m³
1 SG  = 8.345 ppg      1 m = 3.2808 ft
Barite SG 4.2 (35 ppg, ~1470 lb/bbl)   Water 8.33 ppg
1 bbl fresh water = 350 lb</div>
 `},
 {id:'m_glossary', name:'Glossary', icon:'📖', html:`
  <h3>Glossary of Mud Terms</h3>
  <table>
   <tr><th>Term</th><th>Meaning</th></tr>
   <tr><td>API</td><td>American Petroleum Institute — sets test standards (RP 13B).</td></tr>
   <tr><td>Barite</td><td>Barium sulphate weight material, SG 4.2 (~35 ppg).</td></tr>
   <tr><td>Bentonite (gel)</td><td>Sodium montmorillonite clay — viscosity & fluid-loss control.</td></tr>
   <tr><td>BHT</td><td>Bottom-hole temperature.</td></tr>
   <tr><td>Deflocculant / Thinner</td><td>Chemical that reduces clay attraction (lowers YP/gels).</td></tr>
   <tr><td>ECD</td><td>Equivalent circulating density — dynamic downhole density.</td></tr>
   <tr><td>Filter cake</td><td>Solids deposited on the wall as filtrate leaks off.</td></tr>
   <tr><td>Flocculation</td><td>Edge-to-edge clay linking → high gels/YP.</td></tr>
   <tr><td>Gel strength</td><td>Thixotropic shear stress after rest (10 s/10 min).</td></tr>
   <tr><td>HGS / LGS</td><td>High- / low-gravity solids.</td></tr>
   <tr><td>HPHT</td><td>High pressure / high temperature.</td></tr>
   <tr><td>MBT</td><td>Methylene-blue test — reactive-clay content.</td></tr>
   <tr><td>NAF</td><td>Non-aqueous fluid (oil- or synthetic-based mud).</td></tr>
   <tr><td>Overbalance</td><td>Mud hydrostatic minus pore pressure.</td></tr>
   <tr><td>OWR</td><td>Oil-water ratio in a NAF.</td></tr>
   <tr><td>PV / YP</td><td>Plastic viscosity / yield point (Bingham).</td></tr>
   <tr><td>Pf / Mf / Pm</td><td>Phenolphthalein & methyl-orange alkalinities (filtrate / mud).</td></tr>
   <tr><td>PHPA</td><td>Partially-hydrolysed polyacrylamide — shale encapsulator.</td></tr>
   <tr><td>Rheology</td><td>Study of flow & deformation of the mud.</td></tr>
   <tr><td>Spurt loss</td><td>Instant filtrate before the cake forms.</td></tr>
   <tr><td>SPM</td><td>Pump strokes per minute.</td></tr>
   <tr><td>TVD / MD</td><td>True vertical depth / measured depth.</td></tr>
   <tr><td>Yield (clay)</td><td>bbl of 15-cP mud one ton of clay makes.</td></tr>

/* course = {id,name,icon,desc, modules:[{title,points:[],box?}], quiz:[{q,options:[],answer,explain}]} */
const TRAINING = [{"id":"ms_intro","name":"1 · Introduction to Drilling Fluids","icon":"📗","desc":"A plain-language tour of where oil comes from, how a rig drills a well, and where the mud fits in.","modules":[{"title":"Where Oil and Gas Come From","intro":"Before we talk about mud, let's understand what we're drilling for. Oil and gas didn't appear out of nowhere. They are the leftovers of tiny plants and animals that lived in ancient seas millions of years ago. When they died, they got buried under mud and sand, and over a very long time the heat and pressure deep underground slowly cooked them into oil and gas.","points":["The word 'petroleum' literally means 'rock oil' (petra = rock, oleum = oil) because it lives inside rocks.","Oil, gas, coal, and tar are all 'fossil fuels' — the cooked remains of ancient living things.","Petroleum is made of hydrocarbons, which just means molecules built from hydrogen atoms and carbon atoms stuck together.","The simplest one is methane (natural gas), which is one carbon and four hydrogens.","The oil formed inside a 'source rock' but then slowly squeezed out and moved somewhere else over millions of years.","Because of this movement, we almost never find oil where it was born — we find it where it collected."],"box":"Think of it like a sponge deep underground: the oil was made in one layer, then got squeezed out and traveled until something stopped it."},{"title":"How Oil Gets Trapped Underground","intro":"Oil and gas are lighter than water, so underground they try to float upward through the tiny holes in the rock. They keep moving until they hit a rock they can't get through. That barrier stops them, and they pile up underneath it. That pile-up spot is what we call a reservoir, and the barrier is called a trap.","points":["'Porosity' means how much empty space (tiny holes) a rock has to hold fluid, like the holes in a sponge.","'Permeability' means whether those holes connect to each other so fluid can flow through — a sponge with connected holes lets water pass.","Sandstone and limestone are common reservoir rocks because they have good porosity and permeability.","Gas is lightest so it rises to the top, oil sits in the middle, and salty water settles at the bottom.","A 'structural trap' forms when rock layers get bent (a fold/anticline) or cracked and shifted (a fault).","A 'stratigraphic trap' forms when the rock type itself changes, like a buried old coral reef or a sand-filled riverbed sealed by clay.","Salt underground is special: it can push up through other rock and, because oil can't pass through salt, it makes an excellent trap."],"box":"A trap is like an upside-down bowl of solid rock: oil floats up, gets stuck under the bowl, and collects there instead of escaping to the surface."},{"title":"Finding Oil and Drilling the First Well","intro":"Knowing that traps exist is one thing; finding one buried thousands of feet down is another. Geologists use several tools to guess where oil might be, but the only way to know for sure is to drill a hole and look. Let's see how drilling itself works.","points":["Aerial and satellite surveys give a big-picture view of the land and hint at large structures below.","Geologists study rocks that poke out at the surface (outcrops) to guess what the layers look like underground.","The most powerful tool is seismic: they make shock waves at the surface and listen for the echoes bouncing off rock layers, like sonar for the earth.","The old 'cable tool' method just pounded a heavy bit up and down to smash a hole — slow, and only good for shallow wells.","Modern 'rotary drilling' spins a bit that grinds through rock while weight pushes it down — this is how nearly all wells are drilled today.","In rotary drilling, mud is pumped down to cool the bit and carry the broken rock (cuttings) up and out of the hole — this is where drilling fluid first appears."],"box":"The big advantage of rotary drilling over the old pounding method is the mud: it clears the cuttings out while you keep drilling, instead of stopping to bail them."},{"title":"The Drillstring, the Bit, and the Rig","intro":"The tool that actually cuts the rock is the bit at the very bottom. Above it is a long string of steel pipe that reaches all the way back to the surface. The whole tall structure that lifts and holds this pipe is the rig. Let's meet the main parts.","points":["The 'drillstring' is the long chain of hollow steel pipe, about 30 ft per joint, that connects the bit at the bottom to the rig at the top.","'Drill collars' are extra-heavy pipe just above the bit; their weight pushes down on the bit to help it bite into the rock.","Roller-cone bits crush hard rock with cone-shaped cutters, while PDC bits shear rock with diamond cutters and drill fast in soft-to-medium formations.","The bit can be turned three ways: by a rotary table and kelly, by a top-drive motor up in the derrick, or by a mud motor that spins only the bit downhole.","The 'annulus' is the gap between the drillstring and the wall of the hole — this is the path the mud takes on its way back up carrying cuttings.","The 'derrick' is the tall tower, and the 'drawworks' is the big winch that raises and lowers the heavy pipe using cable and pulleys.","MWD and LWD tools take measurements while drilling and send the readings up to the surface as pressure pulses through the mud itself."],"box":"Because MWD/LWD tools 'talk' to the surface by sending pulses through the mud, the condition of the mud really matters on those wells — bad mud can garble the signal."},{"title":"The Mud Circulation System","intro":"The mud doesn't just sit there — it goes on a full loop, or circulation. Understanding this loop is the heart of mud work, because everything a mud engineer does happens somewhere along this path. Let's follow one drop of mud around the whole trip.","points":["Big 'mud pumps' are the heart of the system; they push the mud at high pressure — some make up to 5,000 psi.","The mud goes up the standpipe, through a hose, down through the swivel and kelly, and into the top of the hollow drillstring.","It shoots out through small nozzles (jets) in the bit, which speeds it up so it blasts the rock cuttings loose.","Then it flows back up the annulus, carrying the cuttings with it, and out the flow line at the surface.","The 'shale shaker' is a vibrating screen that catches the cuttings while the clean mud falls through.","The mud then passes through settling and cleaning pits where sand, silt, and gas are removed before the pumps pick it up again.","New chemicals and weighting material are added at the suction pit, often through a mixing hopper, to keep the mud in good shape."],"box":"The mud is the 'lifeblood' of the rig, and the pumps are its heart — the same fluid keeps circulating around and around, being cleaned and re-used each trip."},{"title":"Well Control, Casing, and Finishing the Well","intro":"Drilling safely means keeping the underground fluids under control, then lining and finishing the hole so it can produce oil for years. This last module covers the safety and finishing steps that surround the drilling itself.","points":["If underground gas, oil, or saltwater pushes into the well uncontrolled, it's called a 'kick' — and if not stopped it can become a dangerous blowout.","Heavy mud is the first line of defense: its weight presses back and keeps those fluids from entering the hole.","'Blowout Preventers' (BOPs) are a stack of huge valves at the surface that can seal the well shut if a kick happens.","'Casing' is steel pipe cemented into the hole to keep it from caving in and to protect fresh water and separate different rock zones.","A 'liner' is a shorter string of casing that only covers the lower part of the hole instead of reaching the surface.","The well is evaluated with mud logging, coring, and wireline logging to learn what the rock and fluids are really like.","Finally, 'completion' makes the well ready to produce — through open hole, perforated casing, or gravel packing — and it flows or is pumped to the surface."],"box":"Mud weight is quiet, everyday well control: it holds back the pressure so calmly that the loud emergency tools (the BOPs) rarely have to be used."}],"quiz":[{"q":"Why do we usually find oil in a different rock than where it formed?","options":["Because oil is heavier than rock and sinks","Because oil slowly migrates (moves) until a trap stops it","Because drilling pushes the oil sideways","Because oil only forms near the surface"],"answer":1,"explain":"Oil is lighter than water, so it floats upward and moves through the rock until a barrier (trap) blocks it and it collects there."},{"q":"What is the main job of drilling mud during rotary drilling?","options":["To make the rock softer","To cool the bit and carry cuttings up out of the hole","To color the water for the crew","To replace the drill pipe"],"answer":1,"explain":"Mud cools and lubricates the bit and lifts the broken rock (cuttings) up the annulus so drilling can continue without stopping to bail."},{"q":"What is the 'annulus'?","options":["The tall tower on the rig","The gap between the drillstring and the wall of the hole","The pump that moves the mud","The screen that catches cuttings"],"answer":1,"explain":"The annulus is the space between the outside of the drill pipe and the borehole wall — the return path the mud takes back to surface."},{"q":"What is a 'kick'?","options":["When the bit wears out","When formation fluids push into the well uncontrolled","When the mud pump speeds up","When the crew changes the drill pipe"],"answer":1,"explain":"A kick is when underground gas, oil, or saltwater enters the wellbore. Heavy mud helps prevent it, and BOPs can seal the well if one occurs."},{"q":"What does the shale shaker do?","options":["It heats the mud","It vibrates screens to separate cuttings from the mud","It adds chemicals to the mud","It pumps the mud downhole"],"answer":1,"explain":"The shale shaker is a
