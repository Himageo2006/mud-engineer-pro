<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Mud Engineer Pro — Drilling Fluids Calculator & Manual</title>
<meta name="theme-color" content="#e8a33d"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Mud Engineer Pro"/>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icon.svg"/>
<link rel="icon" href="icon.svg" type="image/svg+xml"/>
<style>
:root{
  /* DARK (default) — rich navy base so colors pop, clearly elevated surfaces */
  --bg:#0a1122; --bg-2:#0d1528; --panel:#141d35; --panel2:#1b2743; --panel3:#233254;
  --card:#1b2742; --card-line:#33477a; --card-hover:#213052;
  --line:#243352; --line2:#354667;
  --text:#eef3fc; --muted:#a6b6d4; --faint:#6f80a3;
  --accent:#2dd4bf; --accent-d:#16b8a6;            /* vibrant cyan-teal */
  --brand:#fbbf24; --brand2:#fcd34d;               /* vibrant amber */
  --violet:#8b7cf6; --pink:#f472b6;
  --danger:#fb7185; --blue:#3d7bff; --purple:#a78bfa;
  --chip:#1e2a47;
  --shadow:0 14px 34px -14px rgba(3,7,20,.75);
  --shadow-lg:0 30px 70px -20px rgba(3,7,20,.82);
  --glow:0 0 0 1px color-mix(in srgb,var(--c,#fbbf24) 45%,transparent), 0 20px 48px -14px color-mix(in srgb,var(--c,#fbbf24) 40%,transparent);
  --mono:'Cascadia Code','Cascadia Mono','SFMono-Regular','Consolas',ui-monospace,monospace;
  --font:'Segoe UI Variable Text','Segoe UI',system-ui,Roboto,-apple-system,'Helvetica Neue',Arial,sans-serif;
  --font-h:'Segoe UI Variable Display','Segoe UI Semibold','Segoe UI',system-ui,Roboto,-apple-system,Arial,sans-serif;
  --r:14px;
  color-scheme:dark;
}
[data-theme="light"]{
  --bg:#eef2f7; --bg-2:#e8eef4; --panel:#ffffff; --panel2:#f5f8fb; --panel3:#eef3f8;
  --card:#ffffff; --card-line:#e4e9f0; --card-hover:#fbfdff;
  --line:#e0e7ef; --line2:#cdd8e4;
  --text:#0f1b2c; --muted:#556575; --faint:#8090a0;
  --accent:#0f9e73; --accent-d:#0c8763;
  --brand:#c07d17; --brand2:#a4670c;
  --danger:#d0453b; --blue:#2b6cb0; --purple:#6b56d6;
  --chip:#eef3f9;
  --shadow:0 10px 26px -12px rgba(30,50,80,.16);
  --shadow-lg:0 22px 50px -18px rgba(30,50,80,.20);
  --glow:0 0 0 1px rgba(192,125,23,.22), 0 14px 34px -14px rgba(192,125,23,.20);
  color-scheme:light;
}
*{box-sizing:border-box}
/* Dark, on-theme dropdown lists (fixes white native <option> popup) */
select{color-scheme:inherit}
select option,select optgroup{background:var(--panel);color:var(--text)}
[data-theme="light"] select option{background:#fff;color:var(--text)}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(820px 540px at -8% -10%, rgba(61,123,255,.24), transparent 60%),
    radial-gradient(780px 540px at 108% -6%, rgba(162,75,255,.22), transparent 58%),
    radial-gradient(840px 640px at 106% 110%, rgba(0,230,195,.20), transparent 56%),
    radial-gradient(780px 580px at -6% 112%, rgba(255,180,0,.15), transparent 56%),
    var(--bg);
  color:var(--text);font-family:var(--font);font-size:14.5px;line-height:1.58;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;font-feature-settings:'ss01','cv01','kern';letter-spacing:.05px;
}
::selection{background:rgba(233,168,63,.28)}
/* Typography polish — crisp display headings, refined weights & spacing */
.brand h1,.topbar h2,.calc-head h3,.hero h3,.hubhead h3,.doc h3,.doc h4,.card h4,.hub-b h4,.rk-v,.result-main .rv,.lesson-h h4,.rep-top h3{font-family:var(--font-h)}
.topbar h2,.hero h3,.hubhead h3,.doc h3{letter-spacing:-.5px;text-wrap:balance}
.card h4,.hub-b h4,.calc-head h3,.doc h4{letter-spacing:-.2px}
h1,h2,h3,h4{font-synthesis:none}
.rtitle,.inlabel,.rf-h,.kp-title,.sectlabel,.crumb{letter-spacing:.9px}
.crumb{font-weight:700}
.doc p,.lesson-intro,.kp li{letter-spacing:.05px}
strong,b{font-weight:700}
.app{display:grid;grid-template-columns:296px 1fr;height:100vh}
/* ---------- Sidebar ---------- */
.side{background:linear-gradient(180deg,var(--panel),var(--bg-2));border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.brand{display:flex;align-items:center;gap:12px;padding:18px 18px 16px;border-bottom:1px solid var(--line)}
.logo{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;box-shadow:var(--shadow);overflow:hidden;flex:none;background:linear-gradient(150deg,#182130,#0d131c);border:1px solid var(--line2)}
.logo svg{width:44px;height:44px;display:block}
.brand h1{font-size:16.5px;margin:0;font-weight:750;letter-spacing:.2px}
.brand h1 span{background:linear-gradient(90deg,var(--brand2),var(--brand));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.brand small{color:var(--faint);font-size:11px;font-weight:500;letter-spacing:.2px}
.search{padding:14px 14px 10px}
.search .sbox{position:relative;display:flex;align-items:center}
.search .sbox::before{content:"🔍";position:absolute;left:12px;font-size:12px;opacity:.6;pointer-events:none}
.search input{width:100%;padding:10px 12px 10px 34px;border-radius:11px;border:1px solid var(--line2);background:var(--bg-2);color:var(--text);font-size:13px;outline:none;transition:.18s;font-family:var(--font)}
.search input::placeholder{color:var(--faint)}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,180,135,.12)}
.nav{overflow-y:auto;flex:1;padding:6px 10px 24px}
.nav::-webkit-scrollbar{width:10px}.nav::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.nav::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:padding-box}
.navgroup{margin:3px 0}
.navgroup>.gt{display:flex;align-items:center;gap:9px;padding:9px 10px;color:var(--muted);font-size:11px;font-weight:750;text-transform:uppercase;letter-spacing:.7px;cursor:pointer;user-select:none;border-radius:9px;transition:.15s}
.navgroup>.gt:hover{color:var(--text);background:var(--panel2)}
.navgroup .gt .ic{font-size:14px;filter:saturate(1.1)}
.navgroup .gt .arw{margin-left:auto;transition:transform .2s;font-size:9px;opacity:.6}
.navgroup.collapsed .items{display:none}
.navgroup.collapsed .gt .arw{transform:rotate(-90deg)}
.items{margin:2px 0 6px}
.navitem{position:relative;display:block;padding:8px 12px 8px 30px;margin:1px 0;color:var(--muted);border-radius:9px;cursor:pointer;font-size:13px;transition:.14s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem::before{content:"";position:absolute;left:14px;top:50%;width:5px;height:5px;border-radius:50%;background:var(--line2);transform:translateY(-50%);transition:.14s}
.navitem:hover{background:var(--panel2);color:var(--text)}
.navitem:hover::before{background:var(--accent)}
.navitem.active{background:linear-gradient(90deg,rgba(233,168,63,.14),transparent 85%);color:var(--brand2);font-weight:650}
.navitem.active::before{background:var(--brand);box-shadow:0 0 8px var(--brand)}
.side-foot{padding:12px 14px;border-top:1px solid var(--line);display:flex;gap:8px;align-items:center}
.btn{border:1px solid var(--line2);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 12px;font-size:12px;cursor:pointer;font-family:var(--font);font-weight:600;transition:.15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--accent);color:var(--text);background:var(--panel3);transform:translateY(-1px)}
.btn.sm{padding:7px 10px;font-size:11.5px;flex:1;justify-content:center}
/* ---------- Main ---------- */
.main{overflow-y:auto;min-height:0}
.main::-webkit-scrollbar{width:12px}.main::-webkit-scrollbar-thumb{background:var(--line2);border-radius:8px;border:3px solid transparent;background-clip:padding-box}
.main::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:padding-box}
.topbar{position:sticky;top:0;z-index:5;background:color-mix(in srgb,var(--bg) 82%,transparent);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:15px 34px;display:flex;align-items:center;gap:12px}
.topbtn{flex:none;display:inline-flex;align-items:center;gap:5px;border:1px solid var(--line2);background:var(--panel2);color:var(--text);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:650;cursor:pointer;font-family:var(--font);transition:.15s}
.topbtn:hover{border-color:var(--accent);color:var(--accent);background:var(--panel3)}
#btnHome{color:var(--brand2)}
#btnHome:hover{border-color:var(--brand);color:var(--brand2)}
@media(max-width:560px){.topbtn{padding:8px 10px}.topbar{padding:13px 16px}}
@media print{.topbtn{display:none!important}}
.crumb{color:var(--faint);font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
.topbar h2{margin:2px 0 0;font-size:21px;font-weight:750;letter-spacing:-.2px}
.topbar .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.wrap{max-width:1120px;margin:0 auto;padding:30px 34px 100px}
/* ---------- Home hero ---------- */
.hero{background:
    radial-gradient(620px 420px at 6% 2%, rgba(162,75,255,.60), transparent 55%),
    radial-gradient(620px 420px at 94% 6%, rgba(0,230,195,.52), transparent 55%),
    radial-gradient(560px 440px at 64% 130%, rgba(255,180,0,.42), transparent 55%),
    radial-gradient(520px 420px at 26% 124%, rgba(61,123,255,.40), transparent 55%),
    linear-gradient(135deg,var(--panel2),var(--panel));
  border:1px solid var(--card-line);border-radius:22px;padding:32px 36px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--shadow-lg)}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--panel) 30%,transparent));pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--accent);background:color-mix(in srgb,var(--accent) 14%,transparent);border:1px solid color-mix(in srgb,var(--accent) 34%,transparent);padding:5px 12px;border-radius:20px;margin-bottom:14px;position:relative}
.hero-badge::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
.hero h3{margin:0 0 10px;font-size:28px;font-weight:800;letter-spacing:-.5px;position:relative}
.hero p{margin:0;color:var(--muted);max-width:640px;font-size:14.5px;position:relative;line-height:1.6}
.hero p b{color:var(--text);font-weight:700}
.hero-stats{display:flex;gap:11px;margin-top:24px;position:relative;flex-wrap:wrap}
.stat{--sc:var(--brand);background:linear-gradient(150deg,color-mix(in srgb,var(--sc) 20%,transparent),color-mix(in srgb,var(--bg) 40%,transparent));border:1px solid color-mix(in srgb,var(--sc) 38%,var(--card-line));border-radius:14px;padding:12px 18px 11px;min-width:98px;backdrop-filter:blur(4px)}
.stat:nth-child(1){--sc:#00d3f2}.stat:nth-child(2){--sc:#a24bff}.stat:nth-child(3){--sc:#ffb400}.stat:nth-child(4){--sc:#00d968}.stat:nth-child(5){--sc:#ff3b6b}
.stat b{display:block;font-size:24px;font-weight:820;font-variant-numeric:tabular-nums;color:var(--sc);filter:brightness(1.12);line-height:1.1}
.stat span{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:650}
/* ---------- Cards ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:15px}
.card{--c:var(--brand);background:linear-gradient(150deg,color-mix(in srgb,var(--c) 55%,#0c1430),color-mix(in srgb,var(--c) 22%,#0c1430) 85%);border:1px solid color-mix(in srgb,var(--c) 60%,transparent);border-radius:16px;padding:18px;cursor:pointer;transition:transform .18s,box-shadow .18s,border-color .18s,background-color .18s;position:relative;overflow:hidden;box-shadow:0 10px 26px -12px color-mix(in srgb,var(--c) 45%,transparent),var(--shadow)}
.card::after{content:"";position:absolute;left:0;top:0;height:100%;width:3px;background:var(--c);opacity:0;transition:.18s}
.card:hover{transform:translateY(-5px);box-shadow:0 24px 50px -12px color-mix(in srgb,var(--c) 85%,transparent),var(--shadow);border-color:color-mix(in srgb,var(--c) 90%,#fff);background:linear-gradient(150deg,color-mix(in srgb,var(--c) 72%,#0c1430),color-mix(in srgb,var(--c) 34%,#0c1430) 86%)}
.card:hover::after{opacity:1}
.card .ci{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border-radius:13px;font-size:23px;margin-bottom:14px;color:#fff;background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 62%,#000));border:1px solid color-mix(in srgb,var(--c) 70%,#fff);box-shadow:0 8px 20px -6px color-mix(in srgb,var(--c) 75%,transparent)}
.card:hover .ci{box-shadow:0 10px 26px -6px color-mix(in srgb,var(--c) 90%,transparent);transform:scale(1.04)}
.card h4{margin:0 0 6px;font-size:15px;font-weight:750;letter-spacing:-.1px;line-height:1.3;color:#fff}
.card p{margin:0;color:color-mix(in srgb,#fff 88%, var(--c));font-size:12.5px;line-height:1.5}
.sectlabel{display:flex;align-items:center;gap:10px;font-size:12.5px;color:var(--text);letter-spacing:.3px;font-weight:750;margin:32px 4px 15px}
.sectlabel::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--line2),transparent)}
.sectlabel .si{--c:var(--brand);width:28px;height:28px;border-radius:9px;display:inline-grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 62%,#000));border:1px solid color-mix(in srgb,var(--c) 70%,#fff);font-size:14px;box-shadow:0 5px 14px -6px color-mix(in srgb,var(--c) 70%,transparent)}
/* ---------- Calculator ---------- */
.calc{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:var(--shadow)}
.calc-head{padding:22px 24px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,var(--panel3),var(--panel));display:flex;align-items:center;gap:14px}
.calc-head .chi{width:48px;height:48px;border-radius:13px;display:grid;place-items:center;font-size:24px;color:#fff;background:linear-gradient(145deg,var(--c,var(--brand)),color-mix(in srgb,var(--c,var(--brand)) 62%,#000));border:1px solid color-mix(in srgb,var(--c,var(--brand)) 70%,#fff);box-shadow:0 8px 20px -6px color-mix(in srgb,var(--c,var(--brand)) 72%,transparent);flex:none}
.calc-head h3{margin:0;font-size:18px;font-weight:750;letter-spacing:-.2px}
.calc-head p{margin:4px 0 0;color:var(--muted);font-size:12.5px}
.calc-body{display:grid;grid-template-columns:1fr 1.05fr;gap:0}
@media(max-width:900px){.calc-body{grid-template-columns:1fr}.app{grid-template-columns:1fr}.side{position:fixed;z-index:40;width:290px;height:100vh;transform:translateX(-100%);transition:.24s;box-shadow:var(--shadow-lg)}.side.open{transform:none}.wrap{padding:22px 18px 90px}.topbar{padding:13px 18px}}
.inputs{padding:22px 24px;border-right:1px solid var(--line)}
.results{padding:22px 24px;background:var(--panel2)}
.field{margin-bottom:15px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:650;letter-spacing:.2px}
.field .inp{display:flex;border:1px solid var(--line2);border-radius:11px;overflow:hidden;background:var(--bg-2);transition:.16s}
.field .inp:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,180,135,.12)}
.field input,.field select{flex:1;border:0;background:transparent;color:var(--text);padding:11px 13px;font-size:15px;outline:none;font-family:var(--mono);font-variant-numeric:tabular-nums;min-width:0}
.field select{font-family:var(--font);cursor:pointer}
.field .unit{padding:11px 13px;background:var(--panel3);color:var(--muted);font-size:12px;border-left:1px solid var(--line2);display:flex;align-items:center;white-space:nowrap;font-weight:600}
.field .unitsel{flex:none;min-width:0;width:auto;border:0;border-left:1px solid var(--line2);border-radius:0;background:var(--panel3);color:var(--brand2);font-size:12px;font-weight:700;padding:0 6px 0 10px;outline:none;cursor:pointer;font-family:var(--font);appearance:auto}
.field .unitsel:hover{background:var(--card-hover);color:var(--brand2)}
.field .inp:focus-within .unitsel{border-color:var(--accent)}
.rtitle,.inlabel{display:flex;align-items:center;gap:8px;font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--faint);font-weight:750;margin-bottom:14px}
.rtitle::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--c,var(--accent));box-shadow:0 0 8px var(--c,var(--accent))}
.inlabel::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--brand);box-shadow:0 0 8px var(--brand)}
.result-rows{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:2px 14px;margin-top:2px}
#fslot .formula{margin-top:20px}
#fslot:empty{display:none}
.result-main{background:linear-gradient(135deg,color-mix(in srgb,var(--c,var(--brand)) 18%,transparent),color-mix(in srgb,var(--c,var(--brand)) 4%,transparent));border:1px solid color-mix(in srgb,var(--c,var(--brand)) 38%,var(--line2));border-radius:14px;padding:18px 20px;margin-bottom:10px;position:relative;overflow:hidden}
.result-main .rn{font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.result-main .rv{font-size:33px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1.04;letter-spacing:-.6px;background:linear-gradient(120deg,color-mix(in srgb,var(--c,var(--brand2)) 85%,#fff),var(--c,var(--brand2)));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--c,var(--brand2))}
.result-main .rv small{font-size:14px;color:var(--muted);font-weight:600;margin-left:6px;letter-spacing:0;-webkit-text-fill-color:var(--muted)}
.result-row{display:flex;justify-content:space-between;gap:12px;padding:11px 6px;border-bottom:1px solid var(--line);font-size:13px}
.result-row:last-child{border:0}
.result-row .k{color:var(--muted)}
.result-row .v{font-family:var(--mono);font-weight:650;font-variant-numeric:tabular-nums;text-align:right}
.formula{margin-top:18px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden}
.formula .ft{font-size:10.5px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);font-weight:750;padding:10px 15px;background:var(--panel3);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:7px}
.formula .ft::before{content:"ƒ";color:var(--brand2);font-weight:800;font-style:italic}
.formula code{display:block;font-family:var(--mono);font-size:12.5px;color:var(--blue);white-space:pre-wrap;line-height:1.75;padding:13px 15px}
.steps{font-family:var(--mono);font-size:12px;color:var(--muted);line-height:1.85;padding:0 15px 13px;border-top:1px dashed var(--line);margin-top:2px;padding-top:11px}
.steps b{color:var(--text);font-weight:700}
.note{margin-top:15px;font-size:12.5px;color:var(--muted);background:linear-gradient(90deg,color-mix(in srgb,var(--c,var(--brand)) 12%,transparent),transparent);border-left:3px solid var(--c,var(--brand));padding:12px 15px;border-radius:0 10px 10px 0;line-height:1.55}
.warn{color:var(--danger);font-size:12.5px;margin-top:12px;font-weight:650;background:rgba(240,100,95,.1);border:1px solid rgba(240,100,95,.25);padding:10px 13px;border-radius:10px}
/* ---------- Doc / Manual / Course ---------- */
.doc{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:34px 42px;line-height:1.72;box-shadow:var(--shadow)}
.doc h3{font-size:25px;margin:0 0 8px;font-weight:780;letter-spacing:-.4px;background:linear-gradient(90deg,var(--brand2),var(--brand));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.doc h4{font-size:17px;margin:30px 0 10px;padding-bottom:8px;border-bottom:1px solid var(--line);color:var(--text);font-weight:720;scroll-margin-top:80px}
.doc h5{font-size:14px;margin:18px 0 6px;color:var(--accent)}
.doc p{margin:10px 0;color:var(--text)}
.doc ul,.doc ol{margin:10px 0;padding-left:22px;color:var(--text)}
.doc li{margin:6px 0}
.doc .lead{color:var(--muted);font-size:15px;margin-bottom:20px}
.doc table{border-collapse:separate;border-spacing:0;width:100%;margin:16px 0;font-size:13px;border:1px solid var(--line2);border-radius:12px;overflow:hidden}
.doc th,.doc td{border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:9px 12px;text-align:left}
.doc th:last-child,.doc td:last-child{border-right:0}
.doc tr:last-child td{border-bottom:0}
.doc th{background:var(--panel3);color:var(--brand2);font-weight:700}
.doc tr:nth-child(even) td{background:var(--panel2)}
.doc .box{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-left:4px solid var(--accent);border-radius:0 12px 12px 0;padding:15px 19px;margin:18px 0}
.doc .box b{color:var(--brand2)}
.doc code{font-family:var(--mono);background:var(--bg-2);padding:2px 7px;border-radius:6px;color:var(--blue);font-size:12.5px}
.doc .fbox{background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:14px 18px;font-family:var(--mono);color:var(--blue);margin:14px 0;font-size:13px;white-space:pre-wrap;line-height:1.7}
.pill{display:inline-block;background:linear-gradient(135deg,rgba(233,168,63,.18),rgba(233,168,63,.08));color:var(--brand2);border:1px solid color-mix(in srgb,var(--brand) 30%,transparent);padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;margin-left:8px;vertical-align:middle}
.toc{background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:14px;padding:16px 20px;margin:0 0 24px}
.toc b{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint)}
.toc a{color:var(--blue);text-decoration:none;display:inline-block;margin:5px 16px 3px 0;font-size:13px;font-weight:600;transition:.14s}
.toc a:hover{color:var(--brand2)}
.tag{display:inline-block;font-size:10px;padding:3px 9px;border-radius:7px;background:var(--chip);color:var(--muted);position:absolute;top:14px;right:14px;font-weight:700;border:1px solid var(--line2)}
/* quiz buttons in courses */
.doc .box .btn{transition:.14s}
kbd{font-family:var(--mono);background:var(--bg-2);border:1px solid var(--line2);border-bottom-width:2px;border-radius:6px;padding:1px 6px;font-size:11px}
/* Favorite button (calculator header) */
.calc-head .cht{flex:1;min-width:0}
.favbtn{margin-left:auto;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);border-radius:11px;padding:8px 13px;font-size:12px;font-weight:650;cursor:pointer;transition:.16s;font-family:var(--font);white-space:nowrap;flex:none}
.favbtn svg{width:15px;height:15px}
.favbtn:hover{border-color:var(--brand);color:var(--brand2);transform:translateY(-1px)}
.favbtn.on{color:var(--brand2);border-color:color-mix(in srgb,var(--brand) 45%,var(--line2));background:linear-gradient(135deg,rgba(233,168,63,.16),transparent)}
/* Card favorite star */
.cardstar{position:absolute;top:11px;right:11px;width:28px;height:28px;display:grid;place-items:center;border:0;background:transparent;color:var(--faint);cursor:pointer;opacity:0;transition:.15s;border-radius:8px;padding:0}
.cardstar svg{width:17px;height:17px}
.card:hover .cardstar{opacity:.7}
.cardstar:hover{opacity:1;color:var(--brand2);background:var(--panel2);transform:scale(1.1)}
.cardstar.on{opacity:1;color:var(--brand)}
/* Copy result button */
.copybtn{position:absolute;top:12px;right:12px;width:30px;height:30px;display:grid;place-items:center;border:1px solid var(--line2);background:color-mix(in srgb,var(--bg) 45%,transparent);color:var(--muted);border-radius:9px;cursor:pointer;transition:.15s;padding:0;z-index:2}
.copybtn svg{width:15px;height:15px}
.copybtn:hover{color:var(--brand2);border-color:var(--brand)}
.copybtn.ok{color:var(--accent);border-color:var(--accent)}
/* Print report header (screen-hidden) */
.printhead{display:none;font-size:12px;color:#333;padding:8px 24px;border-bottom:1px solid #ccc}
/* Motion / theming */
body,.side,.topbar,.card,.calc,.doc,.field .inp,.btn,.result-main,.result-rows,.navitem,.hero,.stat{transition:background-color .28s ease,border-color .28s ease,color .2s ease}
.card,.cardstar,.copybtn,.favbtn,.btn{transition:transform .18s ease,box-shadow .18s ease,background-color .2s ease,border-color .2s ease,color .18s ease,opacity .15s ease}
button:focus-visible,input:focus-visible,select:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
/* SVG icon sizing inside tiles / nav / sections (colors come from --c) */
.card .ci svg{width:24px;height:24px}
.calc-head .chi svg{width:25px;height:25px}
.navgroup .gt .ic{--c:var(--muted);display:inline-flex;align-items:center;color:var(--c)}
.navgroup .gt:hover .ic{filter:brightness(1.15)}
.navgroup .gt .ic svg{width:16px;height:16px}
.sectlabel .si svg{width:15px;height:15px}
/* Course lessons (mud school) */
.lesson{margin:20px 0;padding:2px 0 4px;scroll-margin-top:80px}
.lesson-h{display:flex;align-items:center;gap:12px;margin:24px 0 10px}
.lesson-num{flex:none;width:32px;height:32px;border-radius:10px;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-d));box-shadow:0 4px 12px -4px var(--accent)}
.lesson-h h4{margin:0;border:0;padding:0;font-size:18px}
.lesson-intro{font-size:14.5px;color:var(--text);line-height:1.7;margin:0 0 12px;padding-left:44px}
.kp-title{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--faint);font-weight:750;margin:10px 0 6px;padding-left:44px}
.kp{margin:0 0 6px;padding-left:44px;list-style:none}
.kp li{position:relative;padding:5px 0 5px 22px;color:var(--text);line-height:1.6}
.kp li::before{content:"";position:absolute;left:2px;top:12px;width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 7px color-mix(in srgb,var(--accent) 60%,transparent)}
.lesson .box{margin-left:44px}
@media(max-width:900px){.lesson-intro,.kp-title,.kp{padding-left:0}.lesson .box{margin-left:0}}
/* Hub cards (front page) */
.hubgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.hubcard{--c:var(--brand);display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,color-mix(in srgb,var(--c) 62%,#0c1430),color-mix(in srgb,var(--c) 24%,#0c1430) 84%);border:1px solid color-mix(in srgb,var(--c) 66%,transparent);border-radius:18px;padding:22px 24px;cursor:pointer;position:relative;overflow:hidden;transition:transform .18s,box-shadow .18s,border-color .18s,background-color .18s;box-shadow:0 12px 30px -14px color-mix(in srgb,var(--c) 55%,transparent),var(--shadow)}
.hubcard .hub-b p{color:color-mix(in srgb,#fff 80%,var(--c))}
.hubcard .hub-b h4{color:#fff}
.hubcard::before{content:"";position:absolute;left:0;top:0;height:100%;width:4px;background:var(--c)}
.hubcard:hover{transform:translateY(-4px);box-shadow:0 22px 50px -16px color-mix(in srgb,var(--c) 60%,transparent),var(--shadow);border-color:color-mix(in srgb,var(--c) 70%,var(--card-line));background:linear-gradient(135deg,color-mix(in srgb,var(--c) 34%,var(--card)),var(--card) 78%)}
.hub-ic{flex:none;width:56px;height:56px;border-radius:15px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 62%,#000));border:1px solid color-mix(in srgb,var(--c) 70%,#fff);box-shadow:0 10px 24px -8px color-mix(in srgb,var(--c) 75%,transparent)}
.hub-ic svg{width:28px;height:28px}
.hub-b{flex:1;min-width:0}
.hub-b h4{margin:0 0 4px;font-size:17px;font-weight:750;letter-spacing:-.2px}
.hub-b p{margin:0;color:var(--muted);font-size:12.5px;line-height:1.5}
.hub-n{flex:none;font-size:11px;font-weight:750;color:var(--c);background:color-mix(in srgb,var(--c) 14%,transparent);border:1px solid color-mix(in srgb,var(--c) 30%,transparent);padding:4px 10px;border-radius:20px;white-space:nowrap}
.hub-go{flex:none;color:var(--faint);display:grid;place-items:center;transition:.18s}
.hub-go svg{width:20px;height:20px}
.hubcard:hover .hub-go{color:var(--c);transform:translateX(3px)}
@media(max-width:560px){.hub-n{display:none}}
/* Hub landing header + back */
.hubhead{margin-bottom:8px}
.hubhead h3{display:flex;align-items:center;gap:12px;margin:12px 0 6px;font-size:24px;font-weight:800;letter-spacing:-.4px}
.hubhead p{margin:0;color:var(--muted);font-size:14px;max-width:640px}
.hh-ic{--c:var(--brand);width:40px;height:40px;border-radius:12px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 62%,#000));border:1px solid color-mix(in srgb,var(--c) 70%,#fff);box-shadow:0 8px 18px -6px color-mix(in srgb,var(--c) 72%,transparent)}
.hh-ic svg{width:22px;height:22px}
.backbtn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--panel2);color:var(--muted);border-radius:9px;padding:7px 12px;font-size:12.5px;font-weight:650;cursor:pointer;font-family:var(--font)}
.backbtn:hover{border-color:var(--accent);color:var(--text)}
.backbtn svg{width:15px;height:15px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0 4px}
.chip{--c:var(--brand);display:inline-flex;align-items:center;gap:6px;text-decoration:none;font-size:12.5px;font-weight:650;color:var(--text);background:var(--panel2);border:1px solid var(--line2);padding:6px 12px;border-radius:20px;transition:.15s}
.chip:hover{border-color:var(--c);color:var(--c)}
.chip svg{width:14px;height:14px;color:var(--c)}
/* Hydraulics Report */
.rep{background:var(--panel);border:1px solid var(--card-line);border-radius:18px;padding:24px 26px;box-shadow:var(--shadow)}
.rep-top{display:flex;align-items:flex-start;gap:14px;justify-content:space-between;margin-bottom:18px}
.rep-top h3{margin:0;font-size:20px;font-weight:780}
.rep-top p{margin:5px 0 0;color:var(--muted);font-size:13px;max-width:560px}
.rep-in{display:flex;flex-direction:column;gap:14px}
.rf-sec{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px 16px}
.rf-h{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--brand2);font-weight:750;margin-bottom:11px;display:flex;align-items:center;gap:10px}
.rf-row{display:flex;flex-wrap:wrap;gap:11px}
.rf{flex:1;min-width:110px}
.rf label{display:block;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:600}
.rf .inp{display:flex;border:1px solid var(--line2);border-radius:9px;overflow:hidden;background:var(--bg-2)}
.rf .inp:focus-within{border-color:var(--accent)}
.rf input,.rf select{flex:1;border:0;background:transparent;color:var(--text);padding:8px 10px;font-size:14px;outline:none;font-family:var(--mono);min-width:0}
.rf select{font-family:var(--font)}
.rf .unit{padding:8px 9px;background:var(--panel3);color:var(--muted);font-size:11px;border-left:1px solid var(--line2);display:flex;align-items:center}
.addbtn{margin-left:auto;border:1px solid var(--line2);background:var(--panel);color:var(--accent);border-radius:8px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer}
.addbtn:hover{border-color:var(--accent)}
.rtbl{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.rtbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--faint);font-weight:700;padding:4px 8px}
.rtbl td{padding:3px 5px}
.ri{width:100%;border:1px solid var(--line2);background:var(--bg-2);color:var(--text);border-radius:7px;padding:7px 9px;font-size:13px;font-family:var(--mono);outline:none}
.ri:focus{border-color:var(--accent)}
.ri.n{font-variant-numeric:tabular-nums}
.rtbl .rx button{border:1px solid var(--line2);background:transparent;color:var(--danger);border-radius:7px;width:28px;height:30px;cursor:pointer;font-size:12px}
.rtbl .rx button:hover{background:rgba(240,100,95,.12)}
#hydout{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:14px}
.rk{background:linear-gradient(135deg,var(--panel3),var(--panel));border:1px solid var(--card-line);border-radius:13px;padding:13px 15px}
.rk-l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:4px}
.rk-v{font-size:24px;font-weight:800;font-family:var(--mono);font-variant-numeric:tabular-nums;line-height:1.04;letter-spacing:-.3px;background:linear-gradient(120deg,color-mix(in srgb,var(--brand2) 88%,#fff),var(--brand));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:var(--brand2)}
.rk-v small{-webkit-text-fill-color:var(--muted)}
.rk-v small{font-size:12px;color:var(--muted);font-weight:600;margin-left:4px}
.rep-sub{font-size:12.5px;color:var(--muted);background:var(--bg-2);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:6px}
.rep-h{font-size:14px;margin:22px 0 9px;color:var(--text);font-weight:720}
.rtbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:11px}
.rtbl.out{font-size:12.5px}
.rtbl.out th{background:var(--panel3);padding:9px 11px;white-space:nowrap}
.rtbl.out td{padding:8px 11px;border-top:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
.rtbl.out tbody tr:nth-child(even) td,.rtbl.out tr:nth-child(even) td{background:var(--panel2)}
.rtbl.out .rtot td{background:var(--panel3)!important;font-weight:750;color:var(--brand2);border-top:2px solid var(--line2)}
.rtbl.out.sum td{border-top:1px solid var(--line)}
/* DMR generator / verify */
#dmrout{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
.rf-note{font-weight:500;text-transform:none;letter-spacing:0;color:var(--faint);font-size:10.5px;margin-left:2px}
.dmr-band{border-left:5px solid var(--brand);background:var(--bg-2);border-radius:12px;padding:12px 16px;margin-bottom:16px}
.dmr-brand{font-size:12px;font-weight:800;letter-spacing:.3px}
.dmr-title{font-size:19px;font-weight:820;margin:2px 0 4px}
.dmr-title span{font-size:12px;font-weight:600;color:var(--muted);border:1px solid var(--line2);border-radius:20px;padding:1px 9px;vertical-align:middle;margin-left:6px}
.dmr-meta{font-size:12px;color:var(--muted);line-height:1.5}
.dmr-cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}
@media(max-width:820px){.dmr-cols{grid-template-columns:1fr}}
.rtbl.out .dv{text-align:right;font-family:var(--mono);color:var(--text);white-space:normal}
.vsec{border-color:var(--accent)!important;box-shadow:0 0 0 1px color-mix(in srgb,var(--accent) 30%,transparent) inset}
.vtag{font-size:9px;background:var(--accent);color:#001;border-radius:9px;padding:0 6px;font-weight:800;text-transform:uppercase;vertical-align:middle}
.vok{color:var(--accent);font-weight:750}
.vbad{color:var(--danger);font-weight:800}
.vna{color:var(--faint)}
/* Mud proposal */
#propout{margin-top:22px;padding-top:20px;border-top:1px solid var(--line)}
.psec{border:1px solid var(--line2);border-radius:11px;padding:12px 14px;margin-bottom:11px;background:var(--bg-2)}
.psec-h{font-size:12px;font-weight:750;color:var(--brand2);margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.rx-in{border:1px solid var(--line2);background:transparent;color:var(--danger);border-radius:7px;width:26px;height:26px;cursor:pointer;font-size:12px}
.rx-in:hover{background:rgba(240,100,95,.12)}
.prop-sec{margin-top:18px;padding-top:6px;border-top:1px dashed var(--line)}
.prop-frame{background:var(--bg-2);border:1px solid var(--line);border-left:4px solid var(--brand);border-radius:10px;padding:10px 14px;font-size:12.5px;color:var(--text);margin-bottom:12px}
.pf-form{color:var(--muted);font-size:12px}
.pt{display:block;font-size:12px;color:var(--brand2);font-weight:750;margin:4px 0 7px}
.rtbl.out.sum td:nth-child(odd){color:var(--muted)}
.rtbl.out.sum td:nth-child(even){font-weight:700;font-family:var(--mono)}
.turb{color:var(--brand2);font-weight:700}.lam{color:var(--accent);font-weight:700}
.pdist{display:flex;flex-direction:column;gap:9px}
.pd-row{display:grid;grid-template-columns:190px 1fr 150px;align-items:center;gap:12px;font-size:13px}
.pd-row b{font-family:var(--mono);font-variant-numeric:tabular-nums;text-align:right;font-size:12.5px}
.pbar{height:12px;background:var(--bg-2);border:1px solid var(--line);border-radius:20px;overflow:hidden}
.pbar>div{height:100%;border-radius:20px;transition:width .3s}
.rep-notes{margin-top:16px;font-size:12.5px;color:var(--text);background:linear-gradient(90deg,rgba(240,168,104,.1),transparent);border-left:3px solid var(--brand);padding:12px 15px;border-radius:0 10px 10px 0;line-height:1.7}
.rep-head-print{display:none}
@media(max-width:900px){.pd-row{grid-template-columns:1fr;gap:4px}.pd-row b{text-align:left}}
@media print{
  .rep-in,.rep-top .btn,.addbtn,.rtbl .rx{display:none!important}
  .rep{box-shadow:none;border:0;padding:0}
  #hydout{border-top:0;margin-top:0}
  .rep-head-print{display:block!important;font-size:12px;color:#111;border-bottom:1px solid #999;padding-bottom:6px;margin-bottom:12px}
  .rk-v,.turb,.lam{color:#111!important}
}
/* Unit Converter */
.convbody{padding:22px 24px}
.convcats{display:grid;grid-template-columns:repeat(auto-fill,minmax(158px,1fr));gap:11px}
.convcat{--c:var(--brand);display:flex;align-items:center;gap:10px;padding:13px 15px;border-radius:13px;background:linear-gradient(150deg,color-mix(in srgb,var(--c) 22%,var(--card)),var(--card) 82%);border:1px solid color-mix(in srgb,var(--c) 40%,var(--card-line));cursor:pointer;font-weight:700;font-size:13px;color:var(--text);transition:.15s}
.convcat:hover{transform:translateY(-2px);border-color:var(--c)}
.convcat.on{background:linear-gradient(150deg,var(--c),color-mix(in srgb,var(--c) 62%,#000));color:#fff;border-color:color-mix(in srgb,var(--c) 80%,#fff);box-shadow:0 10px 24px -8px color-mix(in srgb,var(--c) 70%,transparent)}
.cc-ic{flex:none;width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:#fff;background:linear-gradient(145deg,var(--c),color-mix(in srgb,var(--c) 60%,#000));border:1px solid color-mix(in srgb,var(--c) 70%,#fff)}
.cc-ic svg{width:17px;height:17px}
.convcat.on .cc-ic{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.4)}
.unitchips{display:flex;flex-wrap:wrap;gap:8px}
.unitchip{--c:var(--brand);border:1px solid var(--line2);background:var(--panel2);color:var(--muted);border-radius:20px;padding:8px 14px;font-size:13px;font-weight:650;cursor:pointer;font-family:var(--mono);transition:.14s}
.unitchip:hover{border-color:var(--c);color:var(--text)}
.unitchip.on{background:var(--c);color:#fff;border-color:color-mix(in srgb,var(--c) 80%,#fff);box-shadow:0 6px 16px -6px color-mix(in srgb,var(--c) 70%,transparent)}
.convin{display:flex;align-items:center;border:1px solid color-mix(in srgb,var(--c) 45%,var(--line2));border-radius:13px;overflow:hidden;background:var(--bg-2);margin-top:12px;max-width:420px}
.convin:focus-within{border-color:var(--c);box-shadow:0 0 0 3px color-mix(in srgb,var(--c) 22%,transparent)}
.convin input{flex:1;border:0;background:transparent;color:var(--text);padding:14px 16px;font-size:22px;font-weight:700;font-family:var(--mono);font-variant-numeric:tabular-nums;outline:none;min-width:0}
.convfromu{padding:0 18px;color:var(--c);font-weight:750;font-family:var(--mono);white-space:nowrap;border-left:1px solid var(--line2);align-self:stretch;display:flex;align-items:center;background:color-mix(in srgb,var(--c) 12%,transparent)}
.convout{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
.convrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 15px;border-radius:11px;background:var(--panel2);border:1px solid var(--line);font-size:14px}
.convrow .cu{color:var(--muted);font-weight:600}
.convrow .cv{font-family:var(--mono);font-weight:750;font-variant-numeric:tabular-nums;color:var(--text)}
.convrow.src{background:linear-gradient(135deg,color-mix(in srgb,var(--c) 26%,var(--panel2)),var(--panel2));border-color:var(--c)}
.convrow.src .cu{color:var(--c)}
.convrow.src .cv{color:var(--c)}
.hide{display:none!important}
.fade{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@media print{
  :root{--text:#111;--muted:#444;--line:#ccc;--line2:#bbb}

<script>
/* ============================================================
   MUD ENGINEER PRO  — field-standard drilling-fluid formulas
   Units: US oilfield (ppg, ft, bbl, psi) with metric readouts.
   Constants verified vs. example MudCalculator + MI/Baroid/EMEC manuals.
   ============================================================ */
const K = {
  PSI_PER_PPG_FT: 0.052,      // hydrostatic gradient constant
  SG_TO_PPG: 8.345,           // ppg of 1.0 SG fresh water
  WATER_PPG: 8.33,
  CAP: 1029.4,                // bbl/ft = ID(in)^2 / 1029.4
  BARITE_SG: 4.20,            // API barite (35 ppg)
  HEMATITE_SG: 5.05,
  LGS_SG: 2.60,               // avg low-gravity solids
  TRIPLEX: 0.000243,          // bbl/stk = 0.000243 * D^2 * S  (100% eff)
  M_TO_FT: 3.2808,
  BBL_TO_M3: 0.158987,
  GAL_PER_BBL: 42,
  LB_PER_BBL_WATER: 350,
  STEEL_PPG: 65.5,            // density of steel for buoyancy factor
  BBL_PER_FT3: 5.6146         // 1 bbl = 5.6146 ft³
};
const ppg = sg => sg*K.SG_TO_PPG;
const round = (n,d=2)=>{                       // fixed decimals, trim trailing zeros in the FRACTION only
  if(!isFinite(n)) return '—';
  let s=(+n).toFixed(d);
  if(s.indexOf('.')>=0) s=s.replace(/0+$/,'').replace(/\.$/,'');
  return s;
};
const fx = (n,d=2)=> (isFinite(n)? (+n).toFixed(d) : '—');

/* ---------- CALCULATOR DEFINITIONS ---------- */
/* each: {id,name,icon,desc, inputs:[{k,label,unit,def,opts?}], calc(v)-> {main:{n,v,u}, rows:[{k,v}], formula, steps, note} } */
const CALC = {};
function def(cat, c){ (CALC[cat]=CALC[cat]||[]).push(c); }

/* ---------- ICON SYSTEM (consistent inline line-icons) ---------- */
const ICONS = {
  compass:'<circle cx="12" cy="12" r="9"/><path d="m15.5 8.5-2.2 4.8-4.8 2.2 2.2-4.8 4.8-2.2Z"/>',
  droplet:'<path d="M12 3c3.4 4.8 5.4 7.4 5.4 10.4a5.4 5.4 0 1 1-10.8 0C6.6 10.4 8.6 7.8 12 3Z"/>',

  wind:'<path d="M3 8h9.5A2.5 2.5 0 1 0 10 5.5"/><path d="M3 12h13a2.5 2.5 0 1 1-2.5 2.5"/><path d="M3 16h7a2 2 0 1 1-2 2"/>',
  activity:'<path d="M3 12h4l3 7 4-15 3 8h4"/>',
  layers:'<path d="m12 3 9 4.8-9 4.8-9-4.8 9-4.8Z"/><path d="m3 12.8 9 4.8 9-4.8"/>',
  flask:'<path d="M9 3h6"/><path d="M10 3v6.2l-4.7 8A1.8 1.8 0 0 0 6.9 20h10.2a1.8 1.8 0 0 0 1.6-2.8l-4.7-8V3"/><path d="M8.2 14.5h7.6"/>',
  beaker:'<path d="M7 3h10"/><path d="M8 3v5.5l-3 8.7A1.6 1.6 0 0 0 6.5 19.4h11A1.6 1.6 0 0 0 19 17.2l-3-8.7V3"/><path d="M6.5 13.5h11"/>',
  shield:'<path d="M12 3 5 6v5c0 4.4 3 7.5 7 9 4-1.5 7-4.6 7-9V6l-7-3Z"/><path d="M12 8.5v3.5"/><circle cx="12" cy="15" r=".7" fill="currentColor" stroke="none"/>',
  bricks:'<rect x="3" y="4.5" width="18" height="15" rx="1.5"/><path d="M3 9.5h18M3 14.5h18M9 4.5v5M15 9.5v5M9 14.5v5"/>',
  book:'<path d="M6 4h10a2 2 0 0 1 2 2v13H8a2 2 0 0 0-2 2V4Z"/><path d="M6 19a2 2 0 0 1 2-2h10"/>',
  cap:'<path d="m3 8.5 9-3.8 9 3.8-9 3.8-9-3.8Z"/><path d="M7 10.5V15c0 1.2 2.5 2.6 5 2.6s5-1.4 5-2.6v-4.5"/><path d="M21 8.5V13"/>',
  arrowdown:'<path d="M12 4v12"/><path d="m7.5 11.5 4.5 4.5 4.5-4.5"/><path d="M5 20h14"/>',
  target:'<circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.6"/><circle cx="12" cy="12" r=".9" fill="currentColor" stroke="none"/>',
  swap:'<path d="M4 8.5h13l-3.2-3.2"/><path d="M20 15.5H7l3.2 3.2"/>',
  scale:'<path d="M12 3.5v17M8 20.5h8M5 7.5h14"/><path d="M5 7.5 2.6 13.5h4.8L5 7.5Z"/><path d="M19 7.5l-2.4 6h4.8L19 7.5Z"/>',
  gauge:'<path d="M4.5 15a7.5 7.5 0 1 1 15 0"/><path d="m12 15 3.5-4"/><circle cx="12" cy="15" r="1.3" fill="currentColor" stroke="none"/>',
  pump:'<circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/>',
  nozzle:'<path d="M8 4h8l-1.3 4.5H9.3L8 4Z"/><path d="M9.3 8.5 8 13.5h8l-1.3-5"/><path d="M10 13.5v3.5M12 13.5v4.5M14 13.5v3.5"/>',
  mix:'<circle cx="9.5" cy="10" r="4.8"/><circle cx="14.5" cy="14" r="4.8"/>',
  alert:'<path d="M12 3.5 2.5 20h19L12 3.5Z"/><path d="M12 10v4"/><circle cx="12" cy="17" r=".7" fill="currentColor" stroke="none"/>',
  filter:'<path d="M4 5h16l-6 7v6l-4 2v-8L4 5Z"/>',
  wave:'<path d="M3 14c2 0 2-4 4-4s2 4 4 4 2-4 4-4 2 4 4 4"/><path d="M3 9c2 0 2-3 4-3s2 3 4 3 2-3 4-3 2 3 4 3"/>',
  ruler:'<rect x="3" y="8" width="18" height="8" rx="1.5"/><path d="M7 8v3M11 8v4M15 8v3M19 8v4"/>',
  crystal:'<path d="M12 3 6 8l2 11h8l2-11-6-5Z"/><path d="M6 8h12M12 3v16M9 8l3 11 3-11"/>',
  trend:'<path d="M4 17 10 11l3 3 7-7"/><path d="M15 7h5v5"/>',
  star:'<path d="m12 4 2.4 4.9 5.4.8-3.9 3.8.9 5.3-4.8-2.5-4.8 2.5.9-5.3L4.2 9.7l5.4-.8L12 4Z"/>',
  'star-f':'<path d="m12 4 2.4 4.9 5.4.8-3.9 3.8.9 5.3-4.8-2.5-4.8 2.5.9-5.3L4.2 9.7l5.4-.8L12 4Z" fill="currentColor"/>',
  check:'<path d="m5 12.5 4.5 4.5L19 7"/>',
  copy:'<rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/>',
  clock:'<circle cx="12" cy="12" r="8.5"/><path d="M12 7.5V12l3 2"/>',
  report:'<path d="M7 3h7l4 4v14H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z"/><path d="M14 3v4h4"/><path d="M9.5 12h5M9.5 15.5h5M9.5 8.5h2"/>',
  calc:'<rect x="5" y="3" width="14" height="18" rx="2"/><path d="M8 7h8"/><path d="M8 11h2M8 14.5h2M8 18h2M13 11h3M13 14.5h3M13 18h3"/>',
  arrow:'<path d="M5 12h13"/><path d="m13 6 6 6-6 6"/>',
  back:'<path d="M19 12H6"/><path d="m11 6-6 6 6 6"/>',
  dot:'<circle cx="12" cy="12" r="3.4"/>'
};
function svgi(n){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[n]||ICONS.dot}</svg>`; }
const CATICON = {Basics:'compass',Density:'droplet',Volumes:'cylinder',Hydraulics:'wind',Rheology:'activity',Solids:'layers',Chemistry:'flask',Brine:'beaker','Well Control':'shield',Cementing:'bricks'};
const CALCICON = {
  phmw:'gauge',convert:'swap',
  weightup:'scale',dilute:'droplet',mix2:'mix',startvol:'cylinder',buoy:'scale',mudbuild:'layers',yield:'droplet',
  capacity:'ruler',pump:'pump',annvel:'wind',slug:'droplet',tank:'cylinder',
  bithyd:'nozzle',presloss:'wind',critvel:'gauge',surge:'trend',cuttings:'layers',
  pilot:'flask',tripfill:'cylinder',circtime:'clock',displace:'bricks',
  wps:'crystal',wpsadj:'flask',ooc:'droplet',recparams:'check',
  bingham:'activity',powerlaw:'wave',ecd:'gauge',
  retort:'layers',mbt:'flask',diln:'droplet',sag:'trend',
  alkalinity:'flask',chlorides:'crystal',hardness:'crystal',owr:'droplet',owradj:'mix',
  brine:'beaker',gyp:'crystal',sodaash:'droplet',corrate:'shield',
  porepred:'gauge',dexp:'trend',fracgrad:'alert',lot:'gauge',kick:'alert',tripmargin:'shield',gascut:'wind',
  plug:'bricks'
};
const iconCat = cat => svgi(CATICON[cat]||'dot');
const iconCalc = (id,cat) => svgi(CALCICON[id] || CATICON[cat] || 'dot');
const CATCOLOR = {Basics:'#3d7bff',Density:'#ffb400',Volumes:'#00d3f2',Hydraulics:'#12a5ff',Rheology:'#a24bff',Solids:'#ff7a1a',Chemistry:'#00d968',Brine:'#00e6c3','Well Control':'#ff3b6b',Cementing:'#ff9d2e',Training:'#6d5cff',Manual:'#7d93ff'};
const catColor = cat => CATCOLOR[cat] || 'var(--brand)';

/* ===== BASICS & CONVERSIONS ===== */
def('Basics',{
  id:'phmw', name:'Pressure ↔ Mud Weight', icon:'⚖️',
  desc:'Hydrostatic pressure, required mud weight, or depth — all from P = 0.052 × MW × TVD.',
  inputs:[
    {k:'mode',label:'Solve for',unit:'',def:'p',rerender:true,opts:[
      ['p','Hydrostatic Pressure  (from MW & TVD)'],
      ['mw','Required Mud Weight  (from Pressure & TVD)'],
      ['tvd','Depth  (from Pressure & MW)']
    ]},
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12,when:v=>v.mode!=='mw'},
    {k:'tvd',label:'True Vertical Depth',unit:'ft',def:10000,when:v=>v.mode!=='tvd'},
    {k:'p',label:'Pressure (pore / bottom-hole)',unit:'psi',def:6240,when:v=>v.mode!=='p'},
    {k:'ob',label:'Overbalance',unit:'psi',def:200,when:v=>v.mode==='mw'}
  ],
  calc(v){
    const C=K.PSI_PER_PPG_FT;
    if(v.mode==='p'){
      const p=C*v.mw*v.tvd, grad=C*v.mw;
      return {main:{n:'Hydrostatic Pressure',v:round(p,0),u:'psi'},
        rows:[
          {k:'Pressure gradient',v:round(grad,3)+' psi/ft'},
          {k:'Equivalent (bar)',v:round(p*0.06895,1)+' bar'},
          {k:'Mud weight',v:round(v.mw)+' ppg  ('+round(v.mw/K.SG_TO_PPG,3)+' SG)'}
        ],
        formula:'P (psi) = 0.052 × MW (ppg) × TVD (ft)',
        steps:`P = 0.052 × <b>${round(v.mw)}</b> × <b>${round(v.tvd,0)}</b> = <b>${round(p,0)} psi</b>`,
        note:'Use TRUE vertical depth, not measured depth. This is the everyday "hold-back" pressure of the mud column.'};
    }
    if(v.mode==='mw'){
      if(v.tvd<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Enter a TVD greater than zero.'};
      const mw=(v.p+v.ob)/(C*v.tvd), eqp=v.p/(C*v.tvd);
      return {main:{n:'Required Mud Weight',v:round(mw,2),u:'ppg'},
        rows:[
          {k:'Balance-point MW (no overbalance)',v:round(eqp,2)+' ppg'},
          {k:'In SG',v:round(mw/K.SG_TO_PPG,3)+' SG'},
          {k:'Pressure gradient',v:round(v.p/v.tvd,3)+' psi/ft'}
        ],
        formula:'MW (ppg) = (Pressure + Overbalance) ÷ (0.052 × TVD)',
        steps:`MW = (${round(v.p,0)} + ${round(v.ob,0)}) ÷ (0.052 × ${round(v.tvd,0)}) = <b>${round(mw,2)} ppg</b>`,
        note:'Typical overbalance 150–300 psi; keep the resulting ECD below the fracture gradient.'};
    }
    // depth
    if(v.mw<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Enter a mud weight greater than zero.'};
    const tvd=v.p/(C*v.mw);
    return {main:{n:'True Vertical Depth',v:round(tvd,0),u:'ft'},
      rows:[
        {k:'In metres',v:round(tvd/K.M_TO_FT,0)+' m'},
        {k:'Pressure gradient',v:round(C*v.mw,3)+' psi/ft'}
      ],
      formula:'TVD (ft) = Pressure (psi) ÷ (0.052 × MW (ppg))',
      steps:`TVD = ${round(v.p,0)} ÷ (0.052 × ${round(v.mw)}) = <b>${round(tvd,0)} ft</b>`,
      note:'Handy to find the depth at which a given mud weight produces a given pressure.'};
  }
});
def('Basics',{
  id:'convert', name:'Unit Converter', icon:'🔁', custom:'converter',
  desc:'Convert mud weight, pressure, volume, length, flow, mass & temperature.',
  inputs:[], calc(){ return {main:{n:'',v:'',u:''},rows:[]}; }
});
/* categorized unit-conversion data — factor = value in that unit when base = 1 */
const UNITS={
  'Mud Weight':{c:'#ffb400',icon:'droplet',base:'SG',units:[['SG',1],['ppg',8.345],['g/cm³',1],['kg/m³',1000],['lb/ft³',62.428],['psi/ft (gradient)',0.433527]]},
  'Pressure':{c:'#ff3b6b',icon:'gauge',base:'psi',units:[['psi',1],['bar',0.0689476],['kPa',6.89476],['MPa',0.00689476],['atm',0.0680459],['kg/cm²',0.0703070]]},
  'Volume':{c:'#00d3f2',icon:'cylinder',base:'bbl',units:[['bbl',1],['m³',0.158987],['US gal',42],['litre',158.987],['ft³',5.61458],['UK gal',34.9723]]},
  'Length / Depth':{c:'#3d7bff',icon:'ruler',base:'ft',units:[['ft',1],['m',0.3048],['inch',12],['cm',30.48],['yard',0.333333]]},
  'Flow Rate':{c:'#00e6c3',icon:'wind',base:'gpm',units:[['gpm',1],['bbl/min',0.0238095],['L/min',3.78541],['m³/hr',0.227125],['bbl/hr',1.42857]]},
  'Mass / Weight':{c:'#a24bff',icon:'scale',base:'lb',units:[['lb',1],['kg',0.453592],['tonne (t)',0.000453592],['US ton',0.0005],['sack (100 lb)',0.01]]},
  'Temperature':{c:'#ff7a1a',icon:'trend',temp:true,units:[['°C'],['°F'],['K']]}
};
/* which unit-groups are switchable on inputs (native unit → group) */
const UGMAP={ppg:'Mud Weight', bbl:'Volume', ft:'Length / Depth', psi:'Pressure', gpm:'Flow Rate', lb:'Mass / Weight'};
function ufac(g,u){ const G=UNITS[g]; if(!G) return null; const x=G.units.find(a=>a[0]===u); return x?x[1]:null; }
function uconv(g,val,fromU,toU){ const a=ufac(g,fromU),b=ufac(g,toU); return (a&&b)? val/a*b : val; }

/* ===== DENSITY / WEIGHT CONTROL ===== */
def('Density',{
  id:'weightup', name:'Weight Up (Increase Density)', icon:'⚖️',
  desc:'Weight material (barite, hematite or CaCO₃) needed to raise mud weight, and the volume increase.',
  inputs:[
    {k:'w1',label:'Present Mud Weight',unit:'ppg',def:10},
    {k:'w2',label:'Desired Mud Weight',unit:'ppg',def:12},
    {k:'vol',label:'Mud Volume to treat',unit:'bbl',def:500},
    {k:'mat',label:'Weight Material',unit:'',def:'barite',opts:[['barite','Barite  (SG 4.20)'],['hematite','Hematite (SG 5.05)'],['caco3','CaCO₃  (SG 2.70)']]}
  ],
  calc(v){
    const M = {
      barite:{sg:K.BARITE_SG,name:'Barite',packs:[['Big bags (3300 lb / 1.5 t)',3300,'bags'],['Sacks (100 lb)',100,'sacks']]},
      hematite:{sg:K.HEMATITE_SG,name:'Hematite',packs:[['Big bags (3300 lb / 1.5 t)',3300,'bags'],['Sacks (100 lb)',100,'sacks']]},
      caco3:{sg:2.70,name:'CaCO₃',packs:[['Bags (2200 lb / 1 t)',2200,'bags'],['Small sacks (55 lb)',55,'sacks']]}
    }[v.mat] || {sg:K.BARITE_SG,name:'Barite',packs:[['Big bags (3300 lb / 1.5 t)',3300,'bags']]};
    const dm = ppg(M.sg); // ppg of material
    if(v.w2<=v.w1) return {main:{n:'—',v:'—',u:''},rows:[],formula:'',warn:'Desired weight must be greater than present weight.'};
    if(v.w2>=dm) return {main:{n:'—',v:'—',u:''},rows:[],formula:'',warn:'Desired weight exceeds '+M.name+' density ('+round(dm,1)+' ppg) — impossible with this material.'};
    const lbPerBbl = dm*42*(v.w2-v.w1)/(dm-v.w2);
    const totLb = lbPerBbl*v.vol;
    const volInc = (v.w2-v.w1)/(dm-v.w2);        // bbl increase per bbl
    const newVol = v.vol*(1+volInc);
    const packRows = M.packs.map(p=>({k:p[0],v:round(totLb/p[1],0)+' '+p[2]}));
    return {
      main:{n:M.name+' Required',v:round(totLb,0),u:'lb'},
      rows:[
        {k:'Concentration',v:round(lbPerBbl,1)+' lb/bbl'},
        {k:'Total in tonnes',v:round(totLb*0.000453592,2)+' t'},
        ...packRows,
        {k:'Volume increase',v:round(v.vol*volInc,1)+' bbl  ('+round(volInc*100,1)+'%)'},
        {k:'Final volume',v:round(newVol,1)+' bbl'}
      ],
      formula:'lb/bbl = Dm×42 × (W₂−W₁) ÷ (Dm−W₂)\nVol inc/bbl = (W₂−W₁) ÷ (Dm−W₂)\n   where Dm = '+M.name+' density in ppg ('+round(dm,2)+' ppg)',
      steps:`lb/bbl = ${round(dm,2)}×42 × (${round(v.w2)}−${round(v.w1)}) ÷ (${round(dm,2)}−${round(v.w2)})\n  = <b>${round(lbPerBbl,1)} lb/bbl</b>\nTotal = ${round(lbPerBbl,1)} × ${round(v.vol,0)} = <b>${round(totLb,0)} lb</b>`,
      note:'Volume increases as '+M.name+' is added — allow pit space or account for the '+round(v.vol*volInc,1)+' bbl gain. Hematite adds weight with less volume increase; CaCO₃ is acid-soluble for reservoir sections but caps at ~22 ppg.'
    };
  }
});
def('Density',{
  id:'dilute', name:'Dilution to Reduce Weight', icon:'💧',
  desc:'Volume of dilution fluid (water or base oil) to lower the mud weight.',
  inputs:[
    {k:'w1',label:'Present Mud Weight',unit:'ppg',def:12},
    {k:'w2',label:'Desired Mud Weight',unit:'ppg',def:11},
    {k:'vol',label:'Present Mud Volume',unit:'bbl',def:500},
    {k:'wd',label:'Dilution Fluid Weight',unit:'ppg',def:8.33}
  ],
  calc(v){
    if(v.w2>=v.w1) return {main:{n:'—',v:'—',u:''},rows:[],formula:'',warn:'Desired weight must be LESS than present weight to dilute.'};
    if(v.w2<=v.wd) return {main:{n:'—',v:'—',u:''},rows:[],formula:'',warn:'Desired weight must be above dilution-fluid weight ('+round(v.wd)+' ppg).'};
    const vd = v.vol*(v.w1-v.w2)/(v.w2-v.wd);
    return {
      main:{n:'Dilution Fluid Required',v:round(vd,1),u:'bbl'},
      rows:[
        {k:'Dilution fluid',v:round(vd*42,0)+' US gal'},
        {k:'Final volume',v:round(v.vol+vd,1)+' bbl'},
        {k:'Volume increase',v:round(vd/v.vol*100,1)+'%'}
      ],
      formula:'V_add = V₁ × (W₁ − W₂) ÷ (W₂ − W_dilution)',
      steps:`V_add = ${round(v.vol,0)} × (${round(v.w1)}−${round(v.w2)}) ÷ (${round(v.w2)}−${round(v.wd)})\n  = <b>${round(vd,1)} bbl</b>`,
      note:'Dilution increases pit volume and dilutes chemical treatments — re-check rheology and losses after.'
    };
  }
});
def('Density',{
  id:'mix2', name:'Mixing Two Muds', icon:'🧪',
  desc:'Resulting weight (and volume) when two mud systems are blended.',
  inputs:[
    {k:'v1',label:'Volume of Mud 1',unit:'bbl',def:300},
    {k:'w1',label:'Weight of Mud 1',unit:'ppg',def:10},
    {k:'v2',label:'Volume of Mud 2',unit:'bbl',def:200},
    {k:'w2',label:'Weight of Mud 2',unit:'ppg',def:14}
  ],
  calc(v){
    const wf=(v.v1*v.w1+v.v2*v.w2)/(v.v1+v.v2);
    return {main:{n:'Final Mud Weight',v:round(wf,2),u:'ppg'},
      rows:[{k:'Total volume',v:round(v.v1+v.v2,0)+' bbl'},{k:'Final weight (SG)',v:round(wf/8.345,3)+' SG'}],
      formula:'W_final = (V₁·W₁ + V₂·W₂) ÷ (V₁ + V₂)',
      steps:`W = (${round(v.v1,0)}×${round(v.w1)} + ${round(v.v2,0)}×${round(v.w2)}) ÷ ${round(v.v1+v.v2,0)}\n  = <b>${round(wf,2)} ppg</b>`};
  }
});
def('Density',{
  id:'startvol', name:'Weight Up — Fixed Final Volume', icon:'📦',
  desc:'How much original mud to discard so weighted-up mud fits a fixed pit volume.',
  inputs:[
    {k:'w1',label:'Present Mud Weight',unit:'ppg',def:10},
    {k:'w2',label:'Desired Mud Weight',unit:'ppg',def:12},
    {k:'vf',label:'Final Volume (fixed)',unit:'bbl',def:500}
  ],
  calc(v){
    const dm=ppg(K.BARITE_SG);
    const volInc=(v.w2-v.w1)/(dm-v.w2);
    const startVol=v.vf/(1+volInc);
    const discard=v.vf-startVol; // actually start<final; we keep startVol of old mud
    const lbPerBbl=dm*42*(v.w2-v.w1)/(dm-v.w2);
    const totLb=lbPerBbl*startVol;
    return {main:{n:'Starting Mud to Keep',v:round(startVol,1),u:'bbl'},
      rows:[
        {k:'Barite required',v:round(totLb,0)+' lb  ('+round(totLb/100,0)+' sacks)'},
        {k:'Volume gained by barite',v:round(v.vf-startVol,1)+' bbl'},
        {k:'Final volume',v:round(v.vf,0)+' bbl'}
      ],
      formula:'V_start = V_final ÷ (1 + ΔV);  ΔV = (W₂−W₁)/(35−W₂)',
      steps:`ΔV/bbl = ${round(volInc,4)}\nV_start = ${round(v.vf,0)} ÷ (1+${round(volInc,4)}) = <b>${round(startVol,1)} bbl</b>`,
      note:'Discard or transfer '+round(v.vf-startVol,1)+' bbl of old mud before weighting so the final volume lands on '+round(v.vf,0)+' bbl.'};
  }
});

/* ===== VOLUMES & PUMP ===== */
def('Volumes',{
  id:'capacity', name:'Pipe / Annulus Capacity', icon:'🕳️',
  desc:'Capacity and steel displacement from diameters — the workhorse volume tool.',
  inputs:[
    {k:'mode',label:'Compute',unit:'',def:'ann',opts:[['pipe','Pipe / hole capacity (ID)'],['ann','Annular capacity (Dh & Dp)'],['disp','Pipe displacement (OD & ID)']]},
    {k:'d1',label:'Diameter 1 (ID or Hole)',unit:'in',def:8.5},
    {k:'d2',label:'Diameter 2 (Pipe OD or ID)',unit:'in',def:5},
    {k:'len',label:'Length',unit:'ft',def:1000}
  ],
  calc(v){
    let capBbl, lbl;
    if(v.mode==='pipe'){ capBbl=(v.d1*v.d1)/K.CAP; lbl='Pipe/Hole capacity'; }
    else if(v.mode==='ann'){ capBbl=(v.d1*v.d1-v.d2*v.d2)/K.CAP; lbl='Annular capacity'; }
    else { capBbl=(v.d1*v.d1-v.d2*v.d2)/K.CAP; lbl='Pipe displacement'; }
    const tot=capBbl*v.len;
    return {main:{n:lbl+' (total)',v:round(tot,2),u:'bbl'},
      rows:[
        {k:'Per foot',v:round(capBbl,4)+' bbl/ft'},
        {k:'Per foot (gal)',v:round(capBbl*42,3)+' gal/ft'},
        {k:'Metric',v:round(capBbl*0.158987*1000/K.M_TO_FT,2)+' L/m'},
        {k:'Total (m³)',v:round(tot*0.158987,2)+' m³'}
      ],
      formula:'bbl/ft = (D₁² − D₂²) ÷ 1029.4     (pipe/hole: use ID² only)',
      steps:`bbl/ft = ${v.mode==='pipe'?`${round(v.d1)}²`:`(${round(v.d1)}² − ${round(v.d2)}²)`} ÷ 1029.4 = <b>${round(capBbl,4)}</b>\nTotal = ${round(capBbl,4)} × ${round(v.len,0)} = <b>${round(tot,2)} bbl</b>`,
      note:'1029.4 comes from the barrel geometry (in²·ft → bbl). For metric use mm²: L/m = ID(mm)² × 0.0007854.'};
  }
});
def('Volumes',{
  id:'pump', name:'Pump Output & Strokes', icon:'⛽',
  desc:'Triplex/duplex output, and strokes/time for bottoms-up or full circulation.',
  inputs:[
    {k:'type',label:'Pump Type',unit:'',def:'triplex',opts:[['triplex','Triplex (single-acting)'],['duplex','Duplex (double-acting)']]},
    {k:'liner',label:'Liner (bore) Diameter',unit:'in',def:6},
    {k:'stroke',label:'Stroke Length',unit:'in',def:12},
    {k:'rod',label:'Rod Dia (duplex only)',unit:'in',def:2.5},
    {k:'eff',label:'Volumetric Efficiency',unit:'%',def:95},
    {k:'spm',label:'Pump Speed',unit:'spm',def:60},
    {k:'circvol',label:'Volume to circulate',unit:'bbl',def:800}
  ],
  calc(v){
    let bblStk;
    if(v.type==='triplex') bblStk=K.TRIPLEX*v.liner*v.liner*v.stroke*(v.eff/100);
    else bblStk=0.000162*v.stroke*(2*v.liner*v.liner - v.rod*v.rod)*(v.eff/100);
    const bblMin=bblStk*v.spm;
    const strokes=v.circvol/bblStk;
    const mins=strokes/v.spm;
    return {main:{n:'Pump Output',v:round(bblStk,4),u:'bbl/stk'},
      rows:[
        {k:'Output',v:round(bblMin,2)+' bbl/min  ('+round(bblMin*42,0)+' gpm)'},
        {k:'Output',v:round(bblMin*60,1)+' bbl/hr'},
        {k:'Strokes for '+round(v.circvol,0)+' bbl',v:round(strokes,0)+' stk'},
        {k:'Time',v:round(mins,1)+' min  ('+round(mins/60,2)+' hr)'}
      ],
      formula:'Triplex: bbl/stk = 0.000243 × D² × S × eff\nDuplex:  bbl/stk = 0.000162 × S × (2D² − d²) × eff',
      steps:`bbl/stk = <b>${round(bblStk,4)}</b>\nStrokes = ${round(v.circvol,0)} ÷ ${round(bblStk,4)} = <b>${round(strokes,0)}</b>\nTime = ${round(strokes,0)} ÷ ${round(v.spm,0)} = <b>${round(mins,1)} min</b>`,
      note:'D = liner bore. Confirm output by pump-stroke count against a known pit volume ("pump calibration").'};
  }
});
def('Volumes',{
  id:'annvel', name:'Annular Velocity & Bottoms-Up', icon:'🌊',
  desc:'Annular velocity for hole cleaning, plus lag/bottoms-up time.',
  inputs:[
    {k:'gpm',label:'Flow Rate',unit:'gpm',def:600},
    {k:'dh',label:'Hole / Casing ID',unit:'in',def:8.5},
    {k:'dp',label:'Pipe OD',unit:'in',def:5},
    {k:'len',label:'Annulus Length',unit:'ft',def:10000}
  ],
  calc(v){
    const av=24.51*v.gpm/(v.dh*v.dh-v.dp*v.dp); // ft/min
    const cap=(v.dh*v.dh-v.dp*v.dp)/K.CAP; // bbl/ft
    const annVol=cap*v.len;
    const bblMin=v.gpm/42;
    const lag=annVol/bblMin;
    return {main:{n:'Annular Velocity',v:round(av,0),u:'ft/min'},
      rows:[
        {k:'Annular velocity',v:round(av/3.2808,1)+' m/min'},
        {k:'Annular capacity',v:round(cap,4)+' bbl/ft'},
        {k:'Annular volume',v:round(annVol,1)+' bbl'},
        {k:'Bottoms-up (lag) time',v:round(lag,1)+' min'}
      ],
      formula:'AV (ft/min) = 24.51 × Q (gpm) ÷ (Dh² − Dp²)',
      steps:`AV = 24.51 × ${round(v.gpm,0)} ÷ (${round(v.dh)}²−${round(v.dp)}²) = <b>${round(av,0)} ft/min</b>`,
      note:'Rule of thumb: keep AV ≥ 100–120 ft/min in vertical holes for good cleaning; more in large/deviated holes.'};
  }
});

/* ===== RHEOLOGY & HYDRAULICS ===== */
def('Rheology',{
  id:'bingham', name:'Rheology (PV / YP / Gels)', icon:'📈',
  desc:'Bingham-plastic parameters from the 6-speed viscometer.',
  inputs:[
    {k:'r600',label:'θ600 (600 rpm)',unit:'°',def:60},
    {k:'r300',label:'θ300 (300 rpm)',unit:'°',def:40},
    {k:'g10s',label:'10-sec gel',unit:'lb/100ft²',def:8},
    {k:'g10m',label:'10-min gel',unit:'lb/100ft²',def:14}
  ],
  calc(v){
    const pv=v.r600-v.r300;
    const yp=v.r300-pv;
    const av=v.r600/2;
    return {main:{n:'Plastic Viscosity (PV)',v:round(pv,1),u:'cP'},
      rows:[
        {k:'Yield Point (YP)',v:round(yp,1)+' lb/100ft²'},
        {k:'Apparent Viscosity (AV)',v:round(av,1)+' cP'},
        {k:'YP/PV ratio',v:round(yp/pv,2)},
        {k:'Gels 10s / 10min',v:round(v.g10s)+' / '+round(v.g10m)+' lb/100ft²'}
      ],
      formula:'PV = θ600 − θ300\nYP = θ300 − PV = 2·θ300 − θ600\nAV = θ600 ÷ 2',
      steps:`PV = ${round(v.r600)} − ${round(v.r300)} = <b>${round(pv,1)} cP</b>\nYP = 2×${round(v.r300)} − ${round(v.r600)} = <b>${round(yp,1)} lb/100ft²</b>`,
      note:'Rising PV → build-up of fine drilled solids (dilute / improve solids removal). Rising YP/gels → flocculation (thin chemically).'};
  }
});
def('Rheology',{
  id:'powerlaw', name:'Power-Law (n & K)', icon:'🧮',
  desc:'Flow-behaviour index n and consistency K for pipe and annulus.',
  inputs:[
    {k:'r600',label:'θ600',unit:'°',def:60},
    {k:'r300',label:'θ300',unit:'°',def:40},
    {k:'r100',label:'θ100',unit:'°',def:18},
    {k:'r3',label:'θ3',unit:'°',def:6}
  ],
  calc(v){
    const np=3.32*Math.log10(v.r600/v.r300);
    const Kp=5.11*v.r300/Math.pow(511,np);
    const na=0.657*Math.log10(v.r100/v.r3);
    const Ka=5.11*v.r100/Math.pow(170.2,na);
    return {main:{n:'Pipe  n  (flow index)',v:round(np,3),u:''},
      rows:[
        {k:'Pipe K (consistency)',v:round(Kp,2)+' eq·cP  (dyne·sⁿ/100cm²)'},
        {k:'Annular n',v:round(na,3)},
        {k:'Annular K',v:round(Ka,2)},
        {k:'Behaviour',v: np<1?'Shear-thinning (pseudoplastic)':'Near-Newtonian'},
        {k:'Model / reference',v:'API RP 13D two-point power-law'}
      ],
      formula:'n_pipe = 3.32·log₁₀(θ600/θ300)      K_pipe = 5.11·θ300 ÷ 511ⁿ\nn_ann = 0.657·log₁₀(θ100/θ3)      K_ann = 5.11·θ100 ÷ 170.2ⁿ',
      steps:`n = 3.32 × log(${round(v.r600)}/${round(v.r300)}) = <b>${round(np,3)}</b>\nK = 5.11×${round(v.r300)} ÷ 511^${round(np,3)} = <b>${round(Kp,2)}</b>`,
      note:'Lower n = more shear-thinning = better hole cleaning at low annular rates; use the annular n/K for ECD & cuttings transport.\n\nReference — API RP 13D "Rheology and Hydraulics of Oil-well Drilling Fluids" (two-point power-law), also in the M-I SWACO Drilling Fluids Engineering Manual and Baroid Fluids Handbook. Pipe n/K use the θ600/θ300 readings (Fann shear rates 1022 & 511 s⁻¹) → 3.32 = 1 ÷ log₁₀(1022/511). Annular (low-shear) n/K use the θ100/θ3 readings (170.2 & 5.11 s⁻¹) → 0.657 = 1 ÷ log₁₀(170.2/5.11). The 5.11 factor converts a dial unit (lb/100ft²) to dyne·s/cm².'};
  }
});
def('Rheology',{
  id:'ecd', name:'Equivalent Circulating Density', icon:'🔺',
  desc:'ECD from annular pressure loss — the effective downhole density while pumping.',
  inputs:[
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'apl',label:'Annular Pressure Loss',unit:'psi',def:250},
    {k:'tvd',label:'True Vertical Depth',unit:'ft',def:10000}
  ],
  calc(v){
    const ecd=v.mw+v.apl/(K.PSI_PER_PPG_FT*v.tvd);
    return {main:{n:'Equivalent Circulating Density',v:round(ecd,2),u:'ppg'},
      rows:[
        {k:'ΔECD over static',v:'+'+round(ecd-v.mw,2)+' ppg'},
        {k:'ECD (SG)',v:round(ecd/8.345,3)+' SG'},
        {k:'Bottom-hole circ. pressure',v:round(K.PSI_PER_PPG_FT*ecd*v.tvd,0)+' psi'}
      ],
      formula:'ECD = MW + APL ÷ (0.052 × TVD)',
      steps:`ECD = ${round(v.mw)} + ${round(v.apl,0)} ÷ (0.052 × ${round(v.tvd,0)})\n  = <b>${round(ecd,2)} ppg</b>`,
      note:'Keep ECD below the fracture gradient. High ECD → losses; also rises with cuttings loading, gels & fast tripping (surge).'};
  }
});

/* ===== SOLIDS ===== */
def('Solids',{
  id:'retort', name:'Solids Analysis (Retort)', icon:'🔬',
  desc:'LGS / HGS split and concentrations from retort + mud weight.',
  inputs:[
    {k:'oil',label:'Retort Oil',unit:'vol %',def:0},
    {k:'water',label:'Retort Water',unit:'vol %',def:78},
    {k:'mw',label:'Mud Weight',unit:'ppg',def:12},
    {k:'oilsg',label:'Oil SG (if any)',unit:'',def:0.84},
    {k:'watsg',label:'Water/Brine SG',unit:'',def:1.0}
  ],
  calc(v){
    const vs=100-v.oil-v.water;
    if(vs<=0) return {main:{n:'—',v:'—',u:''},rows:[],formula:'',warn:'Oil + water ≥ 100% — check retort readings.'};
    const massTot=100*(v.mw/8.33);
    const asg=(massTot - v.watsg*v.water - v.oilsg*v.oil)/vs; // avg SG of solids
    let lgs=vs*(K.BARITE_SG-asg)/(K.BARITE_SG-K.LGS_SG);
    let hgs=vs-lgs;
    lgs=Math.max(0,lgs); hgs=Math.max(0,hgs);
    const lgsLb=lgs/100*K.LGS_SG*350;
    const hgsLb=hgs/100*K.BARITE_SG*350;
    return {main:{n:'Total Solids',v:round(vs,1),u:'vol %'},
      rows:[
        {k:'Avg SG of solids',v:round(asg,2)},
        {k:'Low-Gravity Solids (LGS)',v:round(lgs,1)+' vol %  ('+round(lgsLb,0)+' lb/bbl)'},
        {k:'High-Gravity Solids (barite)',v:round(hgs,1)+' vol %  ('+round(hgsLb,0)+' lb/bbl)'},
        {k:'LGS as ppb bentonite-equiv guide',v:round(lgsLb,0)+' lb/bbl'}
      ],
      formula:'Vs = 100 − Voil − Vwater\nASG = [100·(MW/8.33) − SGw·Vw − SGo·Vo] ÷ Vs\n%LGS = Vs·(4.2 − ASG)/(4.2 − 2.6)',
      steps:`Vs = 100 − ${round(v.oil)} − ${round(v.water)} = <b>${round(vs,1)}%</b>\nASG = <b>${round(asg,2)}</b>\n%LGS = <b>${round(lgs,1)}%</b>,  %HGS = <b>${round(hgs,1)}%</b>`,
      note:'Target LGS < 6% (unweighted) / < 5% (weighted). High LGS → poor ROP, high ECD, thick cake. Correct by dilution + solids-control.'};
  }
});
def('Solids',{
  id:'mbt', name:'MBT (Cation Exchange Capacity)', icon:'🔵',
  desc:'Reactive-clay content from the methylene-blue titration.',
  inputs:[
    {k:'ml',label:'Methylene Blue used',unit:'mL',def:12},
    {k:'sample',label:'Mud sample',unit:'mL',def:2}
  ],
  calc(v){
    const mbt=5*v.ml/v.sample; // lb/bbl bentonite equivalent
    return {main:{n:'MBT (bentonite equiv.)',v:round(mbt,1),u:'lb/bbl'},
      rows:[
        {k:'CEC (approx)',v:round(mbt*1.0,1)+' meq/100g'},
        {k:'Interpretation',v: mbt<20?'Acceptable':mbt<30?'High — dilute':'Very high — treat/dilute'}
      ],
      formula:'MBT (lb/bbl) = 5 × mL methylene blue ÷ mL sample',
      steps:`MBT = 5 × ${round(v.ml)} ÷ ${round(v.sample)} = <b>${round(mbt,1)} lb/bbl</b>`,
      note:'MBT tracks reactive drilled-clay + bentonite. Rising MBT with steady rheology signals commercial-clay build-up — dilute.'};
  }
});

/* ===== CHEMISTRY / PILOT ===== */
def('Chemistry',{
  id:'alkalinity', name:'Alkalinity & Carbonates', icon:'⚗️',
  desc:'Water-mud carbonate/bicarbonate analysis (Pf/Mf); excess lime for oil/synthetic mud (POM).',
  inputs:[
    {k:'mode',label:'Mud type',unit:'',def:'wbm',rerender:true,opts:[['wbm','Water-based  (Pf / Mf ion analysis)'],['obm','Oil / Synthetic  (excess lime from POM)']]},
    {k:'pf',label:'Pf — filtrate, phenolphthalein',unit:'mL',def:0.5,when:v=>v.mode!=='obm'},
    {k:'mf',label:'Mf — filtrate, methyl orange',unit:'mL',def:1.2,when:v=>v.mode!=='obm'},
    {k:'pm',label:'Pm — whole mud (lime muds)',unit:'mL',def:6,when:v=>v.mode!=='obm'},
    {k:'fw',label:'Water fraction (retort)',unit:'0–1',def:0.78,when:v=>v.mode!=='obm'},
    {k:'pom',label:'POM — whole-mud alkalinity',unit:'mL',def:4,when:v=>v.mode==='obm'}
  ],
  calc(v){
    if(v.mode==='obm'){
      const lime=1.295*v.pom;
      return {main:{n:'Excess Lime (oil/synthetic)',v:round(lime,2),u:'lb/bbl'},
        rows:[
          {k:'POM (whole-mud alkalinity)',v:round(v.pom,2)+' mL'},
          {k:'Target POM',v:'≥ 2.5  (typical 5–10)'},
          {k:'Status',v: v.pom<2.5?'⚠ Low — emulsion at risk':'✓ Adequate reserve'}
        ],
        formula:'Excess Lime (lb/bbl) = 1.295 × POM\n POM = whole-mud alkalinity (cm³ of 0.1N H₂SO₄ to the phenolphthalein end-point).',
        steps:`Excess Lime = 1.295 × ${round(v.pom,2)} = <b>${round(lime,2)} lb/bbl</b>`,
        note:'In oil/synthetic muds the excess lime forms the calcium-soap emulsifier and buffers acid gases (CO₂, H₂S). Keep POM ≥ 2.5 (usually 5–10). Ester-base muds run lower and must be watched.'};
    }
    // Water-based: Pf/Mf ion analysis (API RP 13B)
    let oh,co3,hco3;
    if(v.pf===0){oh=0;co3=0;hco3=1220*v.mf;}
    else if(2*v.pf<v.mf){oh=0;co3=1200*v.pf;hco3=1220*(v.mf-2*v.pf);}
    else if(2*v.pf===v.mf){oh=0;co3=1200*v.pf;hco3=0;}
    else {oh=340*(2*v.pf-v.mf);co3=1200*(v.mf-v.pf);hco3=0;}
    const limeRes=0.26*(v.pm - v.fw*v.pf);
    const species= oh>0?(co3>0?'Hydroxyl + Carbonate':'Hydroxyl only'): co3>0?(hco3>0?'Carbonate + Bicarbonate':'Carbonate only'): hco3>0?'Bicarbonate only':'None';
    return {main:{n:'Carbonate CO₃²⁻',v:round(co3,0),u:'mg/L'},
      rows:[
        {k:'Hydroxyl OH⁻',v:round(oh,0)+' mg/L'},
        {k:'Bicarbonate HCO₃⁻',v:round(hco3,0)+' mg/L'},
        {k:'Species present',v:species},
        {k:'Pf : Mf',v:round(v.pf,2)+' : '+round(v.mf,2)},
        {k:'Lime reserve (lime muds only)',v:round(limeRes,2)+' lb/bbl'}
      ],
      formula:'Ions from the Pf/Mf relationship (API RP 13B):\n  2·Pf < Mf → CO₃²⁻ = 1200·Pf,  HCO₃⁻ = 1220·(Mf − 2Pf)\n  2·Pf > Mf → OH⁻ = 340·(2Pf − Mf),  CO₃²⁻ = 1200·(Mf − Pf)\nLime reserve (lime muds) = 0.26·(Pm − Fw·Pf)',
      steps:`Pf=${round(v.pf,2)}, Mf=${round(v.mf,2)}  →  OH⁻ ${round(oh,0)},  CO₃²⁻ <b>${round(co3,0)}</b>,  HCO₃⁻ ${round(hco3,0)} mg/L`,
      note:'For water muds the Pf/Mf test finds carbonate/bicarbonate contamination (raises rheology & fluid loss — treat with lime + gyp/SAPP). "Excess lime" is an oil-mud / lime-mud term — switch Mud type to Oil/Synthetic for the POM method.'};
  }
});
def('Chemistry',{
  id:'chlorides', name:'Chlorides & Salinity', icon:'🧂',
  desc:'Chloride and NaCl content from the silver-nitrate titration.',
  inputs:[
    {k:'ml',label:'AgNO₃ (0.0282 N) used',unit:'mL',def:10},
    {k:'sample',label:'Filtrate sample',unit:'mL',def:1},
    {k:'norm',label:'AgNO₃ Normality',unit:'N',def:0.0282,opts:[[0.0282,'0.0282 N (×1000)'],[0.282,'0.282 N (×10000)']]}
  ],
  calc(v){
    const factor=v.norm==0.282?10000:1000;
    const cl=v.ml*factor/v.sample;
    const nacl=cl*1.65;
    return {main:{n:'Chloride (Cl⁻)',v:round(cl,0),u:'mg/L'},
      rows:[
        {k:'Salt (NaCl)',v:round(nacl,0)+' mg/L'},
        {k:'Salt',v:round(nacl/10000,2)+' % (wt)'},
        {k:'Approx. brine SG add',v:'—'}
      ],
      formula:'Cl⁻ (mg/L) = mL AgNO₃ × 1000 ÷ mL sample   (0.0282 N)\nNaCl = Cl⁻ × 1.65',
      steps:`Cl⁻ = ${round(v.ml)} × ${factor} ÷ ${round(v.sample)} = <b>${round(cl,0)} mg/L</b>\nNaCl = <b>${round(nacl,0)} mg/L</b>`,
      note:'Rising chlorides = salt/saltwater flow. Salt saturation ≈ 189,000 mg/L Cl⁻ at surface (fresh-water base).'};

});

def('Chemistry',{
  id:'owradj', name:'Oil/Water Ratio — Adjust', icon:'🛢️',
  desc:'Base oil to add to RAISE the O/W ratio, or water/brine to add to LOWER it.',
  inputs:[
    {k:'mode',label:'Adjustment',unit:'',def:'up',rerender:true,opts:[['up','Raise OWR  (add base oil)'],['down','Lower OWR  (add water / brine)']]},
    {k:'oil',label:'Retort Oil',unit:'vol %',def:60},
    {k:'water',label:'Retort Water',unit:'vol %',def:25},
    {k:'tor',label:'Desired Oil Ratio',unit:'% oil',def:80},
    {k:'vol',label:'Mud Volume to convert',unit:'bbl',def:500}
  ],
  calc(v){
    const liq=v.oil+v.water;
    if(liq<=0) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Enter the retort oil & water volumes.'};
    const curOR=v.oil/liq*100, curWR=100-curOR;
    if(v.tor<=0||v.tor>=100) return {main:{n:'—',v:'—',u:''},rows:[],warn:'Desired oil ratio must be between 1 and 99 %.'};
    if(v.mode==='up'){
      if(v.tor<=curOR) return {main:{n:'—',v:'—',u:''},rows:[],warn:'To ADD OIL the desired oil ratio must be higher than the current '+round(curOR,1)+'%. To lower it, switch to "Lower OWR".'};
      const WR2=100-v.tor;
      const perBbl=v.water/WR2 - liq/100;      // bbl base oil per bbl mud
      const total=perBbl*v.vol;
      return {main:{n:'Base Oil to Add',v:round(total,1),u:'bbl'},
        rows:[
          {k:'Oil per bbl of mud',v:round(perBbl,3)+' bbl/bbl'},
          {k:'Current OWR',v:round(curOR,0)+' / '+round(curWR,0)},
          {k:'New OWR (target)',v:round(v.tor,0)+' / '+round(WR2,0)},
          {k:'Total oil',v:round(total*42,0)+' US gal'},
          {k:'New mud volume',v:round(v.vol+total,1)+' bbl'}
        ],
        formula:'Oil to add (bbl/bbl) = %water ÷ WR₂ − (%oil + %water) ÷ 100\n   WR₂ = 100 − desired oil ratio',
        steps:`= ${round(v.water)} ÷ ${round(WR2)} − ${round(liq)} ÷ 100 = ${round(perBbl,3)} bbl/bbl\nTotal = ${round(perBbl,3)} × ${round(v.vol,0)} = <b>${round(total,1)} bbl</b>`,
        note:'Adding base oil raises the oil ratio and thins the mud — it lowers the mud weight, so re-weight with barite and re-check ES afterwards.'};
    } else {
      if(v.tor>=curOR) return {main:{n:'—',v:'—',u:''},rows:[],warn:'To ADD WATER the desired oil ratio must be lower than the current '+round(curOR,1)+'%. To raise it, switch to "Raise OWR".'};
      const OR2=v.tor;
      const perBbl=v.oil/OR2 - liq/100;        // bbl water/brine per bbl mud
      const total=perBbl*v.vol;
      return {main:{n:'Water / Brine to Add',v:round(total,1),u:'bbl'},
        rows:[
          {k:'Water per bbl of mud',v:round(perBbl,3)+' bbl/bbl'},
          {k:'Current OWR',v:round(curOR,0)+' / '+round(curWR,0)},
          {k:'New OWR (target)',v:round(OR2,0)+' / '+round(100-OR2,0)},
          {k:'Total water/brine',v:round(total*42,0)+' US gal'},
          {k:'New mud volume',v:round(v.vol+total,1)+' bbl'}
        ],
        formula:'Water to add (bbl/bbl) = %oil ÷ OR₂ − (%oil + %water) ÷ 100\n   OR₂ = desired oil ratio',
        steps:`= ${round(v.oil)} ÷ ${round(OR2)} − ${round(liq)} ÷ 100 = ${round(perBbl,3)} bbl/bbl\nTotal = ${round(perBbl,3)} × ${round(v.vol,0)} = <b>${round(total,1)} bbl</b>`,
        note:'Add the SAME-salinity brine as the mud\'s internal phase (usually CaCl₂), never fresh water, or you change the water activity / ES. Lowering OWR raises viscosity.'};
    }
  }
});

def('Well Control',{
  id:'kill', name:'Kill Mud Weight & Pressures', icon:'🛑',
  desc:'Kill-sheet basics: KMW, ICP and FCP from shut-in pressures.',
  inputs:[
    {k:'mw',label:'Current Mud Weight',unit:'ppg',def:12},
    {k:'tvd',label:'True Vertical Depth',unit:'ft',def:12000},
    {k:'sidpp',label:'Shut-in Drillpipe Pressure',unit:'psi',def:400},
    {k:'sicp',label:'Shut-in Casing Pressure',unit:'psi',def:550},
    {k:'scr',label:'Slow Circ. Rate Pressure',unit:'psi',def:800}
  ],
  calc(v){
    const kmw=v.mw+v.sidpp/(K.PSI_PER_PPG_FT*v.tvd);
    const icp=v.sidpp+v.scr;
    const fcp=v.scr*kmw/v.mw;
    const fp=v.sidpp+K.PSI_PER_PPG_FT*v.mw*v.tvd;
    return {main:{n:'Kill Mud Weight',v:round(kmw,2),u:'ppg'},
      rows:[
        {k:'MW increase',v:'+'+round(kmw-v.mw,2)+' ppg'},
        {k:'Initial Circ. Pressure (ICP)',v:round(icp,0)+' psi'},
        {k:'Final Circ. Pressure (FCP)',v:round(fcp,0)+' psi'},
        {k:'Formation pressure',v:round(fp,0)+' psi ('+round(fp/v.tvd,3)+' psi/ft)'}
      ],
      formula:'KMW = MW + SIDPP ÷ (0.052 × TVD)\nICP = SIDPP + SCRP\nFCP = SCRP × KMW ÷ MW',
      steps:`KMW = ${round(v.mw)} + ${round(v.sidpp,0)} ÷ (0.052×${round(v.tvd,0)}) = <b>${round(kmw,2)} ppg</b>\nICP = <b>${round(icp,0)}</b>,  FCP = <b>${round(fcp,0)} psi</b>`,
      warn: v.sicp>v.sidpp+800?'⚠ High SICP vs SIDPP — possible gas/large influx; verify before circulating.':'',
      note:'Driller\'s / Wait-&-Weight method. Always follow the rig well-control program and IWCF/IADC procedures — this is a planning aid only.'};
  }
});
