 down, losing your mud level in the riser can let seawater pressure collapse the riser — a problem you never face on a land rig."},{"title":"Gas Hydrates — Ice That Isn't Cold","intro":"This is the signature deepwater danger. Gas hydrates are an ice-like solid made of gas and water that forms under high pressure and cold — even at temperatures well above normal freezing. They can plug your lines and BOPs when you least want it.","points":["Hydrates are an 'ice-like' mixture of natural gas and water; high pressure lets them form at moderate, even room-like temperatures.","One cubic foot of hydrate can hold about 170 cubic feet of gas — they pack a lot of gas into a solid.","In deep water (cold seabed, high pressure) they form easily during a kick and can plug the riser, BOP lines and choke-and-kill lines — wrecking well control.","The standard fix: raise the SALT content. Deepwater water-base muds use about 20% salt by weight to suppress hydrate formation.","For ultra-deep or arctic wells, add glycerol or glycol along with the salt for extra protection.","Oil, mineral and synthetic muds naturally resist hydrates because they have little water and that water is very salty."],"box":"Every deepwater mud system MUST be formulated to suppress gas hydrates — it's not optional, it's a safety requirement."},{"title":"Weak Rock, Cold Mud and Big Volumes","intro":"Beyond hydrates, deepwater brings a cluster of linked problems that all come back to young rock, cold seawater and the sheer size of the system. Manage them together.","points":["Low fracture gradients: the shallow, un-compacted rock is weak, so it fractures easily. That makes lost circulation and surge/swab pressures a constant worry.","Reactive shale (gumbo): soft, sticky young clay that balls up the bit and packs off the hole. Synthetic and oil muds fix this by oil-wetting the sticky surfaces.","Cold flowline temperatures: cold seawater around the riser thickens the mud (especially oil/synthetic), raising viscosity and pressures. A third 'boost' pump on the riser helps keep it warm and cleaned.","Huge volumes: a big riser plus large casing can mean a 4,000-barrel-plus system, so you need lots of additives and careful inventory and logistics planning.","Hole cleaning is critical — poor cleaning raises ECD, and with low fracture gradients that's a recipe for lost circulation.","Manage tripping speed, drill rate, ECD, viscosity and mud weight together to stay inside that narrow safe window."]},{"title":"Well Control and the Right Mud Choice","intro":"When a kick happens in deep water, the long riser and low fracture gradients change everything. And choosing the mud is a balancing act between performance, cost and the environment.","points":["Low fracture gradients mean the casing shoe can't hold high shut-in pressures, so a shallow kick could cause an underground blowout.","Diverter systems handle shallow gas kicks; deeper kicks are circulated out down the drill pipe, up the annulus, through the seafloor BOPs and up a long choke line.","Those long, skinny choke lines add friction (choke-line pressure loss, CPL) that must be subtracted when running the kill — otherwise you over-pressure the well.","Gas dissolves easily in oil and synthetic muds, which makes kicks harder to detect — a real well-control concern.","Synthetic and oil muds give great shale stability, lubricity and hydrate suppression, but they are expensive and risky where lost circulation is likely.","Don't automatically pick the cheapest mud — a high-performance system that saves rig days is usually the true low-cost choice."]}],"quiz":[{"q":"For this chapter, 'deepwater' generally means drilling in water deeper than about:","options":["50 ft","500 ft","1,500 ft","50,000 ft"],"answer":2,"explain":"Deepwater here means water depths greater than 1,500 ft, using floating rigs with subsea wellheads and long risers."},{"q":"What are gas hydrates?","options":["A type of heavy weighting material","An ice-like solid mixture of gas and water that forms under high pressure and cold","A corrosion inhibitor","A kind of drill bit"],"answer":1,"explain":"Hydrates are an ice-like gas-and-water solid that forms at high pressure and low temperature and can plug risers and BOP lines."},{"q":"What is the common method to suppress gas hydrates in a deepwater water-base mud?","options":["Add fresh water","Increase the salt content (about 20% by weight)","Cool the mud further","Remove all the barite"],"answer":1,"explain":"Raising salinity (standard is ~20% salt by weight, with glycol/glycerol for extreme cases) lowers the temperature at which hydrates form."},{"q":"Why is lost circulation such a big worry in deepwater drilling?","options":["The rock is too hard to fracture","Young, weak rock has low fracture gradients and a narrow safe mud-weight window","There is no pore pressure at all","Mud is too cheap to lose"],"answer":1,"explain":"Shallow, un-compacted formations fracture easily; combined with surge/swab and ECD, that narrow window makes losing circulation a constant risk."},{"q":"Why can a total loss of mud level in the riser be so dangerous in deep water?","options":["The mud gets too warm","The seawater's hydrostatic pressure can collapse and damage the riser","It makes the pipe rotate faster","Nothing happens at all"],"answer":1,"explain":"If the mud level in the long riser drops, outside seawater pressure can buckle and damage the riser — a problem unique to subsea-BOP floating rigs."}]},{"id":"ms_hse","name":"21 · Health, Safety & Environment","icon":"🦺","desc":"How to handle mud safely, protect the workers and the environment, and stay on the right side of the rules.","modules":[{"title":"Why HSE Matters on the Rig","intro":"Health, Safety and Environment (HSE) is about three things: keeping workers safe, protecting the community, and not harming the land, water or air. It touches every part of how we design and use mud, and today the public, regulators and customers all expect us to get it right.","points":["Health and safety focus on protecting the worker; environmental rules focus on the impact of drilling on nature and nearby communities.","Preventing pollution at the lowest cost is one of the biggest tasks facing the industry today.","HSE planning is part of the drilling plan for every single well — it's not an afterthought.","The same steps that make mud less harmful to the environment usually make it safer for the workers too.","Rules vary by country and change fast, so you always check the current local regulations.","Both drilling AND protecting the environment can be done together — they're not seen as enemies."],"box":"Simple idea: a cleaner, less-toxic mud is safer for the crew, kinder to the sea and land, and easier (and cheaper) to dispose of later."},{"title":"Knowing Your Pollutants","intro":"Before you can prevent pollution, you have to know what in the mud could actually cause harm — and remember that the SAME material can be harmless in one place and damaging in another. Salt is a good example: fine in the ocean, harmful in a freshwater stream.","points":["Heavy metals (mercury, cadmium, chromium, lead, soluble barium) are toxic, don't break down, and can build up in the food chain — a long-term problem.","Salt harms freshwater fish and stops plants from taking up water; because it dissolves easily it spreads far.","Organic wastes (hydrocarbons, specialty chemicals) can be toxic and travel through air and water.","Acids and bases shock the pH and can kill plants and animals fast.","Total Suspended Solids (TSS) cloud water, block light, and smother the gills of fish.","We measure harm two ways: bioassay toxicity tests (like the LC50 on Mysid shrimp — higher LC50 means LESS toxic) and analytical tests for specific things like metals, salt (conductivity) and oil (TPH)."]},{"title":"Managing and Disposing of Waste","intro":"There's a smart order for dealing with mud waste — a hierarchy. Always try the top of the list first, because preventing waste beats cleaning it up every time.","points":["The hierarchy: 1) prevent/reduce at the source, 2) recycle/reuse, 3) minimize the volume, 4) treat for disposal (the last resort).","Source reduction in action: better solids-control equipment removes drill solids so you need far less dilution — every barrel of solids left in can need 19 barrels of dilution to stay at 5%.","Offshore you have three basic choices: discharge (must pass toxicity and oil limits), haul to shore, or grind and inject the waste underground.","Onshore the big three concerns are heavy metals, salt and oil content of the reserve pit; common methods are reserve pits, landfarming (mixing waste into soil), injection and stabilization.","Watch the 'hidden' wastes too — wash water and rinse water from cleaning equipment; reuse wash water where you can.","Beware 'sham recycling' (like spraying used oil as weed killer) — recycling must be a genuine, safe reuse."],"box":"Golden rule of pollution: it's always better (and cheaper) to prevent waste at the source than to treat or dispose of it afterward."},{"title":"Personal Safety and the Rules","intro":"Finally, the part that protects YOU. Mud work has real hazards, and there are laws and labels built to keep crews safe. Learn the basics and use your protective gear every time.","points":["Slips, trips and falls are the number-one cause of mud-related injuries — wet bentonite gel is incredibly slippery, especially near the rig floor, shakers and pits.","Keep one hand free for handrails on stairs and ladders, clean up spills, and practice good housekeeping.","Your biggest chemical exposure is during MIXING (dust and dry materials) — check the OSHA Permissible Exposure Level and wear the PPE listed on the MSDS.","Don't relax after mixing — mud splashed on clothing is still a hazard; wash and change out of contaminated clothing quickly.","The Material Safety Data Sheet (MSDS/SDS) is your go-to for hazards and safe handling; labels like the HMIS system rate Health, Flammability, Reactivity and needed Protection (0 = minimal, 4 = severe).","H2S deserves special respect — it's covered in its own safety training and can be lethal even at low concentration."]}],"quiz":[{"q":"What does HSE stand for, and what does it cover?","options":["Heavy Salt Equipment — only mud additives","Health, Safety and Environment — protecting workers, communities and nature","High Speed Engineering — drilling faster","Hole Section Estimate — measuring depth"],"answer":1,"explain":"HSE means Health, Safety and Environment: protecting workers, the community and the land, water and air."},{"q":"In the waste-management hierarchy, which option is the MOST preferred?","options":["Treatment for disposal","Preventing/reducing waste at the source","Landfilling everything","Burning it all"],"answer":1,"explain":"Source reduction (preventing waste in the first place) sits at the top of the hierarchy — it beats recycling, minimizing and treatment."},{"q":"On a bioassay LC50 toxicity test, a HIGHER LC50 number means the material is:","options":["More toxic","Less toxic","Radioactive","Heavier"],"answer":1,"explain":"LC50 is the concentration that kills 50% of test animals — the higher that number, the more it takes to cause harm, so the LESS toxic it is."},{"q":"What is the number-one cause of drilling-fluid-related injuries?","options":["Slips, trips and falls","Radiation","Frostbite","Loud noise"],"answer":0,"explain":"Slips, trips and falls lead the list — wet bentonite gel is extremely slippery around the rig floor, shakers and pits."},{"q":"Where should a worker look for a product's hazards and safe-handling instructions?","options":["The mud weight chart","The Material Safety Data Sheet (MSDS/SDS)","The bit record","The weather forecast"],"answer":1,"explain":"The MSDS/SDS lists health/safety data, safe handling and required PPE, and must be available wherever hazardous products are used."}]}];

  answerQuiz(qi,oi){
    const st=this._quiz; if(!st) return;
    if(st.answered[qi]!==undefined) return;                // one attempt per question
    const q=st.course.quiz[qi];
    st.answered[qi]=oi;
    const right=oi===q.answer;
    if(right) st.correct++;
    for(let o=0;o<q.options.length;o++){
      const b=document.getElementById('q'+qi+'o'+o);
      if(o===q.answer){ b.style.background='rgba(47,158,111,.25)'; b.style.borderColor='var(--accent)'; }
      else if(o===oi){ b.style.background='rgba(224,90,90,.22)'; b.style.borderColor='var(--danger)'; }
      b.disabled=true;
    }
    document.getElementById('q'+qi+'fb').innerHTML=(right?'✅ <b>Correct.</b> ':'❌ <b>Not quite.</b> ')+q.explain;
    const total=st.course.quiz.length, done=Object.keys(st.answered).length;
    if(done===total){
      const pct=Math.round(st.correct/total*100);
      document.getElementById('score').innerHTML=`Score: ${st.correct} / ${total}  (${pct}%) — ${pct>=80?'Excellent! 🎉':pct>=60?'Good, review the misses.':'Review the lesson and retry.'}`;

  hydCompute(){
    const g=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};
    const r=this.report;
    // pull header values live
    r.md=g('h_md'); r.tvd=g('h_tvd'); r.mw=g('h_mw'); r.r600=g('h_r600'); r.r300=g('h_r300'); r.r100=g('h_r100'); r.r3=g('h_r3');
    r.flow=g('h_flow'); r.bit=g('h_bit'); r.surfCase=(document.getElementById('h_surf')||{}).value||r.surfCase;
    r.noz=[0,1,2,3,4,5].map(i=>g('h_n'+i));
    this.hydSave();
    const Q=r.flow, rho=r.mw, TVD=r.tvd||1;
    // power-law indices
    const np=r.r300>0?3.32*Math.log10(r.r600/r.r300):0, Kp=5.11*r.r600/Math.pow(1022,np);
    const na=r.r3>0?0.657*Math.log10(r.r100/r.r3):0, Ka=5.11*r.r100/Math.pow(170.2,na);
    const fric=(NRe,n,lam)=> NRe<=2100? lam/NRe : ((Math.log10(n)+3.93)/50)/Math.pow(NRe,(1.75-Math.log10(n))/7);
    // pipe sections
    let pTot=0; const pipeCalc=r.pipes.map(p=>{
      const id=p.id||1; const V=24.48*Q/(id*id);
      const mue=100*Kp*Math.pow((1.6/id)*V,np-1)*Math.pow((3*np+1)/(4*np),np);
      const NRe=mue>0?15.467*V*id*rho/mue:0; const f=fric(NRe,np,16); const dp=f*V*V*rho/(92916*id)*p.len;
      pTot+=dp; return {...p,V,NRe,turb:NRe>2100,dp};
    });
    // surface equipment as equivalent length of 3.826-in ID pipe
    const caseLen={'1':2600,'2':946,'3':610,'4':424}[r.surfCase]||610; const sid=3.826;
    const sV=24.48*Q/(sid*sid); const smue=100*Kp*Math.pow((1.6/sid)*sV,np-1)*Math.pow((3*np+1)/(4*np),np);
    const sNRe=smue>0?15.467*sV*sid*rho/smue:0; const sf=fric(sNRe,np,16); const pSurf=sf*sV*sV*rho/(92916*sid)*caseLen;
    // annulus sections
    let aTot=0,annVol=0,minAV=1e9; const annCalc=r.anns.map(a=>{
      const d=(a.hole-a.pipe)||0.5; const area=a.hole*a.hole-a.pipe*a.pipe; const V=24.48*Q/area;
      const mue=100*Ka*Math.pow((2.4/d)*V,na-1)*Math.pow((2*na+1)/(3*na),na);
      const NRe=mue>0?15.467*V*d*rho/mue:0; const f=fric(NRe,na,24); const dp=f*V*V*rho/(92916*d)*a.len;
      aTot+=dp; annVol+=area/1029.4*a.len; if(V<minAV)minAV=V; return {...a,V,NRe,turb:NRe>2100,dp};
    });
    // bit
    const sumSq=r.noz.reduce((s,n)=>s+n*n,0); const tfa=Math.PI/4*r.noz.reduce((s,n)=>s+(n/32)*(n/32),0);
    const pbit=sumSq>0?156*rho*Q*Q/(sumSq*sumSq):0; const vn=sumSq>0?417.2*Q/sumSq:0;
    const spp=pSurf+pTot+pbit+aTot;
    const hhpSys=spp*Q/1714, hhpb=Q*pbit/1740, hsi=1.27*hhpb/(r.bit*r.bit), impact=vn*Q*rho/1930;
    const pctBit=spp>0?pbit/spp*100:0;
    const ecd=rho+aTot/(0.052*TVD);
    const buMin=Q>0?annVol/(Q/42):0;
    const R=n=>round(n,0), R1=n=>round(n,1), R2=n=>round(n,2);
    const regime=t=>t?'<span class="turb">Turbulent</span>':'<span class="lam">Laminar</span>';
    const bar=(v,c)=>`<div class="pbar"><div style="width:${Math.max(1,Math.min(100,v))}%;background:${c}"></div></div>`;
    const pctSurf=spp>0?pSurf/spp*100:0, pctStr=spp>0?pTot/spp*100:0, pctAnn=spp>0?aTot/spp*100:0;
    let html=`
    <div class="rep-head-print"><b>${r.well||'Well: ______'}</b> · Rig: ${r.rig||'____'} · Engineer: ${r.eng||'____'} · Date: ${r.date||'____'} · Mud Engineer Pro</div>
    <div class="rgrid">
      <div class="rk"><div class="rk-l">Standpipe Pressure</div><div class="rk-v">${R(spp)}<small>psi</small></div></div>
      <div class="rk"><div class="rk-l">ECD</div><div class="rk-v" style="color:${ecd>r.mw+1.5?'var(--danger)':'var(--accent)'}">${R2(ecd)}<small>ppg</small></div></div>
      <div class="rk"><div class="rk-l">Bit Pressure Drop</div><div class="rk-v">${R(pbit)}<small>psi</small></div></div>
      <div class="rk"><div class="rk-l">% Pressure at Bit</div><div class="rk-v">${R(pctBit)}<small>%</small></div></div>
      <div class="rk"><div class="rk-l">HSI</div><div class="rk-v">${R2(hsi)}<small>hp/in²</small></div></div>
      <div class="rk"><div class="rk-l">Jet Velocity</div><div class="rk-v">${R(vn)}<small>ft/s</small></div></div>
    </div>
    <div class="rep-sub">Rheology model &nbsp;·&nbsp; Pipe: n=${R2(np)}, K=${R2(Kp)} &nbsp;·&nbsp; Annulus: n=${R2(na)}, K=${R2(Ka)} &nbsp;·&nbsp; PV=${R(r.r600-r.r300)} cP, YP=${R(2*r.r300-r.r600)} lb/100ft²</div>
    <h4 class="rep-h">Drill-string pressure losses</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Component</th><th>ID (in)</th><th>Length (ft)</th><th>Vel (ft/min)</th><th>NRe</th><th>Regime</th><th>ΔP (psi)</th></tr></thead><tbody>
      ${pipeCalc.map(p=>`<tr><td>${p.label}</td><td>${R2(p.id)}</td><td>${R(p.len)}</td><td>${R(p.V)}</td><td>${R(p.NRe)}</td><td>${regime(p.turb)}</td><td>${R(p.dp)}</td></tr>`).join('')}
      <tr class="rtot"><td colspan="6">Drill-string total</td><td>${R(pTot)}</td></tr>
    </tbody></table></div>
    <h4 class="rep-h">Annular pressure losses &amp; velocities</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Section</th><th>Hole (in)</th><th>Pipe (in)</th><th>Length (ft)</th><th>AV (ft/min)</th><th>NRe</th><th>Regime</th><th>ΔP (psi)</th></tr></thead><tbody>
      ${annCalc.map(a=>`<tr><td>${a.label}</td><td>${R2(a.hole)}</td><td>${R2(a.pipe)}</td><td>${R(a.len)}</td><td>${R(a.V)}</td><td>${R(a.NRe)}</td><td>${regime(a.turb)}</td><td>${R(a.dp)}</td></tr>`).join('')}
      <tr class="rtot"><td colspan="7">Annular total</td><td>${R(aTot)}</td></tr>
    </tbody></table></div>
    <h4 class="rep-h">System pressure distribution</h4>
    <div class="pdist">
      <div class="pd-row"><span>Surface equipment (Case ${r.surfCase})</span>${bar(pctSurf,'#5aa9f0')}<b>${R(pSurf)} psi &nbsp;(${R(pctSurf)}%)</b></div>
      <div class="pd-row"><span>Drill string</span>${bar(pctStr,'#9a86f0')}<b>${R(pTot)} psi &nbsp;(${R(pctStr)}%)</b></div>
      <div class="pd-row"><span>Bit</span>${bar(pctBit,'#ff9d2e')}<b>${R(pbit)} psi &nbsp;(${R(pctBit)}%)</b></div>
      <div class="pd-row"><span>Annulus</span>${bar(pctAnn,'#2dd4bf')}<b>${R(aTot)} psi &nbsp;(${R(pctAnn)}%)</b></div>
    </div>
    <h4 class="rep-h">Summary</h4>
    <div class="rtbl-wrap"><table class="rtbl out sum"><tbody>
      <tr><td>Standpipe (total) pressure</td><td>${R(spp)} psi</td><td>System hydraulic HP</td><td>${R(hhpSys)} hhp</td></tr>
      <tr><td>Bit pressure drop</td><td>${R(pbit)} psi (${R(pctBit)}%)</td><td>Bit hydraulic HP</td><td>${R(hhpb)} hhp</td></tr>
      <tr><td>Total flow area (TFA)</td><td>${R2(tfa)} in²</td><td>HSI</td><td>${R2(hsi)} hp/in²</td></tr>
      <tr><td>Jet (nozzle) velocity</td><td>${R(vn)} ft/s</td><td>Jet impact force</td><td>${R(impact)} lb</td></tr>
      <tr><td>ECD at TVD</td><td>${R2(ecd)} ppg</td><td>Min annular velocity</td><td>${R(minAV)} ft/min</td></tr>
      <tr><td>Annular volume</td><td>${R1(annVol)} bbl</td><td>Bottoms-up time</td><td>${R1(buMin)} min</td></tr>
    </tbody></table></div>
    <div class="rep-notes"><b>Optimization check:</b>
      ${pctBit<50?'⚠ Only '+R(pctBit)+'% of pressure at the bit — consider smaller nozzles to shift energy to the bit.':pctBit>65?'≈'+R(pctBit)+'% at bit — optimized for hydraulic horsepower (hard formation).':R(pctBit)+'% at bit is in the optimized 50–65% window.'}
      ${hsi<2.5?' HSI is low (&lt;2.5) — bit may not clean well.':hsi>5?' HSI is high (&gt;5).':' HSI is in the 2.5–5 range. ✓'}
      ${vn>450?' Jet velocity &gt;450 ft/s may erode the bit / wash out hole.':''}
      ${minAV<100?' ⚠ Min annular velocity &lt;100 ft/min — watch hole cleaning in vertical sections.':''}
    </div>`;
    document.getElementById('hydout').innerHTML=html;
  },

          ${F('API FL','apifl','cc')}${F('HTHP FL','hthp','cc')}${F('Solids','solids','%')}${F('Oil','oil','%')}${F('Water','water','%')}${F('Chlorides','chl','mg/L')}${F('ES','es','V')}${F('Excess lime','lime','ppb')}${F('pH','ph','')}${F('MBT','mbt','ppb')}${F('Pₘ','pm','')}

  dmrCompute(){
    const d=this.dmr, verify=this._dmrVerify;
    const g=id=>{const el=document.getElementById(id);return el?parseFloat(el.value)||0:0;};
    // pull numeric inputs live
    ['md','tvd','bitdepth','inc','azi','bit','flow','liner','stroke','eff','spm','mw','fv','r600','r300','r200','r100','r6','r3','apifl','hthp','solids','oil','water','chl','es','lime','ph','mbt','pm','idpipe','odpipe','holed','pitActive','pitReserve','lossShaker','lossForm','lossOther'].forEach(k=>{ if(document.getElementById('d_'+k)) d[k]=g('d_'+k); });
    d.noz=[0,1,2,3,4,5].map(i=>g('d_noz'+i));
    if(verify)['vPV','vYP','vLSYP','vOWR','vWPS','vAV','vECD','vBU','vBitdp'].forEach(k=>{const el=document.getElementById('d_'+k); if(el)d[k]=el.value;});
    localStorage.setItem('mep_dmr',JSON.stringify(d));
    const R=(n,p=0)=>round(n,p);
    // ---- rheology ----
    const PV=d.r600-d.r300, YP=2*d.r300-d.r600, AVv=d.r600/2, LSYP=2*d.r3-d.r6;
    // ---- OWR ----
    const ow=d.oil+d.water; const owrO=ow>0?Math.round(100*d.oil/ow):0, owrW=100-owrO;
    // ---- WPS (CaCl2) ----
    const saltWM=d.chl*1.565; const wps_wt=d.water>0?100*saltWM/(saltWM+d.water*1e4):0; const wps_ppm=wps_wt*1e4;
    const brineSG=cacl2Interp(wps_wt).sg;
    // ---- solids analysis (mass balance) ----
    const rhoM=d.mw/8.345, fo=d.oil/100, fw=d.water/100, fs=d.solids/100;
    const rhoOil=0.84, rhoBr=brineSG||1.0;
    const avgSG = fs>0? (rhoM - fo*rhoOil - fw*rhoBr)/fs : 0;    // avg SG of solids
    // split into LGS(2.6)/HGS(4.2)
    let fLGS=0,fHGS=0; if(fs>0){ fHGS=fs*(avgSG-2.6)/(4.2-2.6); fHGS=Math.max(0,Math.min(fs,fHGS)); fLGS=fs-fHGS; }
    const lgsPct=fLGS*100, hgsPct=fHGS*100, lgsLbBbl=fLGS*2.6*350, hgsLbBbl=fHGS*4.2*350;
    // ---- geometry / volumes ----
    const strCap=(d.idpipe*d.idpipe)/1029.4, annCap=(d.holed*d.holed-d.odpipe*d.odpipe)/1029.4;
    const strVol=strCap*d.md, annVol=annCap*d.md, totVol=strVol+annVol+d.pitActive;
    const bblStk=0.000243*d.liner*d.liner*d.stroke*(d.eff/100);
    const buStk=bblStk>0?annVol/bblStk:0, buMin=d.spm>0?buStk/d.spm:0;
    const AV=(d.holed*d.holed-d.odpipe*d.odpipe)>0?24.51*d.flow/(d.holed*d.holed-d.odpipe*d.odpipe):0;
    // ---- annular ΔP (power-law, single section) → ECD ----
    const na=d.r3>0?0.657*Math.log10((d.r100||1)/d.r3):0, Ka=5.11*d.r100/Math.pow(170.2,na||1);
    const dgap=(d.holed-d.odpipe)||0.5, aArea=d.holed*d.holed-d.odpipe*d.odpipe;
    const Va=aArea>0?24.48*d.flow/aArea:0;
    const muea=100*Ka*Math.pow((2.4/dgap)*Va,na-1)*Math.pow((2*na+1)/(3*na||1),na);
    const NRea=muea>0?15.467*Va*dgap*rhoM*8.345/muea:0;
    const fa=NRea<=2100?(NRea>0?24/NRea:0):((Math.log10(na||0.5)+3.93)/50)/Math.pow(NRea,(1.75-Math.log10(na||0.5))/7);
    const annDP=fa*Va*Va*(d.mw)/(92916*dgap)*d.md;
    const ecd=d.tvd>0?d.mw+annDP/(0.052*d.tvd):d.mw;
    // ---- bit hydraulics ----
    const sumSq=d.noz.reduce((s,n)=>s+n*n,0); const tfa=Math.PI/4*d.noz.reduce((s,n)=>s+(n/32)*(n/32),0);
    const pbit=sumSq>0?156*d.mw*d.flow*d.flow/(sumSq*sumSq):0; const vn=sumSq>0?417.2*d.flow/sumSq:0;
    const hhpb=d.flow*pbit/1740, hsi=d.bit>0?1.27*hhpb/(d.bit*d.bit):0;
    // ---- cost ----
    const dailyCost=d.prods.reduce((s,p)=>s+(p.qty||0)*(p.price||0),0);
    // ---- output ----
    const co=this.dmrCos[d.company]||this.dmrCos.Generic;
    const tile=(l,v,u,c)=>`<div class="rk"><div class="rk-l">${l}</div><div class="rk-v"${c?` style="color:${c}"`:''}>${v}<small>${u||''}</small></div></div>`;
    const pr=(l,v)=>`<tr><td>${l}</td><td class="dv">${v}</td></tr>`;
    let cmp='';
    if(verify){
      const chk=(lbl,rep,comp,tol,dec)=>{ const r=parseFloat(rep); if(rep===''||rep===undefined||isNaN(r)) return `<tr><td>${lbl}</td><td>—</td><td>${round(comp,dec)}</td><td class="vna">not entered</td></tr>`;
        const diff=comp-r, ok=Math.abs(diff)<=Math.max(tol,Math.abs(comp)*0.02);
        return `<tr><td>${lbl}</td><td>${round(r,dec)}</td><td>${round(comp,dec)}</td><td class="${ok?'vok':'vbad'}">${ok?'✔ match':'✗ off by '+round(diff,dec)}</td></tr>`; };
      cmp=`<h4 class="rep-h">Calculation check</h4><div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Value</th><th>Reported</th><th>Recomputed</th><th>Result</th></tr></thead><tbody>
        ${chk('PV (cP)',d.vPV,PV,1,0)}${chk('YP (lb/100ft²)',d.vYP,YP,1,0)}${chk('LSYP',d.vLSYP,LSYP,1,0)}
        ${chk('OWR (oil part)',d.vOWR,owrO,1,0)}${chk('WPS (ppm)',d.vWPS,wps_ppm,3000,0)}
        ${chk('Annular velocity (ft/min)',d.vAV,AV,5,0)}${chk('ECD (ppg)',d.vECD,ecd,0.1,2)}
        ${chk('Bottoms-up (min)',d.vBU,buMin,2,1)}${chk('Bit ΔP (psi)',d.vBitdp,pbit,25,0)}
      </tbody></table></div><p class="rep-sub">Match tolerance = greater of the fixed window shown or 2% of the recomputed value. “Off” means the report's printed figure disagrees with the physics from its own inputs — re-check the entry or the source calc.</p>`;
    }
    let html=`
    <div class="dmr-band" style="border-color:${co.c}">
      <div class="dmr-brand" style="color:${co.c}">${co.brand}</div>
      <div class="dmr-title">${co.title}${co.sub?` <span>${co.sub}</span>`:''}</div>
      <div class="dmr-meta"><b>${d.well||'Well ___'}</b> · Rig ${d.rig||'___'} · Report ${d.repno||'__'} · ${d.date||'____'} · ${d.operator||''}${d.contractor?' / '+d.contractor:''} · ${d.formation||''} · MD ${R(d.md)} ft / TVD ${R(d.tvd)} ft · ${d.activity||''}</div>
    </div>
    <div class="rgrid">
      ${tile('PV / YP',R(PV)+' / '+R(YP),'cP · lb')}
      ${tile('WPS',R(wps_ppm),'ppm',wps_ppm<200000||wps_ppm>240000?'var(--danger)':'var(--accent)')}
      ${tile('OWR',owrO+'/'+owrW,'')}
      ${tile('ECD',R(ecd,2),'ppg',ecd>d.mw+1.5?'var(--danger)':'var(--accent)')}
      ${tile('Ann. velocity',R(AV),'ft/min',AV<120?'var(--warn)':'var(--accent)')}
      ${tile('Bottoms-up',R(buMin,0),'min')}
    </div>
    <div class="dmr-cols">
      <div><h4 class="rep-h">Mud properties</h4><table class="rtbl out sum"><tbody>
        ${pr('Mud weight',R(d.mw,2)+' ppg  ('+R(d.mw/8.345,3)+' SG)')}
        ${pr('Funnel / PV / YP',R(d.fv)+' s/qt · '+R(PV)+' cP · '+R(YP)+' lb/100ft²')}
        ${pr('App. visc / LSYP',R(AVv)+' cP · '+R(LSYP)+' lb/100ft²')}
        ${pr('Dial θ600/300/200/100/6/3',[d.r600,d.r300,d.r200,d.r100,d.r6,d.r3].map(x=>R(x)).join(' / '))}
        ${pr('API / HTHP fluid loss',R(d.apifl,1)+' / '+R(d.hthp,1)+' cc')}
        ${pr('Solids / Oil / Water',R(d.solids)+' / '+R(d.oil)+' / '+R(d.water)+' %')}
        ${pr('Oil-water ratio',owrO+' / '+owrW)}
        ${pr('Chlorides (whole mud)',R(d.chl)+' mg/L')}
        ${pr('CaCl₂ / WPS',R(saltWM)+' mg/L · '+R(wps_wt,1)+' wt% · '+R(wps_ppm)+' ppm')}
        ${pr('Brine SG',R(brineSG,3))}
        ${pr('ES / Excess lime',R(d.es)+' V · '+R(d.lime,1)+' ppb')}
        ${pr('pH / MBT / Pₘ',R(d.ph,1)+' · '+R(d.mbt,1)+' ppb · '+R(d.pm,1))}
      </tbody></table></div>
      <div><h4 class="rep-h">Solids · volumes · hydraulics</h4><table class="rtbl out sum"><tbody>
        ${pr('Avg SG of solids',R(avgSG,2))}
        ${pr('LGS',R(lgsPct,1)+' %  ·  '+R(lgsLbBbl,1)+' lb/bbl')}
        ${pr('HGS (barite)',R(hgsPct,1)+' %  ·  '+R(hgsLbBbl,0)+' lb/bbl')}
        ${pr('String / annulus vol',R(strVol,1)+' / '+R(annVol,1)+' bbl')}
        ${pr('Active system volume',R(totVol,0)+' bbl')}
        ${pr('Pump output',R(bblStk,4)+' bbl/stk')}
        ${pr('Bottoms-up',R(buStk)+' stk · '+R(buMin,1)+' min')}
        ${pr('Annular velocity',R(AV)+' ft/min')}
        ${pr('ECD at TD',R(ecd,2)+' ppg  (ann ΔP '+R(annDP)+' psi)')}
        ${pr('Bit ΔP / jet vel',R(pbit)+' psi · '+R(vn)+' ft/s')}
        ${pr('TFA / HSI',R(tfa,3)+' in² · '+R(hsi,2)+' hp/in²')}
        ${pr('Total daily losses',R(d.lossShaker+d.lossForm+d.lossOther)+' bbl')}
      </tbody></table></div>
    </div>
    <h4 class="rep-h">Products used &amp; cost</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Product</th><th>Unit</th><th>Qty</th><th>Unit price</th><th>Cost</th></tr></thead><tbody>
      ${d.prods.map(p=>`<tr><td>${p.name}</td><td>${p.unit}</td><td>${R(p.qty,1)}</td><td>${R(p.price,3)}</td><td>${R((p.qty||0)*(p.price||0),2)}</td></tr>`).join('')}
      <tr class="rtot"><td colspan="4">Daily product cost</td><td>${R(dailyCost,2)}</td></tr>
    </tbody></table></div>
    ${cmp}
    <p class="rep-sub">Generated by Mud Engineer Pro · derived values (PV, YP, OWR, WPS, solids split, AV, ECD, bottoms-up, bit hydraulics) are recomputed from your inputs. Company style = ${d.company}.</p>`;
    const out=document.getElementById('dmrout'); if(out)out.innerHTML=html;
  },

    const html=`
    <div class="dmr-band" style="border-color:${co.c}">
      <div class="dmr-brand" style="color:${co.c}">${co.brand}</div>
      <div class="dmr-title">Drilling Fluids Program</div>
      <div class="dmr-meta"><b>${p.well||'Well ___'}</b> · Rig ${p.rig||'___'} · ${p.field||''} · ${p.operator||''} · Proposal ${p.propno||'__'} · ${p.date||''}<br>${p.objective?'Objective: '+p.objective:''}${p.welltype?' · '+p.welltype:''}</div>
    </div>
    <h4 class="rep-h">Well &amp; casing schematic</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Hole</th><th>Casing</th><th>MD / TVD (ft)</th><th>Max inc</th><th>Mud system</th><th>MW (ppg)</th><th>Formations</th></tr></thead><tbody>${sch}
      <tr class="rtot"><td colspan="6">Total estimated mud cost</td><td>${R(totCost)} KWD</td></tr></tbody></table></div>
    ${secs}
    <h4 class="rep-h">Appendix — Hole cleaning</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Hole size</th><th>Pump rate</th><th>Pipe rotation</th><th>Annular velocity</th></tr></thead><tbody>
      <tr><td>16"</td><td>1100 – 1300 gpm</td><td>150 rpm</td><td>&gt; 110 ft/min</td></tr>
      <tr><td>12¼"</td><td>800 – 1100 gpm</td><td>120 – 150 rpm</td><td>&gt; 150 ft/min</td></tr>
      <tr><td>8½"</td><td>600 – 700 gpm</td><td>100 – 120 rpm</td><td>&gt; 180 ft/min</td></tr>
      <tr><td>6⅛"</td><td>300 – 400 gpm</td><td>70 – 80 rpm</td><td>&gt; 200 ft/min</td></tr>
    </tbody></table></div>
    <p class="rep-sub">Zones: I 0–40° · II 40–60° · III 60°+. Circulate before trip (×B/U): 16" 1.7/2.5/3.0 · 12¼" 1.4/1.8/2.0 · 8½" 1.4/1.6/1.7 · 6⅛" 1.4/1.5/1.6. Keep PV low (ALAP) for a flatter profile; raise LSYP (6-rpm) for hole cleaning in deviated hole.</p>
    <h4 class="rep-h">Appendix — Formation bridging (CaCO₃)</h4>
    <p class="rep-sub">Treat the whole system with sized Calcium Carbonate to bridge depleted zones (consider target MW first). Recommended ≈ 25 ppb — Coarse 0 / Medium 10 / Fine 15 ppb. Add Fine CaCO₃ ~5 lb/bbl per tour to maintain PSD. Use the Kaeuffer/√-PSD rule vs pore-throat size.</p>
    <h4 class="rep-h">Appendix — Lost circulation</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Severity</th><th>Treatment</th></tr></thead><tbody>
      <tr><td>Seepage (&lt; 20 bbl/hr)</td><td>Treat active: 6 ppb graphite/PO + 6 ppb CaCO₃(M) + 6 ppb LCM(F) + 4–8 ppb sulphonated asphalt</td></tr>
      <tr><td>Partial (20 – 50 bbl/hr)</td><td>100 ppb LCM pill on top of loss zone — 20% mica(F) / 40% mica(M)+walnut(M)+cotton seed / 40% mica(C)+walnut(C)</td></tr>
      <tr><td>Severe (&gt; 50 bbl/hr)</td><td>200 ppb LCM pill (same blend, coarser); reservoir: CaCO₃ grit 25 / M 25 / C 50 lb/bbl. KOC approval before mixing.</td></tr>
    </tbody></table></div>
    <h4 class="rep-h">Appendix — Stuck-pipe free pill (per 50 bbl)</h4>
    <div class="rtbl-wrap"><table class="rtbl out"><thead><tr><th>Density (ppg)</th><th>Diesel (bbl)</th><th>Spotting surfactant (drum)</th><th>Water (bbl)</th><th>Barite (lb)</th></tr></thead><tbody>
      <tr><td>8</td><td>29</td><td>3</td><td>15</td><td>1925</td></tr>
      <tr><td>10</td><td>27</td><td>3</td><td>14</td><td>6600</td></tr>
      <tr><td>12</td><td>26</td><td>3</td><td>11</td><td>11750</td></tr>
      <tr><td>14</td><td>26</td><td>3</td><td>7</td><td>17650</td></tr>
      <tr><td>16</td><td>25</td><td>3</td><td>5</td><td>22750</td></tr>
    </tbody></table></div>
    <p class="rep-sub">Cover 100 ft of annulus above the free point + 10%; add 3–4 gal/bbl spotting surfactant; soak 30 min under tension, work pipe while pumping 1–2 bbl/30 min.</p>
    <h4 class="rep-h">Appendix — Completion / displacement train</h4>
    <p class="rep-sub"><b>WBM →</b> Caustic Soda pill 30–50 bbl · Detergent pill 30–50 · Hi-Vis pill 30–50 · Completion brine (0.2 ppg over reservoir pressure).<br><b>OBM →</b> Diesel pill 30–50 bbl · Surfactant pill 30–50 · Hi-Vis pill 30–50 · Completion brine. Ensure tanks are clean before mixing.</p>
    <p class="rep-sub">Generated by Mud Engineer Pro · company style ${p.company}. Property ranges & volumes are recomputed from your section inputs (KOC N&amp;WK practice) — always confirm against the well-specific program and KOC instructions.</p>`;
    const out=document.getElementById('propout'); if(out)out.innerHTML=html;
  },
  renderCalc(view,c){
    if(c.custom==='converter'){ this.pushRecent(c.id); this.renderConverter(view,c); document.getElementById('main').scrollTo(0,0); return; }
    const key='calc_'+c.id;
    const state=this.vals[key]||(this.vals[key]=Object.fromEntries(c.inputs.map(i=>[i.k,i.def])));
    let inputs='';
    c.inputs.forEach(i=>{
      if(i.when && !i.when(state)) return;   // hide inputs not relevant to the current mode
      if(i.opts){
        inputs+=`<div class="field"><label>${i.label}</label><div class="inp"><select onchange="app.upd('${c.id}','${i.k}',this.value)">`+
          i.opts.map(o=>`<option value="${o[0]}" ${String(state[i.k])===String(o[0])?'selected':''}>${o[1]}</option>`).join('')+
          `</select>${i.unit?`<span class="unit">${i.unit}</span>`:''}</div></div>`;
      } else {
        const g=UGMAP[i.unit]; let unitEl;
        if(g){ const selU=state[i.k+'_u']||i.unit;
          unitEl=`<select class="unitsel" onchange="app.updUnit('${c.id}','${i.k}',this.value)">`+UNITS[g].units.map(u=>`<option value="${u[0]}" ${u[0]===selU?'selected':''}>${u[0]}</option>`).join('')+`</select>`;
        } else unitEl = i.unit?`<span class="unit">${i.unit}</span>`:'';
        inputs+=`<div class="field"><label>${i.label}</label><div class="inp"><input type="number" step="any" value="${state[i.k]}" oninput="app.upd('${c.id}','${i.k}',this.value)"/>${unitEl}</div></div>`;
      }
    });
    this.pushRecent(c.id);
    const on=this.isFav(c.id);
    const col=catColor(this.catOf(c.id));
    view.innerHTML=`<div class="calc fade" style="--c:${col}"><div class="calc-head"><span class="chi">${iconCalc(c.id,this.catOf(c.id))}</span><div class="cht"><h3>${c.name}</h3><p>${c.desc}</p></div>
      <button class="favbtn ${on?'on':''}" id="favbtn" onclick="app.toggleFav('${c.id}')" title="Save to Favorites">${on?svgi('star-f'):svgi('star')}${on?'Saved':'Save'}</button></div>
      <div class="printhead">Mud Engineer Pro · ${c.name} · Well: __________ · Date: __________ · Engineer: __________</div>
      <div class="calc-body"><div class="inputs"><div class="inlabel">Inputs</div>${inputs}<div id="fslot"></div></div><div class="results" id="results"></div></div></div>`;
    this.compute(c,true);
    document.getElementById('main').scrollTo(0,0);
  },
  upd(id,k,val){
    const c=this.findCalc(id); const key='calc_'+id;
    const inp=c.inputs.find(i=>i.k===k);
    // dropdowns keep their raw string value; numeric fields are coerced to Number
    this.vals[key][k]= inp.opts ? val : (val===''? '' : (parseFloat(val)||0));
    // some dropdowns change which inputs are shown — re-render the whole calculator
    if(inp.rerender){ this.renderCalc(document.getElementById('view'),c); return; }
    this.compute(c);
  },
  updUnit(id,k,newU){
    const c=this.findCalc(id); const key='calc_'+id; const inp=c.inputs.find(i=>i.k===k); const g=UGMAP[inp.unit];
    const oldU=this.vals[key][k+'_u']||inp.unit; const raw=parseFloat(this.vals[key][k]);
    if(isFinite(raw)) this.vals[key][k]=+uconv(g,raw,oldU,newU).toFixed(6);   // convert the shown value so the physical quantity is unchanged
    this.vals[key][k+'_u']=newU;
    this.renderCalc(document.getElementById('view'),c);
  },
  compute(c,animate){
    const key='calc_'+c.id; const v={...this.vals[key]};
    // numeric coercion + convert any unit-switched inputs back to the calculator's native unit
    c.inputs.forEach(i=>{ if(!i.opts){ v[i.k]=parseFloat(v[i.k])||0; const g=UGMAP[i.unit]; if(g){ const selU=this.vals[key][i.k+'_u']||i.unit; v[i.k]=uconv(g,v[i.k],selU,i.unit); } } });
    let r; try{ r=c.calc(v); }catch(e){ r={main:{n:'Error',v:'—',u:''},rows:[],formula:'',warn:'Check inputs.'}; }
    // right column: the result number, breakdown rows, advisory note
    let h=`<div class="rtitle">Result</div>`;
    if(r.warn) h+=`<div class="warn">${r.warn}</div>`;
    if(r.main && r.main.v!=='—'){
      h+=`<div class="result-main"><button class="copybtn" onclick="app.copyResult(this)" title="Copy result">${svgi('copy')}</button><div class="rn">${r.main.n}</div><div class="rv" data-val="${r.main.v}">${r.main.v}<small>${r.main.u}</small></div></div>`;
    }
    if(r.rows&&r.rows.length) h+=`<div class="result-rows">`+r.rows.map(row=>`<div class="result-row"><span class="k">${row.k}</span><span class="v">${row.v}</span></div>`).join('')+`</div>`;
    if(r.note) h+=`<div class="note">💡 ${r.note}</div>`;
    document.getElementById('results').innerHTML=h;
    if(animate){ const rv=document.querySelector('#results .rv'); if(rv) this.animateCount(rv); }
    // left column (under inputs): the formula & worked steps
    let f='';
    if(r.formula) f=`<div class="formula"><div class="ft">Formula &amp; working</div><code>${r.formula}</code>${r.steps?`<div class="steps">${r.steps}</div>`:''}</div>`;
    const fs=document.getElementById('fslot'); if(fs) fs.innerHTML=f;
  }
};
app.init();

/* PWA offline service worker (ignored when wrapped natively by Capacitor/Electron) */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
</script>
